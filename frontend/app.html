  {id:66,key:'OL2900228W',title:'Arcadia',author:'Tom Stoppard',year:1993,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',themes:['mathematics','time','history','knowledge','entropy'],color:'#0F6E56',cov:null,desc:'Two time periods occupy the same room as characters past and present try to understand each other across centuries. Stoppard at his most emotionally generous.',rids:[63,23,39],rwhy:['Both make time itself a character','Intellectual passion as a form of love','The past and present in conversation'],monos:[{ch:'Thomasina',g:'f',t:'Dramatic',d:"Thomasina on iterated algorithms. Mathematical insight played as pure joy -- a gift for a performer who can make ideas physical."},{ch:'Valentine',g:'m',t:'Dramatic',d:"Valentine\'s explanation of chaos theory. The most romantic speech about mathematics ever written."}],scenes:[{ch:[{n:'Thomasina',g:'f'},{n:'Septimus',g:'m'}],t:'Seriocomic',d:"The tutorial scenes. A girl smarter than her teacher -- intellectual energy and romantic tension together."}]},
  {id:67,key:'OL2900230W',title:'Mother Courage and Her Children',author:'Bertolt Brecht',year:1939,genre:'Drama',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['war','capitalism','survival','loss','complicity'],color:'#444441',cov:null,desc:'Anna Fierling follows armies across the Thirty Years War, profiting from the conflict that kills her children one by one. Brecht\'s greatest and saddest play.',rids:[40,3,22],rwhy:['Both use form to expose the economics of destruction','Survival as a moral question','The cost counted in children'],monos:[{ch:'Mother Courage',g:'f',t:'Dramatic',d:"Courage\'s lament after her son\'s death. A woman who has outlasted everything including her grief."},{ch:'The Chaplain',g:'m',t:'Seriocomic',d:"The Chaplain on faith and war. Collaboration dressed as conviction."}],scenes:[{ch:[{n:'Mother Courage',g:'f'},{n:'The Cook',g:'m'}],t:'Seriocomic',d:"The relationship that runs through the play. Two survivors who understand each other too well."}]},
  {id:68,key:'OL2900232W',title:'No Exit',author:'Jean-Paul Sartre',year:1944,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',themes:['hell','other people','identity','judgment','eternity'],color:'#3A3A3A',cov:null,desc:'Three people are locked in a room together forever. Hell is other people. Sartre\'s most performed play and his most purely theatrical idea.',rids:[3,12,4],rwhy:['Both place characters in a space they cannot leave','The other person as the source of suffering','Existence as a dramatic problem'],monos:[{ch:'Garcin',g:'m',t:'Dramatic',d:"Garcin on cowardice. A man who cannot stop trying to prove what he already knows about himself."},{ch:'Inez',g:'f',t:'Dramatic',d:"Inez\'s lucid cruelty speeches. A woman who understands hell and chooses to inhabit it fully."}],scenes:[{ch:[{n:'Garcin',g:'m'},{n:'Inez',g:'f'}],t:'Dramatic',d:"The central power struggle. Two people who need each other and cannot stand each other."},{ch:[{n:'Inez',g:'f'},{n:'Estelle',g:'f'}],t:'Dramatic',d:"Inez pursuing Estelle. Desire weaponized in an eternal room."}]},
  {id:69,key:'OL2900234W',title:'Oleanna',author:'David Mamet',year:1992,genre:'Drama',era:'1990s',cast:'small',castSize:2,gender:'mixed',themes:['power','education','accusation','language','gender'],color:'#533AB7',cov:null,desc:'A student and professor. Two acts, same office, one accusation that changes everything. The most divisive play about power and language in contemporary American theatre.',rids:[53,36,52],rwhy:['Both make the audience complicit in judgment','Power as the subject of every line','Two-hander where the stakes are total'],monos:[{ch:'Carol',g:'f',t:'Dramatic',d:"Carol\'s accusations in Act 2. A woman who has found language to name something -- requires total conviction."},{ch:'John',g:'m',t:'Dramatic',d:"John\'s explanations. A man whose reasonable self-presentation becomes its own indictment."}],scenes:[{ch:[{n:'John',g:'m'},{n:'Carol',g:'f'}],t:'Dramatic',d:"Any of the three acts\' central confrontations. The power shifts in each one -- great for exploring status."}]},
  {id:70,key:'OL2900236W',title:'Doubt: A Parable',author:'John Patrick Shanley',year:2005,genre:'Drama',era:'2000s',cast:'small',castSize:4,gender:'mixed',themes:['doubt','power','faith','accusation','certainty'],color:'#2C2C2A',cov:null,desc:'Sister Aloysius suspects a priest of abuse. The evidence is ambiguous. A perfect play about certainty, doubt, and the cost of knowing.',rids:[69,36,65],rwhy:['Both examine institutional power and its secrets','The impossibility of certainty as dramatic engine','Two matched wills in a power struggle'],monos:[{ch:'Sister Aloysius',g:'f',t:'Dramatic',d:"Aloysius\'s final confession of doubt. The certainty she built everything on collapsing."},{ch:'Father Flynn',g:'m',t:'Dramatic',d:"Flynn\'s sermon speeches. Using the pulpit to play the audience -- great for actors who can hold a room."}],scenes:[{ch:[{n:'Sister Aloysius',g:'f'},{n:'Father Flynn',g:'m'}],t:'Dramatic',d:"The confrontation scenes. Among the most precisely written power struggles in contemporary American drama."}]},
  {id:71,key:'OL2900238W',title:'The Glass Menagerie',author:'Tennessee Williams',year:1944,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',themes:['memory','escape','family','illusion','loneliness'],color:'#854F0B',cov:null,desc:'Tom narrates memories of his mother Amanda and sister Laura from a life he is trying to escape. Williams\'s most tender and autobiographical play.',rids:[64,51,17],rwhy:['Memory as a dramatic structure','The family that cannot be left behind','Tenderness and claustrophobia together'],monos:[{ch:'Tom',g:'m',t:'Dramatic',d:"Tom\'s narrator speeches. The adult looking back at his escape -- requires command of Williams\'s poetic register."},{ch:'Amanda',g:'f',t:'Seriocomic',d:"Amanda\'s recollections of her gentlemen callers. Simultaneously comic and heartbreaking."}],scenes:[{ch:[{n:'Amanda',g:'f'},{n:'Tom',g:'m'}],t:'Dramatic',d:"The supper table arguments. Family claustrophobia rendered exactly."},{ch:[{n:'Laura',g:'f'},{n:'Jim',g:'m'}],t:'Seriocomic',d:"The gentleman caller scene. Fragility and kindness -- Williams\'s most delicate duet."}]},
  {id:72,key:'OL2900240W',title:'Dancing at Lughnasa',author:'Brian Friel',year:1990,genre:'Drama',era:'1990s',cast:'medium',castSize:7,gender:'mixed',themes:['memory','Ireland','family','music','paganism'],color:'#3B6D11',cov:null,desc:'Five sisters in 1930s Donegal. A summer that will end everything. Friel\'s memory play captures a world before it disappears.',rids:[33,32,15],rwhy:['Both use memory as a way of holding what was lost','Ireland as a world with its own grammar','The ensemble of women at its center'],monos:[{ch:'Michael (narrator)',g:'m',t:'Dramatic',d:"Michael\'s narration -- the child as adult, making sense of what he could not understand then."},{ch:'Maggie',g:'f',t:'Seriocomic',d:"Maggie\'s jokes and songs. The one who keeps the family alive with laughter."}],scenes:[{ch:[{n:'Chris',g:'f'},{n:'Gerry',g:'m'}],t:'Seriocomic',d:"The dance. The most famous scene in Irish theatre -- joy and grief in the same moment."}]},
  {id:73,key:'OL2900242W',title:'The Pillowman',author:'Martin McDonagh',year:2003,genre:'Drama',era:'2000s',cast:'medium',castSize:4,gender:'mixed',themes:['storytelling','violence','children','art','totalitarianism'],color:'#3A3A3A',cov:null,desc:'A writer in a totalitarian state is interrogated about his dark fairy tales and their possible connection to child murders. McDonagh\'s most disturbing and brilliant play.',rids:[21,4,38],rwhy:['Both use violence as a theatrical fact','Art\'s relationship to its darkest material','The interrogation room as a theatrical space'],monos:[{ch:'Katurian',g:'m',t:'Dramatic',d:"Katurian telling his stories. A writer defending his work -- requires total commitment to material that is genuinely disturbing."},{ch:'Michal',g:'m',t:'Dramatic',d:"Michal\'s confession. Childlike language describing terrible things."}],scenes:[{ch:[{n:'Katurian',g:'m'},{n:'Tupolski',g:'m'}],t:'Dramatic',d:"The interrogation. Two men playing games while the stakes are total."}]},
  {id:74,key:'OL2900244W',title:'The Beauty Queen of Leenane',author:'Martin McDonagh',year:1996,genre:'Drama',era:'1990s',cast:'small',castSize:4,gender:'mixed',themes:['Ireland','mother/daughter','cruelty','escape','loneliness'],color:'#993556',cov:null,desc:'Maureen cares for her elderly mother in a Galway cottage. Ray arrives. Escape seems possible. McDonagh\'s debut is funny and devastating in equal measure.',rids:[73,20,32],rwhy:['Both are about a woman trapped by care and custom','Irish cruelty played as dark comedy','The small room where everything happens'],monos:[{ch:'Maureen',g:'f',t:'Seriocomic',d:"Maureen on her fantasies of escape. Longing and bitterness inseparable."},{ch:'Mag',g:'f',t:'Seriocomic',d:"Mag\'s complaints and manipulations. One of the great comic monster mothers."}],scenes:[{ch:[{n:'Maureen',g:'f'},{n:'Mag',g:'f'}],t:'Seriocomic',d:"Any mother/daughter scene. The power balance shifts constantly -- requires actors who can play cruelty as love."}]},
  {id:75,key:'OL2900246W',title:'Constellations',author:'Nick Payne',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:2,gender:'mixed',themes:['love','quantum mechanics','time','fate','loss'],color:'#533AB7',cov:null,desc:'Roland and Marianne\'s relationship plays out across multiple parallel universes simultaneously. A 70-minute two-hander about everything love contains.',rids:[30,48,23],rwhy:['Both use science as an emotional lens','The two-hander form at its most concentrated','Every version of love in one play'],monos:[{ch:'Marianne',g:'f',t:'Dramatic',d:"Marianne\'s speech about bees and possibility. Science and feeling as the same thing."},{ch:'Roland',g:'m',t:'Dramatic',d:"Roland in any of the scenes where he loses her. Grief multiplied across possibility."}],scenes:[{ch:[{n:'Roland',g:'m'},{n:'Marianne',g:'f'}],t:'Dramatic',d:"Any paired scene. The play repeats and varies -- great for finding how small choices change everything."}]},
  {id:76,key:'OL2900248W',title:'Cock',author:'Mike Bartlett',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:4,gender:'mixed',themes:['sexuality','identity','love','choice','honesty'],color:'#185FA5',cov:null,desc:'John has been with M for years. He meets W. He cannot choose. Bartlett\'s blunt, funny, painful play about desire and identity.',rids:[75,1,6],rwhy:['Both center questions of sexual identity','Love as an impossible arithmetic','The two-hander expanded into a triangle'],monos:[{ch:'John',g:'m',t:'Dramatic',d:"John trying to explain himself. A man genuinely unable to understand what he wants."},{ch:'W',g:'f',t:'Dramatic',d:"W\'s confrontation speech. A woman who knows exactly what she wants and says so."}],scenes:[{ch:[{n:'John',g:'m'},{n:'M',g:'m'}],t:'Dramatic',d:"The relationship scenes. The comfort of the established partnership."},{ch:[{n:'John',g:'m'},{n:'W',g:'f'}],t:'Dramatic',d:"The new attraction. Desire as confusion rather than clarity."}]},
  {id:77,key:'OL2900250W',title:'The Flick',author:'Annie Baker',year:2013,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',themes:['work','loneliness','film','connection','time'],color:'#444441',cov:null,desc:'Three employees work in a nearly empty Massachusetts movie theatre. Baker\'s Pulitzer winner is three hours of the mundane and somehow shattering.',rids:[30,49,15],rwhy:['Both treat ordinary life as the site of everything','Time and silence as dramatic tools','Young people in dead-end work'],monos:[{ch:'Avery',g:'m',t:'Dramatic',d:"Avery on movies and meaning. A cinephile trying to explain why beauty matters."},{ch:'Rose',g:'f',t:'Dramatic',d:"Rose on her past and her choices. Quiet devastation."}],scenes:[{ch:[{n:'Avery',g:'m'},{n:'Sam',g:'m'}],t:'Seriocomic',d:"The movie trivia scenes. Friendship and loneliness -- Baker at her most tender."},{ch:[{n:'Sam',g:'m'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The love and hurt between them. Everything unsaid."}]},
  {id:78,key:'OL2900252W',title:'August: Osage County',author:'Tracy Letts',year:2007,genre:'Drama',era:'2000s',cast:'large',castSize:13,gender:'mixed',themes:['family','addiction','secrets','Oklahoma','cruelty'],color:'#854F0B',cov:null,desc:'The Weston family reunites after the patriarch disappears. Three acts, one house, and enough secrets to detonate everything. A modern American classic.',rids:[51,52,65],rwhy:['The American family as a site of violence','Secrets as structural support and bomb','Large ensemble where everyone matters'],monos:[{ch:'Violet',g:'f',t:'Dramatic',d:"Violet\'s pill speeches and dinner table explosion. Cruelty as a defense mechanism -- one of the great American female roles."},{ch:'Barbara',g:'f',t:'Dramatic',d:"Barbara\'s reckoning. The daughter becoming the mother despite everything."}],scenes:[{ch:[{n:'Barbara',g:'f'},{n:'Violet',g:'f'}],t:'Dramatic',d:"The mother/daughter confrontations. Two equally matched, equally damaged women."},{ch:[{n:'Ivy',g:'f'},{n:'Barbara',g:'f'},{n:'Karen',g:'f'}],t:'Seriocomic',d:"The three sisters together. Processing the same family in completely different registers."}]},
  {id:79,key:'OL2900254W',title:'Sweat',author:'Lynn Nottage',year:2015,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'mixed',themes:['deindustrialization','race','class','friendship','America'],color:'#993C1D',cov:null,desc:'Workers at a Reading, Pennsylvania factory navigate job losses, racial tension, and friendships under pressure. Nottage\'s Pulitzer-winning play about what deindustrialization costs.',rids:[54,42,2],rwhy:['The American working class as a dramatic subject','Race and class as entangled forces','Friendship under economic pressure'],monos:[{ch:'Tracey',g:'f',t:'Dramatic',d:"Tracey defending her choices. Pride and prejudice in a register that feels entirely contemporary."},{ch:'Chris',g:'m',t:'Dramatic',d:"Chris on his visions of escape. Young male aspiration in a town that has stopped aspiring."}],scenes:[{ch:[{n:'Cynthia',g:'f'},{n:'Tracey',g:'f'}],t:'Dramatic',d:"The central friendship under pressure. Two women who love each other and what economics does to that love."}]},
  {id:80,key:'OL2900256W',title:'Ruined',author:'Lynn Nottage',year:2008,genre:'Drama',era:'2000s',cast:'large',castSize:10,gender:'mixed',themes:['war','women','survival','Congo','humanity'],color:'#3B6D11',cov:null,desc:'Mama Nadi runs a bar in the Congo during civil war. Women come to her broken. She keeps them safe by making them useful. Nottage\'s most shattering play.',rids:[79,44,25],rwhy:['Both center the survival strategies of women in impossible situations','War as a backdrop that becomes the entire world','The body as the site of political violence'],monos:[{ch:'Mama Nadi',g:'f',t:'Dramatic',d:"Mama\'s speech about what she has given and what she has kept. Survival as moral philosophy."},{ch:'Sophie',g:'f',t:'Dramatic',d:"Sophie singing. Music as the only intact thing."}],scenes:[{ch:[{n:'Mama Nadi',g:'f'},{n:'Christian',g:'m'}],t:'Seriocomic',d:"The relationship between Mama and Christian. Love that can only speak sideways."}]},
  {id:81,key:'OL2900258W',title:'How I Learned to Drive',author:'Paula Vogel',year:1997,genre:'Drama',era:'1990s',cast:'small',castSize:5,gender:'mixed',themes:['abuse','memory','family','survival','complicity'],color:'#533AB7',cov:null,desc:"Li'l Bit remembers learning to drive -- and the lessons she didn\'t ask for. Vogel\'s structurally daring play about survival and the complexity of love.",rids:[37,44,4],rwhy:['Memory as a non-linear structure','Complicity and survival as equally real','Female experience told on its own terms'],monos:[{ch:"Li'l Bit",g:'f',t:'Dramatic',d:"Li\'l Bit\'s narration. The adult looking back at the child she was -- perspective and vulnerability simultaneously."}],scenes:[{ch:[{n:"Li'l Bit",g:'f'},{n:'Peck',g:'m'}],t:'Dramatic',d:"The driving lesson scenes. Manipulation in a domestic register -- affection and danger at once."}]},
  {id:82,key:'OL2900260W',title:'The Normal Heart',author:'Larry Kramer',year:1985,genre:'Drama',era:'1980s',cast:'large',castSize:10,gender:'mixed',themes:['AIDS','activism','love','politics','grief'],color:'#533AB7',cov:null,desc:'New York 1981. Gay men are dying of a mysterious illness. Ned Weeks fights for recognition while his community is erased. One of the most important plays ever written.',rids:[1,41,76],rwhy:['Both center the AIDS crisis and the fight for recognition','Love and political rage inseparable','The community organizing against its own destruction'],monos:[{ch:'Ned Weeks',g:'m',t:'Dramatic',d:"Ned\'s speeches to the mayor, to his community, to Felix. Rage as the only love language available."},{ch:'Dr. Emma Brookner',g:'f',t:'Dramatic',d:"Emma\'s clinical urgency. A woman trying to make the world hear her through science."}],scenes:[{ch:[{n:'Ned',g:'m'},{n:'Felix',g:'m'}],t:'Dramatic',d:"The love story between Ned and Felix. Tenderness in the middle of a political war."}]},
  {id:83,key:'OL2900262W',title:'Angels in America: Perestroika',author:'Tony Kushner',year:1992,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',themes:['AIDS','America','change','angels','hope'],color:'#533AB7',cov:null,desc:'The second part of Kushner\'s epic -- the Angel returns, Prior wrestles with prophecy, and the Reagan era ends. Vast, funny, and genuinely hopeful.',rids:[1,82,41],rwhy:['The completion of the Angels in America epic','Hope as a hard-won dramatic position','The ensemble at full power'],monos:[{ch:'Prior Walter',g:'m',t:'Dramatic',d:"Prior\'s blessing at the end. A man who has refused to die choosing life -- the play\'s culminating speech."},{ch:'Belize',g:'m',t:'Dramatic',d:"Belize on America and Louis. The sharpest political intelligence in the play."}],scenes:[{ch:[{n:'Prior',g:'m'},{n:'The Angel',g:'nb'}],t:'Dramatic',d:"Prior wrestling with the Angel. One of the most physically and emotionally demanding scenes in American theatre."}]},
  {id:84,key:'OL2900264W',title:'The Lehman Trilogy',author:'Stefano Massini',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'male',themes:['capitalism','America','family','history','collapse'],color:'#2C2C2A',cov:null,desc:'Three actors play the entire Lehman family across 163 years, from a cotton shop in Alabama to the 2008 financial collapse. Epic theatre at its most ambitious.',rids:[40,67,53],rwhy:['Both trace capitalism as a force that consumes everything','History compressed into performance','The family as the unit of economic analysis'],monos:[{ch:'Henry Lehman',g:'m',t:'Dramatic',d:"Henry arriving in America. The immigrant\'s first encounter with a country that will make and destroy his family."},{ch:'Philip Lehman',g:'m',t:'Dramatic',d:"Philip on cotton and capital. The moment the family stops touching what it sells."}],scenes:[{ch:[{n:'Henry',g:'m'},{n:'Emanuel',g:'m'}],t:'Dramatic',d:"The brothers building the business. Collaboration as the foundation of everything that follows."}]},
  {id:85,key:'OL2900266W',title:'The Ferryman',author:'Jez Butterworth',year:2017,genre:'Drama',era:'2010s',cast:'large',castSize:16,gender:'mixed',themes:['Ireland','the Troubles','family','harvest','death'],color:'#3B6D11',cov:null,desc:'A harvest day in 1981 Armagh. The Quinn family gathers. A body has been found. The IRA arrives. Butterworth\'s most ambitious play -- a world in a farmhouse.',rids:[72,74,20],rwhy:['Both create an entire Irish world on a single set','The harvest as a ritual that contains violence','The large family ensemble under pressure'],monos:[{ch:'Caitlin',g:'f',t:'Dramatic',d:"Caitlin\'s grief speeches. A woman who has been waiting ten years for her husband\'s body."},{ch:'Quinn',g:'m',t:'Dramatic',d:"Quinn on what he has left behind and what has followed him."}],scenes:[{ch:[{n:'Quinn',g:'m'},{n:'Malone',g:'m'}],t:'Dramatic',d:"The IRA negotiation. Menace beneath rural courtesy -- very Pinteresque."}]},
  {id:86,key:'OL2900268W',title:'Jerusalem',author:'Jez Butterworth',year:2009,genre:'Drama',era:'2000s',cast:'large',castSize:10,gender:'mixed',themes:['England','myth','outsiders','community','freedom'],color:'#3B6D11',cov:null,desc:'Rooster Byron lives in a trailer in the Wiltshire woods. The council wants to evict him. St George\'s Day arrives. One of the great plays of the twenty-first century.',rids:[85,20,57],rwhy:['Both create a mythic outsider figure','England\'s landscape as both real and legendary','The community that needs and destroys its wild man'],monos:[{ch:'Rooster Byron',g:'m',t:'Dramatic',d:"Rooster\'s giant speeches -- the man who met the giants who built Stonehenge. Requires an actor of enormous charisma and physical presence."},{ch:'Rooster',g:'m',t:'Seriocomic',d:"Rooster entertaining the young. The pied piper as drug dealer as myth."}],scenes:[{ch:[{n:'Rooster',g:'m'},{n:'Johnny Byron',g:'m'}],t:'Seriocomic',d:"Rooster with his hangers-on. The court around the king -- the play\'s comic engine."}]},
  {id:87,key:'OL2900270W',title:'Disgraced',author:'Ayad Akhtar',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['identity','race','Islam','America','dinner party'],color:'#993556',cov:null,desc:'A dinner party in a Manhattan apartment. Four people. One conversation that unravels. Akhtar\'s Pulitzer winner about identity, assimilation, and what we inherit.',rids:[87,69,52],rwhy:['Both use a single evening to detonate a world','Identity as the explosive material','The dinner party as a theatrical trap'],monos:[{ch:'Amir',g:'m',t:'Dramatic',d:"Amir\'s confession about what he felt watching the towers fall. A speech that costs everything to deliver."},{ch:'Emily',g:'f',t:'Dramatic',d:"Emily on Islamic art and her work. Appropriation examined from the inside."}],scenes:[{ch:[{n:'Amir',g:'m'},{n:'Emily',g:'f'}],t:'Dramatic',d:"The marriage under pressure. Love and identity colliding."},{ch:[{n:'Amir',g:'m'},{n:'Jory',g:'f'}],t:'Dramatic',d:"The confrontation across race and class. The dinner party\'s most volatile moment."}]},
  {id:88,key:'OL2900272W',title:'Cost of Living',author:'Martyna Majok',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['disability','care','class','connection','loneliness'],color:'#185FA5',cov:null,desc:'Two parallel stories of caregivers and those they care for. Majok\'s Pulitzer winner is tender, funny, and completely unsentimental about bodies and need.',rids:[49,77,30],rwhy:['Both examine what people need from each other','Care as a form of power and love simultaneously','Working-class experience without condescension'],monos:[{ch:'Eddie',g:'m',t:'Dramatic',d:"Eddie on what he has lost and what remains. Masculinity and caregiving in the same body."},{ch:'Ani',g:'f',t:'Dramatic',d:"Ani\'s rage at her situation. A woman with cerebral palsy refusing to be defined by it."}],scenes:[{ch:[{n:'Eddie',g:'m'},{n:'Ani',g:'f'}],t:'Dramatic',d:"Eddie bathing Ani. Intimacy and power and history between two people who loved each other."},{ch:[{n:'Jess',g:'f'},{n:'John',g:'m'}],t:'Dramatic',d:"The caregiver and the student. Class and connection across a difference neither understands."}]},
  {id:89,key:'OL2900274W',title:'Pass Over',author:'Antoinette Nwandu',year:2017,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'male',themes:['race','police violence','America','waiting','freedom'],color:'#993C1D',cov:null,desc:'Two young Black men wait on a street corner -- waiting to make it to the Promised Land, waiting not to be killed. Beckett meets the Bible meets the present.',rids:[3,2,82],rwhy:['Waiting as an existential and political condition','Both draw on Beckett while insisting on their own specificity','Blackness and mortality as the same question'],monos:[{ch:'Moses',g:'m',t:'Dramatic',d:"Moses on the Promised Land. A man who refuses to stop believing in something."},{ch:'Kitch',g:'m',t:'Seriocomic',d:"Kitch\'s lists of what the good life looks like. Desire as a survival strategy."}],scenes:[{ch:[{n:'Moses',g:'m'},{n:'Kitch',g:'m'}],t:'Seriocomic',d:"The corner scenes -- the play\'s whole world. Friendship and fear and humor in the same breath."}]},
  {id:90,key:'OL2900276W',title:'Slave Play',author:'Jeremy O. Harris',year:2018,genre:'Drama',era:'2010s',cast:'large',castSize:8,gender:'mixed',themes:['race','sex','therapy','power','America'],color:'#3A3A3A',cov:null,desc:'Three interracial couples in a plantation-themed sex roleplay scenario undergo antebellum therapy. Harris\'s explosive debut challenges every boundary of comfort and form.',rids:[89,87,1],rwhy:['Both confront American racial history as a lived present','Form-breaking as political act','Sex and power as inseparable from race'],monos:[{ch:'Kaneisha',g:'f',t:'Dramatic',d:"Kaneisha\'s confession to Jim. What she needs and what it costs her to need it."},{ch:'Phillip',g:'m',t:'Dramatic',d:"Phillip on his Blackness and his desire. A man trying to articulate what he cannot."}],scenes:[{ch:[{n:'Kaneisha',g:'f'},{n:'Jim',g:'m'}],t:'Dramatic',d:"The plantation roleplay. Requires total commitment and a strong directorial frame."}]},
  {id:91,key:'OL2900278W',title:'Water by the Spoonful',author:'Quiara Alegria Hudes',year:2011,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['addiction','community','war','family','recovery'],color:'#0F6E56',cov:null,desc:'Elliot is a Iraq veteran haunted by a ghost. Online, his cousin Yazmin moderates a chat room for recovering addicts. Two worlds that cannot help each other enough.',rids:[81,88,49],rwhy:['Both examine addiction without sentimentality','The family that forms online as real as blood','War trauma as background radiation'],monos:[{ch:'Elliot',g:'m',t:'Dramatic',d:"Elliot and the ghost. A veteran who cannot leave a doorway in Fallujah."},{ch:'Haikumom',g:'f',t:'Dramatic',d:"Haikumom moderating the chat room. Care expressed as structure."}],scenes:[{ch:[{n:'Elliot',g:'m'},{n:'Yazmin',g:'f'}],t:'Dramatic',d:"The cousins trying to be what the other needs. Family love under pressure."}]},
  {id:92,key:'OL2900280W',title:'Pipeline',author:'Dominique Morisseau',year:2017,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['education','race','motherhood','school to prison','class'],color:'#993C1D',cov:null,desc:'Nya is a public school teacher whose son is in a private school. When he is accused of assault, her two worlds collide. Morisseau on education and who it is for.',rids:[79,54,89],rwhy:['Both examine race and class in American institutions','Motherhood as a political position','The school as a site of systemic failure'],monos:[{ch:'Nya',g:'f',t:'Dramatic',d:"Nya on what she wants for her son. The gap between what a mother can give and what the world will allow."},{ch:'Omari',g:'m',t:'Dramatic',d:"Omari\'s defense of himself. A young Black man in a system that has already decided."}],scenes:[{ch:[{n:'Nya',g:'f'},{n:'Omari',g:'m'}],t:'Dramatic',d:"Mother and son. Love and fear and the thing between them that education cannot fix."}]},
  {id:93,key:'OL2900282W',title:'Skeleton Crew',author:'Dominique Morisseau',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['labor','Detroit','race','loyalty','survival'],color:'#854F0B',cov:null,desc:'Four workers in a Detroit auto stamping plant in 2008 face the plant\'s closure. Morisseau\'s most intimate play -- the factory floor as the whole world.',rids:[79,92,42],rwhy:['Both center working-class Black Americans at a moment of crisis','Loyalty and survival as competing values','The workplace as a community under threat'],monos:[{ch:'Faye',g:'f',t:'Dramatic',d:"Faye on her thirty years in the plant. Work as identity and what happens when it ends."},{ch:'Dez',g:'m',t:'Dramatic',d:"Dez on his plan. A young man who has seen the future and is trying to survive it."}],scenes:[{ch:[{n:'Faye',g:'f'},{n:'Reggie',g:'m'}],t:'Dramatic',d:"The supervisor and the veteran worker. Authority and loyalty in conflict."}]},
  {id:94,key:'OL2900284W',title:'The Mountaintop',author:'Katori Hall',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'mixed',themes:['Martin Luther King','mortality','legacy','faith','America'],color:'#533AB7',cov:null,desc:'The night before his assassination, Martin Luther King Jr. waits alone in his motel room. A maid arrives. A two-hander that reimagines the last night of a giant.',rids:[54,89,2],rwhy:['Both center a Black man\'s relationship to his legacy','The motel room as the whole world','Mortality as the dramatic engine'],monos:[{ch:'MLK',g:'m',t:'Dramatic',d:"King\'s private speeches -- the man behind the icon. Fear and faith and the knowledge of what is coming."},{ch:'Camae',g:'f',t:'Dramatic',d:"Camae revealing herself. The messenger and the message."}],scenes:[{ch:[{n:'MLK',g:'m'},{n:'Camae',g:'f'}],t:'Dramatic',d:"The two of them through the night. One of contemporary theatre\'s great two-handers."}]},
  {id:95,key:'OL2900286W',title:'What the Constitution Means to Me',author:'Heidi Schreck',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',themes:['Constitution','women','history','immigration','America'],color:'#993556',cov:null,desc:'Heidi Schreck performed at American Legion halls as a teenager to pay for college. Now she returns to ask what the Constitution has meant to the women in her family.',rids:[43,29,22],rwhy:['Both use the performer\'s own story as the political argument','Women\'s bodies as the site of constitutional law','Documentary theatre as emotional experience'],monos:[{ch:'Heidi',g:'f',t:'Dramatic',d:"The family history speeches. A woman tracing what the law has done to the women she comes from."},{ch:'Heidi',g:'f',t:'Seriocomic',d:"The teenage Legion hall performance. Self-presentation as both charming and heartbreaking."}],scenes:[]},
  {id:96,key:'OL2900288W',title:'The Humans',author:'Stephen Karam',year:2014,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['family','fear','America','class','health'],color:'#2C2C2A',cov:null,desc:'The Blake family gathers in a New York apartment for Thanksgiving. Underneath the warmth, everyone is terrified. Karam\'s Tony-winning play about modern American anxiety.',rids:[78,51,49],rwhy:['The American family as a container for national fear','Economic anxiety made domestic','An ensemble where subtext is the entire text'],monos:[{ch:'Erik',g:'m',t:'Dramatic',d:"Erik\'s speeches about his nightmares. A father who cannot protect his family -- quiet and devastating."},{ch:'Brigid',g:'f',t:'Dramatic',d:"Brigid defending her life choices. The child explaining herself to worried parents."}],scenes:[{ch:[{n:'Erik',g:'m'},{n:'Deirdre',g:'f'}],t:'Dramatic',d:"The parents alone. A marriage\'s quiet desperation -- the most emotionally honest scenes in the play."}]},
  {id:97,key:'OL2900290W',title:'Appropriate',author:'Branden Jacobs-Jenkins',year:2013,genre:'Drama',era:'2010s',cast:'large',castSize:7,gender:'mixed',themes:['race','family','inheritance','the South','ghosts'],color:'#854F0B',cov:null,desc:'A white Southern family clears out the family estate and discovers photographs that reveal their ancestor\'s relationship to racial violence. A ghost play and a family play simultaneously.',rids:[78,51,57],rwhy:['Both unearth the buried history of a family and a country','The house as the site of what was done','Inheritance as a form of haunting'],monos:[{ch:'Toni',g:'f',t:'Dramatic',d:"Toni on what she has kept going and what it has cost her. The family\'s keeper of secrets."},{ch:'Bo',g:'m',t:'Dramatic',d:"Bo\'s attempts to be reasonable. A man whose reasonableness is its own indictment."}],scenes:[{ch:[{n:'Toni',g:'f'},{n:'Frank',g:'m'}],t:'Dramatic',d:"The siblings\' central confrontation. A family\'s history argued as a personal accusation."}]},
  {id:98,key:'OL2900292W',title:'An Octoroon',author:'Branden Jacobs-Jenkins',year:2014,genre:'Drama',era:'2010s',cast:'medium',castSize:8,gender:'mixed',themes:['race','theatre','melodrama','slavery','form'],color:'#3A3A3A',cov:null,desc:'Jacobs-Jenkins adapts a 19th century melodrama about a mixed-race woman on a Louisiana plantation -- using the original\'s form to expose what form conceals about race.',rids:[97,43,89],rwhy:['Both use theatrical form itself as the argument','Race and representation as inseparable','The adaptation that transforms its source'],monos:[{ch:'BJJ (playwright)',g:'m',t:'Dramatic',d:"The playwright\'s opening monologue putting on whiteface. Meta-theatrical and impossible to forget."},{ch:'Zoe',g:'f',t:'Dramatic',d:"Zoe\'s discovery of her status. Melodrama played straight to expose its mechanisms."}],scenes:[{ch:[{n:'Zoe',g:'f'},{n:'George',g:'m'}],t:'Dramatic',d:"The lovers. Melodrama\'s conventions turned inside out."}]},
  {id:99,key:'OL2900294W',title:'Fat Ham',author:'James Ijames',year:2021,genre:'Comedy',era:'2020s',cast:'medium',castSize:7,gender:'mixed',themes:['Hamlet','queerness','race','family','the South'],color:'#3B6D11',cov:null,desc:'Juicy is a queer Black man whose dead father\'s ghost asks him to avenge his murder. A Hamlet retelling set at a backyard barbecue that is funnier and more heartbreaking than it has any right to be.',rids:[7,1,76],rwhy:['Hamlet retold for a body Hamlet never imagined','Queerness and Blackness as the lens that changes everything','Comedy that earns its grief'],monos:[{ch:'Juicy',g:'m',t:'Seriocomic',d:"Juicy\'s Hamlet speeches -- rewritten, questioned, inhabited by a young Black queer man who cannot decide what they mean for him."},{ch:'Opal',g:'f',t:'Comedic',d:"Opal cutting through everyone\'s drama. The comic intelligence of the play."}],scenes:[{ch:[{n:'Juicy',g:'m'},{n:'Tio',g:'m'}],t:'Seriocomic',d:"Juicy and his love interest. Tenderness and comedy -- the play\'s beating heart."}]},
  {id:100,key:'OL2900296W',title:'Primary Trust',author:'Eboni Booth',year:2023,genre:'Drama',era:'2020s',cast:'small',castSize:4,gender:'mixed',themes:['loneliness','work','friendship','change','community'],color:'#185FA5',cov:null,desc:'Kenneth works at a bookstore and drinks at the same bar every night with his imaginary friend Bert. When the bookstore closes, everything he has avoided must be faced. The 2024 Pulitzer winner.',rids:[77,88,49],rwhy:['Both treat loneliness as a condition rather than a flaw','Work and community as what structures a life','Quiet devastation in a small world'],monos:[{ch:'Kenneth',g:'m',t:'Seriocomic',d:"Kenneth explaining himself to anyone who will listen. A man who has built a life around not being seen suddenly visible."},{ch:'Kenneth',g:'m',t:'Dramatic',d:"Kenneth after the bookstore closes. The grief of losing the structure that made you possible."}],scenes:[{ch:[{n:'Kenneth',g:'m'},{n:'Corinna',g:'f'}],t:'Seriocomic',d:"Kenneth and Corinna at the bank. Two people who cannot quite connect finding something anyway."}]}
,
{id:101,key:'OL2900300W',title:'Oedipus Rex',author:'Sophocles',year:-429,genre:'Tragedy',era:'Ancient',cast:'medium',castSize:6,gender:'mixed',themes:['fate','blindness','truth','power','family'],color:'#2C2C2A',cov:null,desc:'Oedipus investigates a plague by seeking the murderer of the previous king. The investigation destroys him. The foundational tragedy -- every play about self-knowledge comes from this one.',rids:[102,7,8],rwhy:['The detective who discovers he is the criminal','Fate as the engine of destruction','The price of knowing'],monos:[{ch:'Oedipus',g:'m',t:'Dramatic',d:"Oedipus realizing the truth. A man who has been running toward what he was running from -- one of the great recognition speeches."},{ch:'Jocasta',g:'f',t:'Dramatic',d:"Jocasta urging Oedipus to stop looking. A woman who already knows -- one of the most chilling speeches in drama."}],scenes:[{ch:[{n:'Oedipus',g:'m'},{n:'Tiresias',g:'m'}],t:'Dramatic',d:"Oedipus and the blind prophet. The sighted man and the blind man -- irony as dramatic structure."},{ch:[{n:'Oedipus',g:'m'},{n:'Jocasta',g:'f'}],t:'Dramatic',d:"The unravelling. Two people approaching the truth from different directions."}]},
  {id:102,key:'OL2900302W',title:'Antigone',author:'Sophocles',year:-441,genre:'Tragedy',era:'Ancient',cast:'medium',castSize:6,gender:'mixed',themes:['civil disobedience','family','law','death','duty'],color:'#3A3A3A',cov:null,desc:'Antigone buries her brother against the king\'s orders. She will die for it. The first play about conscience versus the state -- still the most urgent.',rids:[101,59,65],rwhy:['Both center a person who chooses principle over survival','The law that is wrong','Individual conscience against collective authority'],monos:[{ch:'Antigone',g:'f',t:'Dramatic',d:"Antigone defending her choice. A woman who has decided and cannot be argued out of it -- extraordinary clarity."},{ch:'Creon',g:'m',t:'Dramatic',d:"Creon on order and the state. A man who is right about everything except what matters."}],scenes:[{ch:[{n:'Antigone',g:'f'},{n:'Ismene',g:'f'}],t:'Dramatic',d:"The sisters. Antigone\'s certainty and Ismene\'s fear -- two responses to the same impossible situation."},{ch:[{n:'Creon',g:'m'},{n:'Haemon',g:'m'}],t:'Dramatic',d:"Father and son. Authority and love in direct collision."}]},
  {id:103,key:'OL2900304W',title:'Medea',author:'Euripides',year:-431,genre:'Tragedy',era:'Ancient',cast:'medium',castSize:6,gender:'mixed',themes:['revenge','betrayal','motherhood','foreignness','power'],color:'#993556',cov:null,desc:'Jason abandons Medea for a politically advantageous marriage. Medea\'s revenge is total. The most disturbing and modern of the Greek tragedies.',rids:[25,102,18],rwhy:['A woman\'s rage given its full weight','The outsider who has given everything','Revenge as the only remaining form of agency'],monos:[{ch:'Medea',g:'f',t:'Dramatic',d:"Medea\'s decision monologue. A mother choosing to kill her children -- one of the most demanding pieces in the entire canon. Requires absolute commitment."},{ch:'Medea',g:'f',t:'Dramatic',d:"Medea confronting Jason. The accounting of what she gave and what he took."}],scenes:[{ch:[{n:'Medea',g:'f'},{n:'Jason',g:'m'}],t:'Dramatic',d:"Any Medea/Jason confrontation. Two people who loved each other and what that love has become."}]},
  {id:104,key:'OL2900306W',title:'Tartuffe',author:'Moliere',year:1664,genre:'Comedy',era:'1600s',cast:'large',castSize:9,gender:'mixed',themes:['hypocrisy','religion','deception','family','power'],color:'#854F0B',cov:null,desc:'A religious con man insinuates himself into a wealthy family. Orgon cannot see what everyone else sees. Moliere\'s most precise and enduring comedy.',rids:[10,9,27],rwhy:['Both use comedy to expose hypocrisy as a social force','Deception and the people who need to believe it','Language as a tool of manipulation'],monos:[{ch:'Tartuffe',g:'m',t:'Comedic',d:"Tartuffe\'s false piety speeches. Playing sincerity in order to expose it -- great for actors who can hold two levels at once."},{ch:'Dorine',g:'f',t:'Comedic',d:"Dorine\'s commentary. The servant who sees everything and says it -- one of theatre\'s great comic roles."}],scenes:[{ch:[{n:'Tartuffe',g:'m'},{n:'Elmire',g:'f'}],t:'Comedic',d:"The seduction scene. Hypocrisy unmasked in real time -- great comic timing required."}]},
  {id:105,key:'OL2900308W',title:'The Misanthrope',author:'Moliere',year:1666,genre:'Comedy',era:'1600s',cast:'medium',castSize:7,gender:'mixed',themes:['honesty','society','love','hypocrisy','virtue'],color:'#533AB7',cov:null,desc:'Alceste hates hypocrisy and cannot stop loving the most hypocritical woman in Paris. Moliere\'s most ambivalent comedy -- we laugh at Alceste and agree with him.',rids:[104,10,24],rwhy:['Both examine the person who insists on truth in a world of surfaces','Comedy that sides with no one','The lover who cannot stop'],monos:[{ch:'Alceste',g:'m',t:'Seriocomic',d:"Alceste on the sonnet. A man who cannot moderate his opinions -- funny because he is completely right."},{ch:'Celimene',g:'f',t:'Comedic',d:"Celimene\'s salon performances. A woman who has turned social manipulation into an art form."}],scenes:[{ch:[{n:'Alceste',g:'m'},{n:'Celimene',g:'f'}],t:'Seriocomic',d:"The impossible love affair. Two people entirely wrong for each other who cannot separate."}]},
  {id:106,key:'OL2900310W',title:'The Servant of Two Masters',author:'Carlo Goldoni',year:1746,genre:'Comedy',era:'1700s',cast:'large',castSize:10,gender:'mixed',themes:['disguise','love','food','money','confusion'],color:'#3B6D11',cov:null,desc:'Truffaldino serves two masters simultaneously without either knowing. Goldoni\'s commedia masterpiece is pure physical comedy and has never stopped being performed.',rids:[104,9,10],rwhy:['Both use disguise and confusion as the engine of comedy','Physical comedy at its most demanding','The servant who is smarter than everyone'],monos:[{ch:'Truffaldino',g:'m',t:'Comedic',d:"Truffaldino\'s explanations. A man improvising elaborate lies -- requires a performer with extraordinary comic timing and physical presence."}],scenes:[{ch:[{n:'Truffaldino',g:'m'},{n:'Pantalone',g:'m'}],t:'Comedic',d:"Truffaldino managing his masters. The chaos of serving two people who cannot know about each other."}]},
  {id:107,key:'OL2900312W',title:'Blood Wedding',author:'Federico Garcia Lorca',year:1932,genre:'Tragedy',era:'1900s',cast:'large',castSize:10,gender:'mixed',themes:['desire','honor','death','Spain','fate'],color:'#993C1D',cov:null,desc:'A bride runs from her wedding with her former lover on the day of her marriage. The moon and death pursue them. Lorca\'s most visceral and poetic play.',rids:[25,103,67],rwhy:['Both use poetic language to express what realism cannot','Desire as a force of nature','The community\'s codes versus the body\'s needs'],monos:[{ch:'The Mother',g:'f',t:'Dramatic',d:"The Mother on her dead sons and knives. Grief accumulated into a philosophy of survival."},{ch:'The Bride',g:'f',t:'Dramatic',d:"The Bride explaining herself after. A woman who followed her body and must now account for it."}],scenes:[{ch:[{n:'The Bride',g:'f'},{n:'Leonardo',g:'m'}],t:'Dramatic',d:"The lovers in the forest. Language becoming pure desire."}]},
  {id:108,key:'OL2900314W',title:'Six Characters in Search of an Author',author:'Luigi Pirandello',year:1921,genre:'Experimental',era:'1900s',cast:'large',castSize:9,gender:'mixed',themes:['reality','theatre','identity','fiction','truth'],color:'#3A3A3A',cov:null,desc:'Six characters interrupt a theatre rehearsal, claiming to be abandoned by their author and needing their story told. Pirandello dismantles the fourth wall permanently.',rids:[4,63,3],rwhy:['Both make the theatrical frame the subject','Characters who exist only in their own performance','What is real inside a fiction'],monos:[{ch:'The Father',g:'m',t:'Dramatic',d:"The Father on reality and perception. A character defending his right to exist -- philosophical and desperate."},{ch:'The Stepdaughter',g:'f',t:'Dramatic',d:"The Stepdaughter\'s insistence on her story. Raw, urgent, impossible to contain."}],scenes:[{ch:[{n:'The Father',g:'m'},{n:'The Manager',g:'m'}],t:'Dramatic',d:"The negotiation between character and reality. Theatre arguing with itself."}]},
  {id:109,key:'OL2900316W',title:'Joe Turner\'s Come and Gone',author:'August Wilson',year:1986,genre:'Drama',era:'1980s',cast:'large',castSize:9,gender:'mixed',themes:['migration','identity','slavery','music','belonging'],color:'#993C1D',cov:null,desc:'A Pittsburgh boarding house in 1911. Herald Loom has spent seven years in illegal servitude. He is searching for his wife and his song. Wilson\'s most mythic play.',rids:[54,55,56],rwhy:['Both explore what Black Americans carry from the South','The search for identity after forced labor','Music as the path back to the self'],monos:[{ch:'Herald Loom',g:'m',t:'Dramatic',d:"Herald\'s juba dance speech. A man reconnecting with something that was taken from him."},{ch:'Bynum',g:'m',t:'Dramatic',d:"Bynum on the binding song. A mystic who has found his purpose -- one of Wilson\'s most beautiful speeches."}],scenes:[{ch:[{n:'Herald',g:'m'},{n:'Bynum',g:'m'}],t:'Dramatic',d:"The two men and the song. Wilson\'s spiritual world made theatrical."}]},
  {id:110,key:'OL2900318W',title:'The Caucasian Chalk Circle',author:'Bertolt Brecht',year:1944,genre:'Drama',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['justice','motherhood','class','possession','war'],color:'#444441',cov:null,desc:'In war-torn Georgia, a servant girl rescues an abandoned noble child. Years later, the mother returns. Who does the child belong to? Brecht\'s most tender and political play.',rids:[67,102,103],rwhy:['Both ask what constitutes rightful ownership','The mother who chose the child against all sense','Epic theatre at its most accessible'],monos:[{ch:'Grusha',g:'f',t:'Dramatic',d:"Grusha\'s decision to take the child. A woman choosing danger over safety -- the moral center of the play."},{ch:'Azdak',g:'m',t:'Comedic',d:"Azdak the rogue judge. A drunk scoundrel who dispenses perfect justice -- great for actors with physical comedy."}],scenes:[{ch:[{n:'Grusha',g:'f'},{n:'Simon',g:'m'}],t:'Seriocomic',d:"The soldiers\' farewell. Love that can only be said sideways."}]},
  {id:111,key:'OL2900320W',title:'Look Back in Anger',author:'John Osborne',year:1956,genre:'Drama',era:'1950s',cast:'small',castSize:4,gender:'mixed',themes:['class','anger','marriage','England','resentment'],color:'#444441',cov:null,desc:'Jimmy Porter rages at his wife, his friend, and the world from their cramped Midlands flat. The play that invented the angry young man and changed British theatre.',rids:[86,38,57],rwhy:['Both center a man whose anger is larger than his life','Class resentment as a dramatic engine','The room that cannot contain what is happening'],monos:[{ch:'Jimmy Porter',g:'m',t:'Dramatic',d:"Jimmy\'s rants -- on Alison, on England, on the lack of good causes. Requires an actor who can make fury charming enough to hold the stage."},{ch:'Alison',g:'f',t:'Dramatic',d:"Alison\'s quiet speech about the bear and squirrel. Tenderness surviving in the middle of war."}],scenes:[{ch:[{n:'Jimmy',g:'m'},{n:'Alison',g:'f'}],t:'Dramatic',d:"Any Jimmy/Alison scene. The marriage as a permanent state of siege."}]},
  {id:112,key:'OL2900322W',title:'The Caretaker',author:'Harold Pinter',year:1960,genre:'Drama',era:'1960s',cast:'small',castSize:3,gender:'male',themes:['power','identity','shelter','language','manipulation'],color:'#444441',cov:null,desc:'Two brothers and a tramp in a West London house. Davies wants to stay. Both brothers want something from him. Pinter\'s most human play.',rids:[61,38,3],rwhy:['The room as the entire world','Language as shelter and weapon','Power shifting between three men who need each other'],monos:[{ch:'Davies',g:'m',t:'Seriocomic',d:"Davies on Sidcup. A man\'s entire identity rests on papers he will never collect."},{ch:'Aston',g:'m',t:'Dramatic',d:"Aston\'s speech about the mental hospital. The most unexpected monologue in Pinter -- quiet, precise, devastating."}],scenes:[{ch:[{n:'Davies',g:'m'},{n:'Mick',g:'m'}],t:'Seriocomic',d:"Mick and Davies. Power games with a tramp who doesn\'t understand the rules."}]},
  {id:113,key:'OL2900324W',title:'Jitney',author:'August Wilson',year:1979,genre:'Drama',era:'1970s',cast:'medium',castSize:7,gender:'male',themes:['community','race','fathers','Pittsburgh','change'],color:'#993C1D',cov:null,desc:'The men of a gypsy cab station in Pittsburgh 1977 face demolition of their building. Wilson\'s first great play -- the community as the protagonist.',rids:[54,55,109],rwhy:['Both center a Black male community under pressure','The workplace as the world','Fathers and sons across the Wilson cycle'],monos:[{ch:'Becker',g:'m',t:'Dramatic',d:"Becker confronting his son Booster. A father and what prison has done to the relationship."},{ch:'Youngblood',g:'m',t:'Dramatic',d:"Youngblood on his plans. Young ambition in an old world."}],scenes:[{ch:[{n:'Becker',g:'m'},{n:'Booster',g:'m'}],t:'Dramatic',d:"The father and the returned son. Love and damage -- Wilson\'s central subject."}]},
  {id:114,key:'OL2900326W',title:'The Weir',author:'Conor McPherson',year:1997,genre:'Drama',era:'1990s',cast:'small',castSize:5,gender:'mixed',themes:['Ireland','ghosts','loneliness','storytelling','community'],color:'#0F6E56',cov:null,desc:'A woman from Dublin visits a rural Irish pub. The men tell her ghost stories. She tells one back. McPherson\'s most celebrated play about what stories do.',rids:[72,74,32],rwhy:['Both find the supernatural in the Irish ordinary','Storytelling as the form and the subject','Community revealing itself through narrative'],monos:[{ch:'Valerie',g:'f',t:'Dramatic',d:"Valerie\'s ghost story. A real grief disguised as a supernatural tale -- the play\'s heart."},{ch:'Jack',g:'m',t:'Dramatic',d:"Jack\'s story. A lonely man giving something precious."}],scenes:[{ch:[{n:'Jack',g:'m'},{n:'Valerie',g:'f'}],t:'Dramatic',d:"The closing. Two lonely people at closing time."}]},
  {id:115,key:'OL2900328W',title:'The Lieutenant of Inishmore',author:'Martin McDonagh',year:2001,genre:'Comedy',era:'2000s',cast:'medium',castSize:7,gender:'mixed',themes:['violence','Ireland','terrorism','cats','absurdity'],color:'#993556',cov:null,desc:'Mad Padraic\'s cat has been killed. Padraic is an INLA splinter group terrorist. Everyone is terrified of how he will react. McDonagh\'s darkest comedy.',rids:[73,74,107],rwhy:['Violence as dark comedy pushed to its extreme','The Irish Troubles as absurdist farce','McDonagh at his most savage and funny'],monos:[{ch:'Mad Padraic',g:'m',t:'Seriocomic',d:"Padraic on his cat and his ideology. A man whose love for an animal exceeds his regard for human life -- requires total commitment to the character\'s internal logic."},{ch:'Mairead',g:'f',t:'Seriocomic',d:"Mairead on shooting cows\' eyes. Teenage violence as aspiration -- one of McDonagh\'s great comic creations."}],scenes:[{ch:[{n:'Padraic',g:'m'},{n:'Mairead',g:'f'}],t:'Seriocomic',d:"The terrorists together. Ideological absurdity played entirely straight."}]},
  {id:116,key:'OL2900330W',title:'The House of Bernarda Alba',author:'Federico Garcia Lorca',year:1936,genre:'Drama',era:'1900s',cast:'large',castSize:10,gender:'female',themes:['repression','female desire','Spain','family','death'],color:'#2C2C2A',cov:null,desc:'Bernarda imposes eight years of mourning on her five daughters after their father\'s death. Desire and repression build to an explosion. Lorca\'s final play.',rids:[107,25,22],rwhy:['An all-female world under patriarchal law','Desire repressed until it destroys','The mother as the instrument of oppression'],monos:[{ch:'Bernarda',g:'f',t:'Dramatic',d:"Bernarda\'s commands and pronouncements. Authority as a weapon."},{ch:'Adela',g:'f',t:'Dramatic',d:"Adela\'s defiance. The youngest daughter who will not survive her freedom."}],scenes:[{ch:[{n:'Bernarda',g:'f'},{n:'Maria Josefa',g:'f'}],t:'Dramatic',d:"Bernarda and her mother -- the mad woman locked in the room who speaks the truth."},{ch:[{n:'Adela',g:'f'},{n:'Martirio',g:'f'}],t:'Dramatic',d:"The sisters who want the same man. Desire as competition and cruelty."}]},
  {id:117,key:'OL2900332W',title:'Pygmalion',author:'George Bernard Shaw',year:1913,genre:'Comedy',era:'1900s',cast:'medium',castSize:7,gender:'mixed',themes:['class','language','identity','education','gender'],color:'#3B6D11',cov:null,desc:'Professor Higgins bets he can pass a cockney flower girl off as a duchess. Eliza Doolittle has other ideas. Shaw\'s most performed play -- and Eliza is the real protagonist.',rids:[59,10,105],rwhy:['Both use language as a marker of class and a tool of transformation','The student who surpasses the teacher','Comedy with a serious argument about who gets to be a person'],monos:[{ch:'Eliza',g:'f',t:'Dramatic',d:"Eliza\'s final confrontation with Higgins. A woman who has been made and is now claiming herself."},{ch:'Higgins',g:'m',t:'Seriocomic',d:"Higgins on women and language. A man entirely without self-awareness played with complete sincerity."}],scenes:[{ch:[{n:'Eliza',g:'f'},{n:'Higgins',g:'m'}],t:'Seriocomic',d:"Any lesson scene or confrontation. The power dynamic shifting as Eliza becomes more than the experiment."}]},
  {id:118,key:'OL2900334W',title:'Major Barbara',author:'George Bernard Shaw',year:1905,genre:'Drama',era:'1900s',cast:'large',castSize:9,gender:'mixed',themes:['capitalism','religion','poverty','armaments','idealism'],color:'#533AB7',cov:null,desc:'Barbara Undershaft works in the Salvation Army. Her father manufactures weapons. Shaw\'s most intellectually combustible play about money, morality, and who really saves souls.',rids:[117,40,31],rwhy:['Both expose the moral compromises of doing good in a capitalist world','The idealist confronting the realist','Shaw\'s argument at its most provocative'],monos:[{ch:'Barbara',g:'f',t:'Dramatic',d:"Barbara\'s crisis of faith -- discovering the Salvation Army runs on tainted money."},{ch:'Undershaft',g:'m',t:'Dramatic',d:"Undershaft on poverty and power. The arms dealer as the play\'s moral voice -- Shaw at his most provocative."}],scenes:[{ch:[{n:'Barbara',g:'f'},{n:'Undershaft',g:'m'}],t:'Dramatic',d:"Father and daughter debating the soul of the world. Shaw\'s greatest argument scene."}]},
  {id:119,key:'OL2900336W',title:'The Cherry Orchard',author:'Anton Chekhov',year:1904,genre:'Comedy',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['change','class','nostalgia','time','endings'],color:'#0F6E56',cov:null,desc:'An aristocratic family cannot face the loss of their estate. Chekhov called it a comedy. The definitive play about the inability to change as the world changes around you.',rids:[13,15,26],rwhy:['Ensemble drama about the gap between who we are and who we were','The past as a physical weight','Comedy and tragedy inseparable'],monos:[{ch:'Lopakhin',g:'m',t:'Dramatic',d:"Lopakhin announcing he bought the orchard. Triumph and grief in equal measure -- one of Chekhov\'s most complex moments."},{ch:'Madame Ranevskaya',g:'f',t:'Dramatic',d:"Ranevskaya\'s confession speech. Self-knowledge that changes nothing."}],scenes:[{ch:[{n:'Lopakhin',g:'m'},{n:'Varya',g:'f'}],t:'Seriocomic',d:"The non-proposal scene. The scene where nothing happens that should have happened. Perfect Chekhov."}]},
  {id:120,key:'OL2900338W',title:'Three Sisters',author:'Anton Chekhov',year:1901,genre:'Drama',era:'1900s',cast:'large',castSize:14,gender:'mixed',themes:['longing','time','disappointment','Moscow','hope'],color:'#533AB7',cov:null,desc:'Three sisters in a provincial town dream of going to Moscow. They never go. The most heartbreaking of all of Chekhov\'s plays and the greatest ensemble drama ever written.',rids:[119,13,26],rwhy:['The same anatomy of thwarted desire','Ensemble work requiring total commitment','Time as the antagonist'],monos:[{ch:'Irina',g:'f',t:'Dramatic',d:"Irina accepting her fate in Act 4. Youth giving way to endurance -- difficult and rewarding."},{ch:'Vershinin',g:'m',t:'Dramatic',d:"Vershinin\'s philosophical speeches about the future. Optimism as a form of avoidance."}],scenes:[{ch:[{n:'Masha',g:'f'},{n:'Vershinin',g:'m'}],t:'Dramatic',d:"The love affair. Adult love portrayed with rare restraint."},{ch:[{n:'Irina',g:'f'},{n:'Tuzenbach',g:'m'}],t:'Dramatic',d:"Tuzenbach before the duel. A man saying goodbye without saying it."}]},
  {id:121,key:'OL2900340W',title:'Uncle Vanya',author:'Anton Chekhov',year:1897,genre:'Drama',era:'1800s',cast:'medium',castSize:8,gender:'mixed',themes:['wasted life','love','work','disappointment','hope'],color:'#185FA5',cov:null,desc:'A professor and his young wife arrive at a country estate and disrupt everything. Chekhov\'s most acerbic and self-lacerating play about wasted potential.',rids:[119,120,13],rwhy:['The waste of potential as tragedy','Love that will not be reciprocated','Endurance as the heroic act'],monos:[{ch:'Vanya',g:'m',t:'Dramatic',d:"Vanya\'s Act 3 breakdown. Humiliation and fury and grief -- one of Chekhov\'s most demanding speeches."},{ch:'Sonya',g:'f',t:'Dramatic',d:"Sonya\'s final speech. Endurance as a form of hope -- one of the most beautiful endings in theatre."}],scenes:[{ch:[{n:'Vanya',g:'m'},{n:'Yelena',g:'f'}],t:'Dramatic',d:"Vanya\'s hopeless declaration. Desire playing out exactly as badly as we feared."}]},
  {id:122,key:'OL2900342W',title:'The Seagull',author:'Anton Chekhov',year:1896,genre:'Drama',era:'1800s',cast:'large',castSize:10,gender:'mixed',themes:['art','longing','failure','love','time'],color:'#185FA5',cov:null,desc:"Chekhov's first great play -- a country estate, thwarted artists, failed love affairs. Everyone wants something they cannot have.",rids:[119,120,121],rwhy:['Both use the ensemble to map desire and disappointment','Art as aspiration and wound','The estate as a world in miniature'],monos:[{ch:'Nina',g:'f',t:'Dramatic',d:"Nina's Act 4 return. Heartbreaking recognition of failure -- requires an actor who can play damage without playing victim."},{ch:'Konstantin',g:'m',t:'Dramatic',d:"Konstantin on his new art. Young, earnest, ridiculous, and entirely right."}],scenes:[{ch:[{n:'Nina',g:'f'},{n:'Trigorin',g:'m'}],t:'Dramatic',d:"The lake scene. A masterclass in the erotics of celebrity and the danger of being seen."},{ch:[{n:'Masha',g:'f'},{n:'Medvedenko',g:'m'}],t:'Seriocomic',d:"The opening scene. Unrequited love played as weather."}]},
  {id:123,key:'OL2900344W',title:'Ivanov',author:'Anton Chekhov',year:1887,genre:'Drama',era:'1800s',cast:'large',castSize:11,gender:'mixed',themes:['depression','failure','marriage','guilt','Russia'],color:'#2C2C2A',cov:null,desc:'Ivanov is exhausted and cannot explain why. He has stopped loving his dying wife. A young woman loves him. Chekhov\'s first full-length play is a portrait of spiritual paralysis.',rids:[121,119,3],rwhy:['Depression as a dramatic subject before it had a name','A man failing his own life in real time','The Russian malady examined from the inside'],monos:[{ch:'Ivanov',g:'m',t:'Dramatic',d:"Ivanov\'s self-examination speeches. A man trying to diagnose his own failure -- contemporary in a 19th century frame."}],scenes:[{ch:[{n:'Ivanov',g:'m'},{n:'Sasha',g:'f'}],t:'Dramatic',d:"The attraction Ivanov cannot refuse and cannot accept."}]},
  {id:124,key:'OL2900346W',title:'Ghosts',author:'Henrik Ibsen',year:1881,genre:'Drama',era:'1800s',cast:'small',castSize:5,gender:'mixed',themes:['heredity','hypocrisy','syphilis','duty','past'],color:'#3A3A3A',cov:null,desc:'Mrs. Alving has dedicated her life to preserving her husband\'s reputation. The truth will not stay buried. Ibsen\'s most controversial play -- banned on first publication.',rids:[59,18,51],rwhy:['Both examine the price of a respectable lie','The sins of the father','A woman who has sacrificed everything for a false ideal'],monos:[{ch:'Mrs. Alving',g:'f',t:'Dramatic',d:"Mrs. Alving on the ghosts of the past. A woman who has finally started speaking the truth."},{ch:'Oswald',g:'m',t:'Dramatic',d:"Oswald asking his mother to help him die. One of the most devastating endings in drama."}],scenes:[{ch:[{n:'Mrs. Alving',g:'f'},{n:'Pastor Manders',g:'m'}],t:'Dramatic',d:"The confrontation about the truth of her marriage. Two people with completely different definitions of duty."}]},
  {id:125,key:'OL2900348W',title:'An Enemy of the People',author:'Henrik Ibsen',year:1882,genre:'Drama',era:'1800s',cast:'large',castSize:10,gender:'mixed',themes:['truth','democracy','corruption','courage','majority'],color:'#3B6D11',cov:null,desc:'Dr. Stockmann discovers the town\'s spa water is contaminated. The town refuses to hear it. Ibsen\'s most directly political play -- about what happens when the truth is bad for business.',rids:[124,65,31],rwhy:['Both examine the price of telling the truth to power','The individual against the community','Democracy as a potential tyranny of the majority'],monos:[{ch:'Dr. Stockmann',g:'m',t:'Dramatic',d:"Stockmann\'s great speech about the majority. A man so right he becomes wrong -- one of drama\'s great speeches about principle."},{ch:'Dr. Stockmann',g:'m',t:'Dramatic',d:"The declaration at the end. Defiance that is also a form of madness."}],scenes:[{ch:[{n:'Stockmann',g:'m'},{n:'Peter Stockmann',g:'m'}],t:'Dramatic',d:"The brothers. Truth and self-interest in a fraternal frame."}]},
  {id:126,key:'OL2900350W',title:'The Wild Duck',author:'Henrik Ibsen',year:1884,genre:'Drama',era:'1800s',cast:'large',castSize:9,gender:'mixed',themes:['illusion','truth','family','photography','revelation'],color:'#185FA5',cov:null,desc:'Gregers Werle returns to expose the lie at the center of his friend\'s marriage. The truth destroys. Ibsen\'s most ambivalent and modern play.',rids:[124,125,59],rwhy:['The most complex treatment of truth versus necessary illusion','The child who pays for the parents\' sins','Ibsen questioning his own earlier certainties'],monos:[{ch:'Hjalmar',g:'m',t:'Dramatic',d:"Hjalmar\'s self-deceptions. A man who cannot see himself -- comedic and pathetic simultaneously."},{ch:'Hedvig',g:'f',t:'Dramatic',d:"Hedvig and the wild duck. A child\'s love and what it costs her."}],scenes:[{ch:[{n:'Gregers',g:'m'},{n:'Hjalmar',g:'m'}],t:'Dramatic',d:"The friends. The idealist and the man he is trying to save."}]},
  {id:127,key:'OL2900352W',title:'The Children',author:'Lucy Kirkwood',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',themes:['nuclear','responsibility','climate','aging','future'],color:'#3B6D11',cov:null,desc:'Two retired nuclear scientists are visited by a former colleague after a coastal disaster. Kirkwood\'s taut chamber play about what we owe the future.',rids:[50,39,30],rwhy:['Both ask what responsibility to the future actually means','The past returning to demand something','Science and conscience inseparable'],monos:[{ch:'Rose',g:'f',t:'Dramatic',d:"Rose explaining why she has come. A request that is actually a demand -- precise and unsettling."},{ch:'Hazel',g:'f',t:'Dramatic',d:"Hazel defending her life against the claim of conscience."}],scenes:[{ch:[{n:'Robin',g:'m'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The former lovers. What was between them and what Rose is asking for now."},{ch:[{n:'Hazel',g:'f'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The women together. Among the most precisely written scenes in recent British drama."}]},
  {id:128,key:'OL2900354W',title:'A Doll\'s House Part 2',author:'Lucas Hnath',year:2017,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['marriage','freedom','feminism','return','consequence'],color:'#993556',cov:null,desc:'Nora comes back. It has been fifteen years. She needs something. Hnath\'s sequel to Ibsen is funny, combative, and entirely its own play.',rids:[59,22,13],rwhy:['The door Nora slammed has opened again','Both ask what freedom actually means for a woman','The sequel that illuminates the original'],monos:[{ch:'Nora',g:'f',t:'Dramatic',d:"Nora explaining her life since she left. A woman who has lived her argument and must now account for it."},{ch:'Anne Marie',g:'f',t:'Dramatic',d:"Anne Marie on what she gave to raise Nora\'s children. The cost of other women\'s freedom."}],scenes:[{ch:[{n:'Nora',g:'f'},{n:'Torvald',g:'m'}],t:'Dramatic',d:"The reunion. What fifteen years has done to both of them."},{ch:[{n:'Nora',g:'f'},{n:'Emmy',g:'f'}],t:'Dramatic',d:"Mother and daughter. The daughter who grew up without her."}]},
  {id:129,key:'OL2900356W',title:'The Effect',author:'Lucy Prebble',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['love','neuroscience','depression','free will','chemistry'],color:'#185FA5',cov:null,desc:'Two people fall in love on a drug trial. Is it real? A play about brain chemistry, depression, and whether any feeling is more than biology.',rids:[127,30,75],rwhy:['Both ask whether love can be trusted as a category','Science and emotion in genuine dialogue','The mind as the site of drama'],monos:[{ch:'Tristan',g:'m',t:'Dramatic',d:"Tristan on the value of feeling, even manufactured feeling. Funny and terrifying."},{ch:'Connie',g:'f',t:'Dramatic',d:"Connie after the trial ends. A quiet, controlled implosion."}],scenes:[{ch:[{n:'Connie',g:'f'},{n:'Tristan',g:'m'}],t:'Seriocomic',d:"The first attraction. Two clinical trial participants trying not to be human."}]},
  {id:130,key:'OL2900358W',title:'The Inheritance',author:'Matthew Lopez',year:2018,genre:'Drama',era:'2010s',cast:'large',castSize:10,gender:'male',themes:['AIDS','queerness','inheritance','New York','Forster'],color:'#533AB7',cov:null,desc:'Two generations of gay men in New York -- those who survived the AIDS crisis and those who came after -- find each other across time and E.M. Forster. The great queer epic of its era.',rids:[1,82,83],rwhy:['The AIDS generation and its inheritors','What one generation owes another','Epic queer theatre for the 21st century'],monos:[{ch:'Eric',g:'m',t:'Dramatic',d:"Eric on what was left and what was lost. A young man inheriting a history he didn\'t live."},{ch:'Walter',g:'m',t:'Dramatic',d:"Walter on the years of the crisis. Survival as its own form of grief."}],scenes:[{ch:[{n:'Toby',g:'m'},{n:'Eric',g:'m'}],t:'Dramatic',d:"The central relationship under strain. Love tested by history and ambition."}]},
  {id:131,key:'OL2900360W',title:'Small Mouth Sounds',author:'Bess Wohl',year:2015,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['silence','meditation','loneliness','retreat','language'],color:'#3B6D11',cov:null,desc:'Six strangers attend a silent meditation retreat. They are not allowed to speak. Wohl\'s play is mostly silent and completely devastating.',rids:[77,49,75],rwhy:['Both find everything in the mundane and the quiet','Silence as the dramatic medium','Loneliness as the condition we share'],monos:[{ch:'The Teacher',g:'nb',t:'Dramatic',d:"The Teacher\'s guidance -- the only speaking role. Instructions for a silence that reveals everything."},{ch:'Joan',g:'f',t:'Dramatic',d:"Joan\'s breakdown. A woman who has held everything together so long she cannot stay silent."}],scenes:[{ch:[{n:'Ned',g:'m'},{n:'Judy',g:'f'}],t:'Seriocomic',d:"The married couple who cannot stop communicating even in silence."}]},
  {id:132,key:'OL2900362W',title:'Grand Horizons',author:'Bess Wohl',year:2019,genre:'Comedy',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['marriage','divorce','family','desire','late life'],color:'#854F0B',cov:null,desc:'Nancy and Bill announce their divorce after fifty years. Their adult sons cannot cope. Wohl\'s funniest play is also her most generous.',rids:[131,96,78],rwhy:['Both examine what families cannot absorb','Late-life desire as a legitimate dramatic subject','Comedy that earns its tenderness'],monos:[{ch:'Nancy',g:'f',t:'Seriocomic',d:"Nancy explaining her decision. A woman who has waited fifty years to want something for herself."},{ch:'Bill',g:'m',t:'Seriocomic',d:"Bill on what he didn\'t know he wanted. A man discovering himself at seventy."}],scenes:[{ch:[{n:'Nancy',g:'f'},{n:'Bill',g:'m'}],t:'Seriocomic',d:"The announcement and its aftermath. Two people who are entirely serious being treated as a joke."},{ch:[{n:'Tom',g:'m'},{n:'Ben',g:'m'}],t:'Comedic',d:"The sons processing. Adult children completely unable to handle their parents being people."}]},
  {id:133,key:'OL2900364W',title:'Fairview',author:'Jackie Sibblies Drury',year:2018,genre:'Drama',era:'2010s',cast:'medium',castSize:7,gender:'mixed',themes:['race','theatre','audience','Blackness','form'],color:'#3A3A3A',cov:null,desc:'A Black family prepares for a birthday dinner. Then the play breaks apart and reassembles. Drury\'s Pulitzer winner is the most formally radical play about race in years.',rids:[98,90,97],rwhy:['Both use theatrical form as the argument about race','The audience as part of the problem','Blackness examined from inside and outside simultaneously'],monos:[{ch:'Beverly',g:'f',t:'Dramatic',d:"Beverly\'s final speech. A Black woman claiming the stage and naming what has been done -- extraordinary."},{ch:'Keisha',g:'f',t:'Dramatic',d:"Keisha\'s story. Young Black womanhood asserting its interiority."}],scenes:[{ch:[{n:'Beverly',g:'f'},{n:'Dayton',g:'m'}],t:'Seriocomic',d:"The married couple preparing. Black domestic life rendered with warmth before the play unmakes itself."}]},
  {id:134,key:'OL2900366W',title:'Marys Seacole',author:'Jackie Sibblies Drury',year:2019,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'female',themes:['nursing','race','history','care','Blackness'],color:'#993556',cov:null,desc:'Mary Seacole, the Jamaican nurse of the Crimean War, appears and disappears through a contemporary care home. Drury on what Black women\'s labor has always meant.',rids:[133,44,43],rwhy:['Both examine Black women\'s labor and what it is worth','History and the present occupying the same space','Care as a political act'],monos:[{ch:'Mary Seacole',g:'f',t:'Dramatic',d:"Mary on her hotel and her medicine. A woman who refused to be refused -- history made present."},{ch:'Mary (contemporary)',g:'f',t:'Dramatic',d:"The contemporary Mary on caring. What it costs and what it means."}],scenes:[{ch:[{n:'Mary Seacole',g:'f'},{n:'Mary (contemporary)',g:'f'}],t:'Dramatic',d:"The two Marys. History and present in conversation."}]},
  {id:135,key:'OL2900368W',title:'English',author:'Sanaz Toossi',year:2022,genre:'Drama',era:'2020s',cast:'medium',castSize:5,gender:'mixed',themes:['language','immigration','Iran','identity','belonging'],color:'#533AB7',cov:null,desc:'An English class in Iran. Students learning the language of departure. Toossi\'s Pulitzer winner is a play about what you lose when you gain a new language.',rids:[32,87,128],rwhy:['Both examine what language does to identity','The immigrant\'s relationship to a new tongue','Belonging as something a language can and cannot give'],monos:[{ch:'Marjan',g:'f',t:'Dramatic',d:"Marjan on why she is learning English. A woman preparing to leave everything."},{ch:'Elham',g:'f',t:'Dramatic',d:"Elham\'s resistance. A woman who does not want to learn the language of leaving."}],scenes:[{ch:[{n:'Marjan',g:'f'},{n:'Elham',g:'f'}],t:'Dramatic',d:"The two women. Different relationships to the same decision."},{ch:[{n:'Roya',g:'f'},{n:'Goli',g:'f'}],t:'Seriocomic',d:"The language practice scenes. Comedy that is also grief."}]},
  {id:136,key:'OL2900370W',title:'Wolf Play',author:'Hansol Jung',year:2020,genre:'Drama',era:'2020s',cast:'small',castSize:5,gender:'mixed',themes:['adoption','identity','Korea','family','belonging'],color:'#3B6D11',cov:null,desc:'A Korean boy has been re-homed three times. He has decided to be a wolf. A new family tries to reach him. Jung\'s play is feral and tender and unlike anything else.',rids:[135,34,99],rwhy:['Both use a child\'s imagination as the way into unbearable material','Identity as a costume a child puts on to survive','Adoption and belonging as a political question'],monos:[{ch:'Jeenu (the wolf)',g:'m',t:'Dramatic',d:"The wolf\'s speeches. A child who has chosen an animal identity -- requires complete physical commitment."},{ch:'Robin',g:'nb',t:'Dramatic',d:"Robin on what they want from this family. Non-binary identity and chosen kinship."}],scenes:[{ch:[{n:'Robin',g:'nb'},{n:'Poli',g:'f'}],t:'Dramatic',d:"The couple trying to reach the boy together. Love as a collaborative project."}]},
  {id:137,key:'OL2900372W',title:'Vietgone',author:'Qui Nguyen',year:2015,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['Vietnam','immigration','love','America','parents'],color:'#993C1D',cov:null,desc:'The story of how Qui Nguyen\'s parents met in a refugee camp in 1975. Told with hip-hop, action sequences, and a Vietnamese cast playing Americans as caricatures.',rids:[135,89,91],rwhy:['Both reframe immigration from the inside','The parents\' story as a way of understanding the child','Form as politics'],monos:[{ch:'Quang',g:'m',t:'Seriocomic',d:"Quang on what he left behind. A soldier discovering America from the wrong angle."},{ch:'Tong',g:'f',t:'Seriocomic',d:"Tong on what she will not accept. A woman who has survived everything and knows exactly what she wants."}],scenes:[{ch:[{n:'Quang',g:'m'},{n:'Tong',g:'f'}],t:'Seriocomic',d:"The courtship scenes. Romance between two people who have no reason to trust the future."}]},
  {id:138,key:'OL2900374W',title:'Gloria',author:'Branden Jacobs-Jenkins',year:2015,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['media','ambition','trauma','publishing','storytelling'],color:'#2C2C2A',cov:null,desc:'A magazine office in New York. A workplace shooting. And then: what happens to the survivors, and who gets to tell the story. Jacobs-Jenkins\'s most unsettling play.',rids:[97,98,77],rwhy:['Both use formal structure to make an argument about representation','Trauma as commodity','Who owns a story'],monos:[{ch:'Kendra',g:'f',t:'Dramatic',d:"Kendra on what happened and what it means for her career. The survivor who cannot stop calculating."},{ch:'Dean',g:'m',t:'Dramatic',d:"Dean\'s account. A man who was there and cannot be sure what he saw."}],scenes:[{ch:[{n:'Kendra',g:'f'},{n:'Nan',g:'f'}],t:'Dramatic',d:"The coworkers after. Two women processing the same event through completely different lenses."}]},
  {id:139,key:'OL2900376W',title:'4000 Miles',author:'Amy Herzog',year:2011,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['grief','generation','memory','cycling','family'],color:'#0F6E56',cov:null,desc:'Leo arrives at his grandmother Vera\'s apartment after cycling across America, having lost his best friend. Two people at opposite ends of life teach each other things.',rids:[131,96,49],rwhy:['Both find the enormous in the intimate','Two generations who need each other more than they know','Grief that cannot be named directly'],monos:[{ch:'Vera',g:'f',t:'Seriocomic',d:"Vera\'s reminiscences. A ninety-one-year-old communist with a completely precise memory -- one of contemporary theatre\'s great roles."},{ch:'Leo',g:'m',t:'Dramatic',d:"Leo on what happened to Joe. Grief spoken for the first time."}],scenes:[{ch:[{n:'Vera',g:'f'},{n:'Leo',g:'m'}],t:'Seriocomic',d:"The grandmother and grandson at 3am. Unexpected intimacy between two people who have not been close."}]},
  {id:140,key:'OL2900378W',title:'Mary Jane',author:'Amy Herzog',year:2017,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'female',themes:['motherhood','disability','care','community','endurance'],color:'#993556',cov:null,desc:'Mary Jane\'s son Alex has a serious illness. The play follows her through the system of care. Herzog\'s most rigorous and compassionate play.',rids:[139,88,50],rwhy:['Both examine care as a form of love that the system makes harder','Endurance as the heroic act','A world of women holding things together'],monos:[{ch:'Mary Jane',g:'f',t:'Dramatic',d:"Mary Jane explaining the situation to someone new. A woman who has become an expert in something she never wanted to know."},{ch:'Sherry/Chaya',g:'f',t:'Dramatic',d:"The other mothers. Finding community in the worst possible place."}],scenes:[{ch:[{n:'Mary Jane',g:'f'},{n:'Sherry',g:'f'}],t:'Dramatic',d:"The mothers together. The community that forms around shared catastrophe."}]},
  {id:141,key:'OL2900380W',title:'The Wolves',author:'Sarah DeLappe',year:2016,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'female',themes:['girlhood','sport','community','violence','America'],color:'#3B6D11',cov:null,desc:'Nine girls warm up for a soccer game. That is the entire play. DeLappe\'s debut captures how young women talk when no one is listening -- and it is extraordinary.',rids:[140,46,95],rwhy:['An all-female ensemble where everyone matters equally','Young women\'s interiority taken seriously','The mundane as the site of everything important'],monos:[{ch:'#25',g:'f',t:'Seriocomic',d:"#25 on Cambodia and the Khmer Rouge. A teenager who reads, surrounded by those who do not."},{ch:'#46',g:'f',t:'Dramatic',d:"#46\'s final scene. The most unexpected emotional arrival in recent American drama."}],scenes:[{ch:[{n:'#7',g:'f'},{n:'#25',g:'f'}],t:'Seriocomic',d:"Arguments about what women should talk about. Political dialogue as teenage argument."}]},
  {id:142,key:'OL2900382W',title:'Heroes of the Fourth Turning',author:'Will Arbery',year:2019,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['Catholicism','conservatism','America','faith','politics'],color:'#533AB7',cov:null,desc:'Four young conservatives gather at a Wyoming party after a woman is named president of their Catholic college. Arbery gives the right a full dramatic hearing -- and it is more disturbing than a takedown.',rids:[87,96,131],rwhy:['Both give their characters full complexity without endorsing them','Faith as a genuine dramatic force','The America that the coasts don\'t understand'],monos:[{ch:'Theresa',g:'f',t:'Dramatic',d:"Theresa\'s illness speech. A woman whose body and faith are in crisis simultaneously."},{ch:'Kevin',g:'m',t:'Dramatic',d:"Kevin\'s political rant. A young man whose anger is both repellent and completely understandable."}],scenes:[{ch:[{n:'Emily',g:'f'},{n:'Justin',g:'m'}],t:'Dramatic',d:"The former couple. History and ideology and residual feeling."}]},
  {id:143,key:'OL2900384W',title:'Gem of the Ocean',author:'August Wilson',year:2003,genre:'Drama',era:'2000s',cast:'medium',castSize:6,gender:'mixed',themes:['slavery','guilt','redemption','Pittsburgh','history'],color:'#993C1D',cov:null,desc:'1904 Pittsburgh. Citizen Barlow comes to Aunt Ester for healing. The first play in Wilson\'s Century Cycle -- reaching back to the spiritual roots of Black American life.',rids:[109,113,54],rwhy:['Both reach back to the spiritual and historical foundations','Guilt and redemption as the dramatic engine','The eldest woman in Wilson\'s cycle -- Aunt Ester'],monos:[{ch:'Aunt Ester',g:'f',t:'Dramatic',d:"Aunt Ester\'s rituals and pronouncements. A 285-year-old woman who is the repository of Black American memory."},{ch:'Citizen Barlow',g:'m',t:'Dramatic',d:"Citizen on his guilt. A man who cannot live with what he has done."}],scenes:[{ch:[{n:'Citizen',g:'m'},{n:'Aunt Ester',g:'f'}],t:'Dramatic',d:"The healing ritual. Wilson\'s most spiritual scene."}]},
  {id:144,key:'OL2900386W',title:'Radio Golf',author:'August Wilson',year:2005,genre:'Drama',era:'2000s',cast:'small',castSize:5,gender:'mixed',themes:['development','race','gentrification','Pittsburgh','legacy'],color:'#993C1D',cov:null,desc:'The final play in August Wilson\'s Century Cycle. 1997 Pittsburgh. A Black developer plans to demolish Aunt Ester\'s house. The century ends where it began.',rids:[143,113,54],rwhy:['The completion of Wilson\'s twenty-year project','Development and community in conflict','The legacy of Aunt Ester as the cycle\'s through-line'],monos:[{ch:'Harmond',g:'m',t:'Dramatic',d:"Harmond on his vision for Pittsburgh. A man who cannot see what he is destroying."},{ch:'Old Joe',g:'m',t:'Dramatic',d:"Old Joe on Aunt Ester\'s house. The past refusing to be demolished."}],scenes:[{ch:[{n:'Harmond',g:'m'},{n:'Sterling',g:'m'}],t:'Dramatic',d:"The two men and the house. Wilson\'s final argument about what Black Americans owe each other."}]},
