<script>
var API = 'https://mystagevault-production.up.railway.app';
var DEVICE_ID = 'dev_local';
try {
  var stored = localStorage.getItem('msv_id');
  if (stored) { DEVICE_ID = stored; }
  else { DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('msv_id', DEVICE_ID); }
} catch(e) {}

function apiSave(path, method, body) {
  fetch(API + path, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }).catch(function(){});
}

function loadFromBackend() {
  fetch(API + '/api/shelf/' + DEVICE_ID)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ shelf[r.play_key] = r.status; });
      return fetch(API + '/api/ratings/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ ratings[r.play_key] = r.rating; });
      return fetch(API + '/api/notes/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ notes[r.play_key] = r.note; });
      render();
    })
    .catch(function(){ render(); });
}

// State
var shelf={}, ratings={}, notes={}, page='discover', stab='read';
var monoQ='', monoGender='All', monoType='All', monoEra='All', monoLen='All';
var sceneQ='', sceneGender='All', sceneEra='All';
var playQ='', playGenre='All', playEra='All';
var olResults=[], olLoading=false;
var did=null;

// Color helpers
var COLORS=['#533AB7','#0F6E56','#993C1D','#3A3A3A','#185FA5','#854F0B','#993556','#444441','#3C3489','#3B6D11','#5C1E1E','#2C2C2A'];
function hc(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function ini(t){return(t||'').split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}

// Cover image
function cov(p,w,h){
  var c=p.color||hc(p.title||'');
  var url=null;
  if(p.cov) url='https://covers.openlibrary.org/b/id/'+p.cov+'-M.jpg';
  else if(p.key) url='https://covers.openlibrary.org/b/olid/'+p.key+'-M.jpg';
  return '<div class="cov" style="width:'+w+'px;height:'+h+'px;background:'+c+'">'
    +(url?'<img src="'+url+'" onerror="this.style.display=\'none\'">':ini(p.title))
    +'</div>';
}

// Shelf buttons on cards
function sbtns(id){
  id=String(id);
  var s=shelf[id]||null;
  return '<div class="sbtns" onclick="event.stopPropagation()">'
    +'<button class="sab'+(s==='read'?' sr':'')+'" onclick="tog(\''+id+'\',\'read\')">&#10003; Read</button>'
    +'<button class="sab'+(s==='reading'?' sg':'')+'" onclick="tog(\''+id+'\',\'reading\')">Reading</button>'
    +'<button class="sab'+(s==='want'?' sw':'')+'" onclick="tog(\''+id+'\',\'want\')">&#9829; Want</button>'
    +'</div>';
}

// Play card
function card(p){
  var pid=String(p.key||p.id);
  var s=shelf[pid]||null;
  var r=ratings[pid]||0;
  var rl={read:'&#10003; Read',reading:'Reading',want:'&#9829; Want'};
  var rc={read:'rr',reading:'rg',want:'rw'};
  return '<div class="pc" onclick="odp(\''+pid+'\')">'
    +(s?'<div class="rib '+rc[s]+'">'+rl[s]+'</div>':'')
    +cov(p,118,165)
    +'<div class="ctitle">'+p.title+'</div>'
    +'<div class="cauth">'+p.author+'</div>'
    +'<div class="cmeta">'
    +'<span style="font-size:10px;color:'+(r?'#f59e0b':'#e4e1da')+'">&#9733;&#9733;&#9733;&#9733;&#9733;</span>'
    +'<span class="cgenre">'+p.genre+'</span></div>'
    +sbtns(pid)+'</div>';
}

function grid(plays){
  return plays.length
    ?'<div class="cards">'+plays.map(card).join('')+'</div>'
    :'<div class="empty">&#128218; Nothing found.</div>';
}

// Gender dot
function gdot(g){
  var c={f:'#d4537e',m:'#378add',nb:'#639922'};
  return '<span class="gdot g'+g+'" style="background:'+(c[g]||'#999')+'"></span>';
}

// Script links
function scriptLinks(p){
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  return '<div class="get-script">'
    +'<span style="font-size:10px;color:#a09d97">Get the script:</span>'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">DPS</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">Library</a>'
    +'</div>';
}

// Navigation
var NAVS=[
  {id:'discover',icon:'&#127918;',label:'Discover'},
  {id:'shelf',icon:'&#128218;',label:'My shelf'},
  {id:'search',icon:'&#128269;',label:'Play search'},
  {section:'Audition tools'},
  {id:'monologues',icon:'&#127908;',label:'Monologue search'},
  {id:'scenes',icon:'&#128101;',label:'Scene search'}
];

function renderNav(){
  var html='';
  NAVS.forEach(function(n){
    if(n.section){
      html+='<div class="nav-section">'+n.section+'</div>';
    } else {
      html+='<div class="ni'+(page===n.id?' on':'')+'" onclick="go(\''+n.id+'\')">'
        +'<span class="ni-icon">'+n.icon+'</span>'+n.label+'</div>';
    }
  });
  document.getElementById('nav').innerHTML=html;
}

function go(p){page=p;render();}

// THEMES for featured rotation
var THEMES=[
  {name:'Plays by women',desc:'Playwrights who changed what theatre can say',filter:function(p){return ['Lorraine Hansberry','Caryl Churchill','Sarah Kane','Suzan-Lori Parks','Lynn Nottage','Paula Vogel','Sarah DeLappe','Lucy Kirkwood','Lucy Prebble','Anna Deavere Smith','Aphra Behn'].indexOf(p.author)>=0;}},
  {name:'Two-handers',desc:'Plays for exactly two actors',filter:function(p){return p.cast==='small'&&p.castSize===2;}},
  {name:'Solo shows',desc:'One performer carrying the whole stage',filter:function(p){return p.cast==='solo'||p.castSize===1;}},
  {name:'Queer theatre',desc:'Plays centering queer experience and identity',filter:function(p){return (p.themes||[]).some(function(t){return t==='queerness'||t==='sexuality'||t==='gender'||t==='AIDS';});}},
  {name:'American classics',desc:'The plays that defined American drama',filter:function(p){return ['Drama','Tragedy'].indexOf(p.genre)>=0&&['1940s','1950s','1960s','1970s','1980s','1990s','1900s'].indexOf(p.era)>=0&&['Tony Kushner','Lorraine Hansberry','Arthur Miller','Tennessee Williams','Suzan-Lori Parks','Edward Albee','Eugene O\'Neill','Sam Shepard'].indexOf(p.author)>=0;}},
  {name:'British theatre',desc:'From Pinter to Kane -- the British tradition',filter:function(p){return ['Harold Pinter','Caryl Churchill','Sarah Kane','Tom Stoppard','Lucy Kirkwood','Lucy Prebble','Brian Friel','J.M. Synge','Oscar Wilde','George Bernard Shaw'].indexOf(p.author)>=0;}},
  {name:'Classical roots',desc:'Shakespeare, the Greeks, and the canon',filter:function(p){return ['1600s','Ancient','Medieval','1500s'].indexOf(p.era)>=0||['William Shakespeare','Sophocles','Euripides','Aeschylus','Aristophanes','Moliere'].indexOf(p.author)>=0;}},
  {name:'Plays about race',desc:'Theatre that confronts race and identity head-on',filter:function(p){return (p.themes||[]).indexOf('race')>=0;}},
  {name:'Experimental and form-breaking',desc:'Plays that reinvented what theatre can be',filter:function(p){return ['Experimental','Absurdist'].indexOf(p.genre)>=0;}},
  {name:'Great monologue plays',desc:'Essential scripts for actors building their book',filter:function(p){return (p.monos||[]).length>=2;}}
];

function getFeatured(){
  var week=Math.floor(Date.now()/604800000);
  var theme=THEMES[week%THEMES.length];
  var matching=PLAYS.filter(theme.filter);
  // if fewer than 6 matching, pad with others
  if(matching.length<6){
    var others=PLAYS.filter(function(p){return matching.indexOf(p)<0;});
    var seed=week*7;
    while(matching.length<Math.min(12,PLAYS.length)&&others.length>0){
      seed=(seed*1664525+1013904223)&0xffffffff;
      var idx=Math.abs(seed)%others.length;
      matching.push(others[idx]);
      others.splice(idx,1);
    }
  }
  return {theme:theme,plays:matching.slice(0,12)};
}

// Pages
function render(){
  renderNav();
  var el=document.getElementById('cnt');
  if(page==='discover') el.innerHTML=renderDiscover();
  else if(page==='shelf') el.innerHTML=renderShelf();
  else if(page==='search') el.innerHTML=renderSearch();
  else if(page==='monologues') el.innerHTML=renderMonologues();
  else if(page==='scenes') el.innerHTML=renderScenes();
}

function renderDiscover(){
  var f=getFeatured();
  return '<div class="theme-badge">&#10024; Featured: '+f.theme.name+'</div>'
    +'<div class="psub">'+f.theme.desc+' -- updates weekly</div>'
    +grid(f.plays)
    +'<div class="ph" style="margin-top:24px">All plays in the vault</div>'
    +'<div class="psub">'+PLAYS.length+' curated plays with full monologue and scene data</div>'
    +grid(PLAYS);
}

function renderShelf(){
  var c={read:0,reading:0,want:0};
  Object.keys(shelf).forEach(function(k){if(c[shelf[k]]!==undefined)c[shelf[k]]++;});
  var mine=PLAYS.filter(function(p){return shelf[String(p.key||p.id)]===stab;});
  // also check OL plays
  var olMine=olResults.filter(function(p){return shelf[String(p.key||p.id)]===stab;});
  var allMine=mine.concat(olMine);
  function ts(t,dot,lbl){
    return '<button class="stab'+(stab===t?' on':'')+'" onclick="setST(\''+t+'\')">'
      +'<span class="tdot" style="background:'+dot+'"></span>'+lbl+(c[t]?' ('+c[t]+')':'')+'</button>';
  }
  return '<div class="ph">My shelf</div>'
    +'<div class="stabs">'+ts('read','#0a5e47','Read')+ts('reading','#154f8a','Reading')+ts('want','#8c2150','Want')+'</div>'
    +(allMine.length?grid(allMine):'<div class="empty">Nothing yet. Use the Read, Reading, or Want buttons on any play card.</div>');
}

function renderSearch(){
  var genres=['All','Drama','Comedy','Tragedy','Absurdist','Experimental','Musical'];
  var eras=['All','Ancient','1600s','1700s','1800s','1900s','1950s','1960s','1970s','1980s','1990s','2000s','2010s','2020s'];
  var q=playQ.toLowerCase();
  var localRes=PLAYS.filter(function(p){
    var mq=!q||p.title.toLowerCase().indexOf(q)>=0||p.author.toLowerCase().indexOf(q)>=0||(p.themes||[]).join(' ').indexOf(q)>=0;
    return mq&&(playGenre==='All'||p.genre===playGenre)&&(playEra==='All'||p.era===playEra);
  });
  var showOL=olResults.length>0;
  return '<div class="ph">Play search</div>'
    +'<div class="callout"><div class="callout-icon">&#128218;</div>'
    +'<div><div class="callout-title">Building your script book?</div>'
    +'<div class="callout-text">Search any title or playwright to find plays beyond our curated vault.</div>'
    +'<div class="callout-note">Monologue and scene data is only available for our '+PLAYS.length+' featured plays.</div></div></div>'
    +'<div class="fgroup"><div class="flbl">Genre</div><div class="chips">'
    +genres.map(function(g){return '<button class="chip'+(playGenre===g?' on':'')+'" data-fn="setPG" data-val="'+g+'">'+g+'</button>';}).join('')+'</div></div>'
    +'<div class="fgroup"><div class="flbl">Era</div><div class="chips">'
    +eras.map(function(e){return '<button class="chip'+(playEra===e?' on':'')+'" data-fn="setPE" data-val="'+e+'">'+e+'</button>';}).join('')+'</div></div>'
    +'<div class="rc">'+(olLoading?'Searching Open Library...':(showOL?olResults.length+' results from Open Library':localRes.length+' plays in vault'))+'</div>'
    +(olLoading?'<div class="empty">Searching...</div>':(showOL?grid(olResults):grid(localRes)));
}


function renderMonologues(){
  var genders=[{v:'All',l:'All genders'},{v:'f',l:'Female'},{v:'m',l:'Male'},{v:'nb',l:'Non-binary'}];
  var types=[{v:'All',l:'All types'},{v:'Dramatic',l:'Dramatic'},{v:'Comedic',l:'Comedic'},{v:'Seriocomic',l:'Seriocomic'},{v:'Tragic',l:'Tragic'}];
  var eras=[{v:'All',l:'Any era'},{v:'classical',l:'Classical'},{v:'modern',l:'Modern'},{v:'contemporary',l:'Contemporary'}];
  var items=getMonoItems();
  return '<div class="ph">Monologue search</div>'
    +'<div class="psub">Search '+countMonos()+' monologues across '+PLAYS.length+' plays.</div>'
    +'<div class="fgroup"><div class="flbl">Search</div>'
    +'<input type="search" id="mono-search-input" value="'+monoQ+'" oninput="setMQ(this.value)" placeholder="Character name, keyword, or theme..." style="width:100%;padding:7px 10px;border:1px solid #e4e1da;border-radius:7px;background:#f7f5f0;font-size:12px;color:#1a1916;outline:none;font-family:inherit;margin-bottom:5px"><div style="font-size:10px;color:#a09d97;margin-bottom:10px">Searches character names, descriptions, and themes across all curated plays</div></div>'
    +'<div class="fgroup"><div class="flbl">Character gender</div><div class="chips">'
    +genders.map(function(g){return '<button class="chip'+(monoGender===g.v?' on':'')+'" data-fn="setMG" data-val="'+g.v+'">'+g.l+'</button>';}).join('')+'</div></div>'
    +'<div class="fgroup"><div class="flbl">Type</div><div class="chips">'
    +types.map(function(t){return '<button class="chip'+(monoType===t.v?' on':'')+'" data-fn="setMT" data-val="'+t.v+'">'+t.l+'</button>';}).join('')+'</div></div>'
    +'<div class="fgroup"><div class="flbl">Era</div><div class="chips">'
    +eras.map(function(e){return '<button class="chip'+(monoEra===e.v?' on':'')+'" data-fn="setME" data-val="'+e.v+'">'+e.l+'</button>';}).join('')+'</div></div>'
    +'<div id="mono-results"><div class="rc">'+items.length+' monologue'+(items.length!==1?'s':'')+' found</div>'
    +items.map(monoCard).join('')+'</div>';
}


function renderScenes(){
  var mixes=[{v:'All',l:'Any mix'},{v:'F/F',l:'F/F'},{v:'M/M',l:'M/M'},{v:'M/F',l:'M/F'},{v:'Mixed/3+',l:'Mixed/3+'}];
  var eras=[{v:'All',l:'Any era'},{v:'classical',l:'Classical'},{v:'modern',l:'Modern'},{v:'contemporary',l:'Contemporary'}];
  var items=getSceneItems();
  return '<div class="ph">Scene search</div>'
    +'<div class="psub">Search '+countScenes()+' scenes across '+PLAYS.length+' plays.</div>'
    +'<div class="fgroup"><div class="flbl">Search</div>'
    +'<input type="search" id="scene-search-input" value="'+sceneQ+'" oninput="setSQ(this.value)" placeholder="Character name, keyword, or theme..." style="width:100%;padding:7px 10px;border:1px solid #e4e1da;border-radius:7px;background:#f7f5f0;font-size:12px;color:#1a1916;outline:none;font-family:inherit;margin-bottom:5px"><div style="font-size:10px;color:#a09d97;margin-bottom:10px">Searches character names, descriptions, and themes across all curated plays</div></div>'
    +'<div class="fgroup"><div class="flbl">Cast mix</div><div class="chips">'
    +mixes.map(function(m){return '<button class="chip'+(sceneGender===m.v?' on':'')+'" data-fn="setSG" data-val="'+m.v+'">'+m.l+'</button>';}).join('')+'</div></div>'
    +'<div class="fgroup"><div class="flbl">Era</div><div class="chips">'
    +eras.map(function(e){return '<button class="chip'+(sceneEra===e.v?' on':'')+'" data-fn="setSE" data-val="'+e.v+'">'+e.l+'</button>';}).join('')+'</div></div>'
    +'<div id="scene-results"><div class="rc">'+items.length+' scene'+(items.length!==1?'s':'')+' found</div>'
    +items.map(sceneCard).join('')+'</div>';
}



function getMonoItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.monos||[]).forEach(function(m){
      var matchQ=!monoQ||(m.ch&&m.ch.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||(m.d&&m.d.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(monoQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(monoQ.toLowerCase())>=0||(p.themes||[]).join(' ').toLowerCase().indexOf(monoQ.toLowerCase())>=0;
      var matchG=monoGender==='All'||m.g===monoGender;
      var matchT=monoType==='All'||m.t===monoType;
      var matchE=monoEra==='All'||(monoEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(monoEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(monoEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchT&&matchE) items.push({p:p,m:m});
    });
  });
  return items;
}

function monoCard(it){
  var p=it.p, m=it.m;
  var pid=String(p.key||p.id);
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  return '<div class="mc" data-play="'+pid+'">'
    +'<div class="mc-top">'+gdot(m.g)+'<span class="mc-char">'+m.ch+'</span>'
    +'<span class="mc-play">in <strong>'+p.title+'</strong></span>'
    +'<span class="mc-badge">'+m.t+'</span></div>'
    +'<div class="mc-meta">'+(m.g==='f'?'Female':m.g==='m'?'Male':'Non-binary')+' &middot; '+p.author+(p.year?' &middot; '+p.year:'')+(p.era?' &middot; '+p.era:'')+'</div>'
    +'<p class="mc-desc">'+m.d+'</p>'
    +(m.ex?'<div class="ex-box"><div class="ex-lbl">Sample text</div><p class="ex-txt">'+m.ex+'</p><p class="ex-src">'+m.exsrc+'</p></div>':'')
    +'<div class="get-script"><span style="font-size:10px;color:#a09d97">Get the script:</span>'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">DPS</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">Library</a>'
    +'</div></div>';
}

function getSceneItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.scenes||[]).forEach(function(s){
      var fs=s.ch.filter(function(c){return c.g==='f';}).length;
      var ms=s.ch.filter(function(c){return c.g==='m';}).length;
      var mix='Mixed/3+';
      if(s.ch.length===2){if(fs===2)mix='F/F';else if(ms===2)mix='M/M';else if(fs===1&&ms===1)mix='M/F';}
      var matchQ=!sceneQ||(s.d&&s.d.toLowerCase().indexOf(sceneQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||s.ch.some(function(c){return c.n&&c.n.toLowerCase().indexOf(sceneQ.toLowerCase())>=0;})||(p.themes||[]).join(' ').toLowerCase().indexOf(sceneQ.toLowerCase())>=0;
      var matchG=sceneGender==='All'||sceneGender===mix;
      var matchE=sceneEra==='All'||(sceneEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(sceneEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(sceneEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchE) items.push({p:p,s:s,mix:mix});
    });
  });
  return items;
}

function sceneCard(it){
  var p=it.p, s=it.s;
  var pid=String(p.key||p.id);
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  return '<div class="mc" data-play="'+pid+'">'
    +'<div class="mc-top">'
    +s.ch.map(function(c){return gdot(c.g)+'<span class="mc-char">'+c.n+'</span>';}).join('<span style="color:#a09d97;margin:0 2px">&middot;</span>')
    +'<span class="mc-badge">'+s.t+'</span>'
    +'<span class="mc-badge">'+it.mix+'</span></div>'
    +'<div class="mc-meta">from <strong>'+p.title+'</strong> &middot; '+p.author+(p.era?' &middot; '+p.era:'')+'</div>'
    +'<p class="mc-desc">'+s.d+'</p>'
    +'<div class="get-script"><span style="font-size:10px;color:#a09d97">Get the script:</span>'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">DPS</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">Library</a>'
    +'</div></div>';
}

function countMonos(){var n=0;PLAYS.forEach(function(p){n+=(p.monos||[]).length;});return n;}
function countScenes(){var n=0;PLAYS.forEach(function(p){n+=(p.scenes||[]).length;});return n;}

// Filter setters
function setST(t){stab=t;render();}
function setPG(v){playGenre=v;render();}
function setPE(v){playEra=v;render();}
function setMQ(v){monoQ=v;updateMonoResults();}
function setMG(v){monoGender=v;updateMonoResults();}
function setMT(v){monoType=v;updateMonoResults();}
function setME(v){monoEra=v;updateMonoResults();}
function setSQ(v){sceneQ=v;updateSceneResults();}
function setSG(v){sceneGender=v;updateSceneResults();}
function setSE(v){sceneEra=v;updateSceneResults();}

function updateMonoResults(){
  var el=document.getElementById('mono-results');
  if(!el){render();return;}
  var items=getMonoItems();
  el.innerHTML='<div class="rc">'+items.length+' monologue'+(items.length!==1?'s':'')+' found</div>'+items.map(monoCard).join('');
  // restore focus
  var inp=document.getElementById('mono-search-input');
  if(inp){var v=inp.value;inp.focus();inp.setSelectionRange(v.length,v.length);}
}

function updateSceneResults(){
  var el=document.getElementById('scene-results');
  if(!el){render();return;}
  var items=getSceneItems();
  el.innerHTML='<div class="rc">'+items.length+' scene'+(items.length!==1?'s':'')+' found</div>'+items.map(sceneCard).join('');
  var inp=document.getElementById('scene-search-input');
  if(inp){var v=inp.value;inp.focus();inp.setSelectionRange(v.length,v.length);}
}

// Global search bar
var sd;
function onSrch(v){
  playQ=v;monoQ=v;sceneQ=v;
  if(v.length>2){
    if(page==='discover') go('search');
    olLoading=true;render();
    clearTimeout(sd);
    sd=setTimeout(function(){doOLSearch(v);},400);
  } else {
    olResults=[];olLoading=false;
    render();
  }
}

function doOLSearch(q){
  fetch('https://openlibrary.org/search.json?q='+encodeURIComponent(q)+'&subject=drama&fields=key,title,author_name,first_publish_year,cover_i&limit=20')
    .then(function(r){return r.json();})
    .then(function(data){
      olResults=(data.docs||[]).map(function(doc){
        for(var i=0;i<PLAYS.length;i++){if(PLAYS[i].key===doc.key)return PLAYS[i];}
        return {id:doc.key,key:doc.key,title:doc.title||'Unknown',author:(doc.author_name||['Unknown'])[0],year:doc.first_publish_year||null,genre:'Drama',color:hc(doc.title||''),cov:doc.cover_i||null,themes:[],desc:'',rids:[],rwhy:[],monos:[],scenes:[]};
      });
      olLoading=false;render();
    })
    .catch(function(){olLoading=false;render();});
}

// Shelf/rating actions
function tog(id,val){
  id=String(id);
  if(shelf[id]===val){delete shelf[id];apiSave('/api/shelf/'+DEVICE_ID+'/'+encodeURIComponent(id),'DELETE',{});}
  else{shelf[id]=val;apiSave('/api/shelf/'+DEVICE_ID+'/'+encodeURIComponent(id),'PUT',{status:val});}
  var L={read:'Added to Read',reading:'Added to Reading',want:'Added to Want to read'};
  showT(shelf[id]?L[val]:'Removed from shelf');
  render();
  if(did===id)odp(id);
}

function setR(id,val){
  id=String(id);ratings[id]=val;
  apiSave('/api/ratings/'+DEVICE_ID+'/'+encodeURIComponent(id),'PUT',{rating:val});
  showT('Rated '+val+'/5');render();if(did===id)odp(id);
}

function saveN(id){
  id=String(id);
  var ta=document.getElementById('nta');
  if(ta){notes[id]=ta.value;apiSave('/api/notes/'+DEVICE_ID+'/'+encodeURIComponent(id),'PUT',{note:ta.value});}
  showT('Note saved');
}

// Detail panel
function odp(id){
  id=String(id);
  var p=null;
  for(var i=0;i<PLAYS.length;i++){if(String(PLAYS[i].key||PLAYS[i].id)===id){p=PLAYS[i];break;}}
  if(!p){for(var i=0;i<olResults.length;i++){if(String(olResults[i].key||olResults[i].id)===id){p=olResults[i];break;}}}
  if(!p)return;
  did=id;
  var r=ratings[id]||0,s=shelf[id]||null,note=notes[id]||'';
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  var recs=(p.rids||[]).map(function(rid,i){
    for(var j=0;j<PLAYS.length;j++){if(String(PLAYS[j].key||PLAYS[j].id)===String(rid)){return{p:PLAYS[j],why:(p.rwhy||[])[i]||'Similar play'};}}
    return null;
  }).filter(Boolean);
  function sc(v){return s===v?' '+(v==='read'?'ar':v==='reading'?'ag':'aw'):'';}
  var stars='';for(var i=1;i<=5;i++)stars+='<span class="rst'+(i<=r?' on':'')+'" onclick="setR(\''+id+'\','+i+')" onmouseover="hov('+i+')" onmouseout="uhov('+r+')">&#9733;</span>';
  var h='<div class="dph"><span class="dph-title">'+p.title+'</span>'
    +'<button onclick="cdp()" style="width:26px;height:26px;border:1px solid #e4e1da;border-radius:6px;background:#fff;cursor:pointer;font-family:inherit">&#10005;</button></div>'
    +'<div class="dpb">'
    +cov(p,88,124)
    +'<div class="dp-title">'+p.title+'</div>'
    +'<div class="dp-auth">'+p.author+(p.year?' &middot; '+p.year:'')+'</div>'
    +'<div class="dp-tags"><span class="cgenre">'+p.genre+'</span>'+(p.era?'<span class="cgenre">'+p.era+'</span>':'')+(p.cast?'<span class="cgenre">Cast: '+p.cast+'</span>':'')+(p.themes||[]).map(function(t){return '<span class="cgenre">'+t+'</span>';}).join('')+'</div>'
    +(p.desc?'<p class="dp-desc">'+p.desc+'</p>':'')
    +'<div class="dp-sub">My rating</div>'
    +'<div id="rr" style="display:flex;gap:3px;align-items:center;margin-bottom:3px">'+stars+(r?'<span style="font-size:11px;color:#a09d97;margin-left:4px">'+r+'/5</span>':'')+'</div>'
    +'<div class="dp-sub">Add to shelf</div>'
    +'<div class="srow">'
    +'<button class="sopt'+sc('read')+'" onclick="tog(\''+id+'\',\'read\')">&#10003;<br>Read</button>'
    +'<button class="sopt'+sc('reading')+'" onclick="tog(\''+id+'\',\'reading\')">&#128218;<br>Reading</button>'
    +'<button class="sopt'+sc('want')+'" onclick="tog(\''+id+'\',\'want\')">&#9829;<br>Want to read</button>'
    +'</div>'
    +'<div class="dp-sub">Get the script</div>'
    +'<div class="get-script">'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord Theatricals</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">Dramatists Play Service</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">WorldCat library</a>'
    +'</div>';
  if(p.desc===''){h+='<div style="margin-top:12px;padding:10px;background:#f7f5f0;border-radius:7px;font-size:11px;color:#6b6860">This play was found via Open Library search. Full monologue and scene data is available for our '+PLAYS.length+' curated plays.</div>';}
  +'<div class="dp-sub">My notes <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0">(private)</span></div>'
  +'<textarea id="nta" placeholder="What struck you?">'+note+'</textarea>'
  +'<div style="font-size:10px;color:#a09d97;margin-top:3px">&#128274; Only visible to you</div>'
  +'<button class="savebtn" onclick="saveN(\''+id+'\')">Save note</button>';
  h+='<div class="dp-sub">My notes <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0">(private)</span></div>'
    +'<textarea id="nta" placeholder="What struck you?">'+note+'</textarea>'
    +'<div style="font-size:10px;color:#a09d97;margin-top:3px">&#128274; Only visible to you</div>'
    +'<button class="savebtn" onclick="saveN(\''+id+'\')">Save note</button>';
  if(recs.length){
    h+='<div class="dp-sub">If you liked this, try...</div>';
    recs.forEach(function(rc){
      var rc2=rc.p,rcid=String(rc2.key||rc2.id);
      h+='<div class="ri" onclick="odp(\''+rcid+'\')">'+cov(rc2,24,36)
        +'<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+rc2.title+'</div>'
        +'<div style="font-size:10px;color:#a09d97">'+rc.why+'</div></div>'
        +'<span style="color:#a09d97">&#8250;</span></div>';
    });
  }
  if((p.monos||[]).length){
    h+='<div class="dp-sub">Monologues from this play</div>';
    p.monos.forEach(function(m){
      h+='<div class="mini"><div class="mini-top">'+gdot(m.g)+'<strong style="font-size:11px">'+m.ch+'</strong><span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+m.t+'</span></div><p class="mini-desc">'+m.d+'</p></div>';
    });
  }
  if((p.scenes||[]).length){
    h+='<div class="dp-sub">Scenes from this play</div>';
    p.scenes.forEach(function(sc){
      h+='<div class="mini"><div class="mini-top">'+sc.ch.map(function(c){return gdot(c.g)+'<span style="font-size:11px;font-weight:500">'+c.n+'</span>';}).join('<span style="color:#a09d97;margin:0 2px">&middot;</span>')+'<span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+sc.t+'</span></div><p class="mini-desc">'+sc.d+'</p></div>';
    });
  }
  h+='</div>';
  var dp=document.getElementById('dp');
  dp.innerHTML=h;dp.classList.add('open');
  document.getElementById('ov').style.display='block';
}

function cdp(){did=null;document.getElementById('dp').classList.remove('open');document.getElementById('ov').style.display='none';}

// Event delegation for chip buttons
document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-fn]');
  if(!btn) return;
  var fn = btn.getAttribute('data-fn');
  var val = btn.getAttribute('data-val');
  var fns = {
    setMG:setMG, setMT:setMT, setME:setME,
    setSG:setSG, setSE:setSE,
    setPG:setPG, setPE:setPE
  };
  if(fns[fn]) fns[fn](val);
});

// Event delegation for play cards and mono/scene cards
document.addEventListener('click', function(e){
  var card = e.target.closest('[data-play]');
  if(card && !e.target.closest('.sbtns') && !e.target.closest('[data-fn]')) {
    odp(card.getAttribute('data-play'));
  }
  var sab = e.target.closest('[data-shelf]');
  if(sab) {
    e.stopPropagation();
    var parts = sab.getAttribute('data-shelf').split('|');
    tog(parts[0], parts[1]);
  }
});
