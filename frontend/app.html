<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Stage Vault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f7f5f0;color:#1a1916;height:100vh;overflow:hidden}
#app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sb{width:190px;background:#fff;border-right:1px solid #e4e1da;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px 12px 12px;border-bottom:1px solid #e4e1da}
.logo-n{font-size:15px;font-weight:500;color:#1a1916}
nav{padding:8px 6px;flex:1}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:12px;color:#6b6860;margin-bottom:2px;cursor:pointer;user-select:none;transition:background 0.1s}
.ni:hover,.ni.on{background:#f7f5f0;color:#1a1916;font-weight:500}
.ni-icon{font-size:15px;width:16px;text-align:center}
.nav-section{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:#a09d97;padding:8px 9px 4px;margin-top:4px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e4e1da;padding:10px 13px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.topbar input{flex:1;padding:7px 10px;border:1px solid #e4e1da;border-radius:7px;background:#f7f5f0;font-size:12px;color:#1a1916;outline:none;font-family:inherit}
.topbar input:focus{border-color:#ccc9c0}
.tc-btn{padding:6px 11px;border:1px solid #e4e1da;border-radius:7px;font-size:11px;background:#fff;color:#6b6860;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.cnt{flex:1;overflow-y:auto;padding:16px 14px}

/* Section headers */
.ph{font-size:15px;font-weight:500;color:#1a1916;margin-bottom:4px}
.psub{font-size:11px;color:#a09d97;margin-bottom:14px}
.rc{font-size:11px;color:#a09d97;margin:6px 0 12px}

/* Play cards */
.cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.pc{width:138px;flex-shrink:0;background:#fff;border:1px solid #e4e1da;border-radius:10px;padding:10px;cursor:pointer;position:relative;transition:border-color 0.15s}
.pc:hover{border-color:#ccc9c0}
.cov{width:118px;height:165px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-style:italic;color:rgba(255,255,255,.92);margin-bottom:8px}
.cov img{width:100%;height:100%;object-fit:cover;display:block}
.ctitle{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:2px;color:#1a1916;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cauth{font-size:10px;color:#a09d97}
.cmeta{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.cgenre{font-size:9px;padding:1px 5px;border-radius:20px;background:#f7f5f0;color:#6b6860;border:1px solid #e4e1da}
.sbtns{display:flex;gap:3px;margin-top:8px}
.sab{flex:1;padding:5px 1px;border-radius:5px;font-size:9px;font-weight:500;border:1px solid #e4e1da;background:transparent;color:#6b6860;cursor:pointer;font-family:inherit;transition:all 0.1s}
.sab.sr{background:#e1f5ee;color:#0a5e47;border-color:#4dba95}
.sab.sg{background:#e6f1fb;color:#154f8a;border-color:#6ba8e3}
.sab.sw{background:#fdf0f5;color:#8c2150;border-color:#d4537e}
.rib{position:absolute;top:7px;left:7px;padding:2px 6px;border-radius:20px;font-size:9px;font-weight:500;pointer-events:none;z-index:2}
.rib.rr{background:#e1f5ee;color:#0a5e47;border:1px solid #4dba95}
.rib.rg{background:#e6f1fb;color:#154f8a;border:1px solid #6ba8e3}
.rib.rw{background:#fdf0f5;color:#8c2150;border:1px solid #d4537e}

/* Filters */
.fgroup{margin-bottom:12px}
.flbl{font-size:10px;color:#a09d97;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border:1px solid #e4e1da;border-radius:20px;font-size:11px;background:#fff;color:#6b6860;cursor:pointer;font-family:inherit;transition:all 0.1s}
.chip.on{background:#1a1916;color:#fff;border-color:#1a1916}

/* Shelf tabs */
.stabs{display:flex;border:1px solid #e4e1da;border-radius:7px;overflow:hidden;margin-bottom:14px;background:#fff}
.stab{flex:1;padding:7px 3px;font-size:11px;color:#6b6860;text-align:center;border-right:1px solid #e4e1da;background:transparent;cursor:pointer;border-top:none;border-bottom:none;border-left:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.1s}
.stab:last-child{border-right:none}
.stab.on{background:#f7f5f0;color:#1a1916;font-weight:500}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Monologue/scene cards */
.mc{background:#fff;border:1px solid #e4e1da;border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.mc:hover{border-color:#ccc9c0}
.mc-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.gdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.gf{background:#d4537e}.gm{background:#378add}.gnb{background:#639922}
.mc-char{font-size:12px;font-weight:500;color:#1a1916}
.mc-play{font-size:11px;color:#a09d97}
.mc-desc{font-size:11px;color:#6b6860;line-height:1.6;margin-top:4px}
.mc-badge{font-size:9px;padding:2px 6px;border-radius:20px;background:#f7f5f0;color:#6b6860;border:1px solid #e4e1da;white-space:nowrap;margin-left:auto}
.mc-meta{font-size:10px;color:#a09d97;margin:3px 0 5px}
.get-script{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;align-items:center}
.sl{padding:3px 7px;border:1px solid #e4e1da;border-radius:20px;font-size:10px;color:#6b6860;text-decoration:none;background:#fff;transition:all 0.1s}
.sl:hover{border-color:#ccc9c0;color:#1a1916}
.ex-box{margin-top:9px;padding:9px 11px;background:#f7f5f0;border-left:2px solid #ccc9c0;border-radius:0 5px 5px 0}
.ex-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a09d97;margin-bottom:3px}
.ex-txt{font-size:11px;font-style:italic;white-space:pre-wrap;line-height:1.8;color:#1a1916}
.ex-src{font-size:10px;color:#a09d97;margin-top:3px}

/* Callout box */
.callout{background:#fff;border:1px solid #e4e1da;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.callout-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.callout-title{font-size:13px;font-weight:500;color:#1a1916;margin-bottom:3px}
.callout-text{font-size:11px;color:#6b6860;line-height:1.6}
.callout-note{font-size:10px;color:#a09d97;margin-top:4px;font-style:italic}

/* Theme badge */
.theme-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:#1a1916;color:#fff;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:10px}

/* Detail panel */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:99}
.dp{position:fixed;top:0;right:0;width:390px;height:100%;background:#fff;border-left:1px solid #e4e1da;overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .25s cubic-bezier(.19,1,.22,1)}
.dp.open{transform:translateX(0)}
.dph{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #e4e1da;position:sticky;top:0;background:#fff;z-index:1}
.dph-title{font-size:12px;font-weight:500;color:#1a1916}
.dpb{padding:15px}
.dp-cov{width:90px;aspect-ratio:2/3;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-style:italic;color:rgba(255,255,255,.92);margin-bottom:12px}
.dp-cov img{width:100%;height:100%;object-fit:cover}
.dp-title{font-size:17px;font-weight:500;margin-bottom:2px;color:#1a1916}
.dp-auth{font-size:12px;color:#a09d97;margin-bottom:9px}
.dp-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.dp-desc{font-size:12px;color:#6b6860;line-height:1.7;margin-bottom:4px}
.dp-sub{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#a09d97;margin:14px 0 7px}
.srow{display:flex;gap:5px}
.sopt{flex:1;padding:8px 3px;border:1px solid #e4e1da;border-radius:7px;font-size:10px;font-weight:500;background:transparent;color:#6b6860;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:all 0.12s}
.sopt:hover{background:#f7f5f0}
.sopt.ar{background:#e1f5ee;color:#0a5e47;border-color:#4dba95;border-width:1.5px}
.sopt.ag{background:#e6f1fb;color:#154f8a;border-color:#6ba8e3;border-width:1.5px}
.sopt.aw{background:#fdf0f5;color:#8c2150;border-color:#d4537e;border-width:1.5px}
.rst{font-size:20px;cursor:pointer;color:#e4e1da;user-select:none;transition:color 0.1s}
.rst.on{color:#f59e0b}
textarea{width:100%;padding:8px;border:1px solid #e4e1da;border-radius:6px;font-size:12px;background:#f7f5f0;color:#1a1916;resize:vertical;min-height:60px;outline:none;font-family:inherit;line-height:1.6}
.savebtn{margin-top:6px;padding:5px 11px;border:1px solid #ccc9c0;border-radius:6px;font-size:11px;background:transparent;color:#1a1916;cursor:pointer;font-family:inherit}
.ri{display:flex;align-items:center;gap:7px;padding:7px;background:#f7f5f0;border-radius:6px;cursor:pointer;margin-bottom:5px;transition:background 0.1s}
.ri:hover{background:#e4e1da}
.mini{border:1px solid #e4e1da;border-radius:6px;padding:9px;margin-bottom:6px;background:#f7f5f0}
.mini-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.mini-desc{font-size:11px;color:#6b6860;line-height:1.5}

/* Theatre card */
.cm{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.cm.open{display:flex}
.cmi{background:#fff;border-radius:12px;padding:22px;max-width:400px;width:100%}
.tc{background:linear-gradient(135deg,#1a1714,#2d2620);border-radius:10px;padding:18px;color:#f4f3ef;margin-bottom:14px}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:#a09d97;font-size:12px;line-height:1.8}

/* Toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1916;color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;opacity:0;pointer-events:none;transition:all .2s;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="sb">
    <div class="logo"><div class="logo-n">&#127917; My Stage Vault</div></div>
    <nav id="nav"></nav>
  </div>
  <div class="main">
    <div class="topbar">
      <input type="search" id="srch" placeholder="Search plays and playwrights..." oninput="onSrch(this.value)">
      <button class="tc-btn" onclick="showCard()">&#127183; My card</button>
    </div>
    <div class="cnt" id="cnt"></div>
  </div>
</div>
<div class="ov" id="ov" onclick="cdp()"></div>
<div class="dp" id="dp"></div>
<div class="cm" id="cm"></div>
<div id="toast"></div>

<script>
var PLAYS=[
  {id:1,key:'OL17860290W',title:'Angels in America',author:'Tony Kushner',year:1991,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',runtime:210,themes:['AIDS','politics','religion','identity','queerness'],color:'#533AB7',cov:10527584,desc:'An epic two-part play set against the AIDS crisis in 1980s New York, weaving politics, religion, and hallucination into something vast and devastating.',rids:[2,14,5],rwhy:['Both are American epics grappling with identity','Queer experience at the center','Shared formal ambition'],monos:[{ch:'Prior Walter',g:'m',t:'Dramatic',d:"Prior's confrontation with the Angel, visionary, terrified, achingly funny. Demands full physical and emotional commitment."},{ch:'Harper Pitt',g:'f',t:'Seriocomic',d:"Harper's Antarctica hallucination. Strange, lonely, heartbreaking, a gift for someone who holds comedy and grief simultaneously."}],scenes:[{ch:[{n:'Prior',g:'m'},{n:'Louis',g:'m'}],t:'Dramatic',d:"Louis leaving Prior in hospital. Devastating two-hander requiring both actors to be simultaneously selfish and sympathetic."},{ch:[{n:'Harper',g:'f'},{n:'Prior',g:'m'}],t:'Surreal',d:"The shared hallucination, two strangers in a dream. Eerie and surprisingly playful."}]},
  {id:2,key:'OL46474W',title:'A Raisin in the Sun',author:'Lorraine Hansberry',year:1959,genre:'Drama',era:'1950s',cast:'medium',castSize:7,gender:'mixed',runtime:140,themes:['race','family','dreams','inequality','aspiration'],color:'#993C1D',cov:8739205,desc:'The Younger family waits on a life insurance check in their cramped Chicago apartment. A foundational American play about Black life, aspiration, and what gets deferred.',rids:[1,5,16],rwhy:['Both explore dreams deferred','Seminal American family drama','Richly drawn ensemble'],monos:[{ch:'Lena Younger',g:'f',t:'Dramatic',d:"Mama's speech about the plant. Deceptively simple, the whole character lives in the stubbornness beneath the tenderness."},{ch:'Walter Lee',g:'m',t:'Dramatic',d:"Walter's confrontation with Lindner. One of American theatre's great moments of dignity reclaimed under pressure."}],scenes:[{ch:[{n:'Beneatha',g:'f'},{n:'Asagai',g:'m'}],t:'Dramatic',d:"Debate about identity and Africa. Beautifully written argument scene with real intellectual content."},{ch:[{n:'Mama',g:'f'},{n:'Ruth',g:'f'}],t:'Dramatic',d:"Two generations of Black women holding the family together. Quiet, warm, heartbreaking."}]},
  {id:3,key:'OL27258W',title:'Waiting for Godot',author:'Samuel Beckett',year:1953,genre:'Absurdist',era:'1950s',cast:'small',castSize:4,gender:'male',runtime:120,themes:['existentialism','time','friendship','waiting','memory'],color:'#444441',cov:8739161,desc:"Two men wait endlessly for someone named Godot. Nothing happens, twice. One of the twentieth century's most profound theatrical experiences.",rids:[4,12,19],rwhy:['Existential waiting and absurdist time','Shared minimalism, maximum weight','Radical formal experimentation'],monos:[{ch:'Lucky',g:'m',t:'Dramatic',d:"Lucky's monologue, torrential, fragmented, without pause. One of the most technically demanding pieces in the canon.",ex:"On! Be on me! Kill me!\nLike the other. Please!\nI can't go on!\nI'll go on.",exsrc:'Waiting for Godot Act 2, US rights Grove Press; excerpt for identification only'},{ch:'Vladimir',g:'m',t:'Seriocomic',d:"Vladimir's meditation on memory and the tree. Quiet and devastating."}],scenes:[{ch:[{n:'Vladimir',g:'m'},{n:'Estragon',g:'m'}],t:'Comedic',d:"The hat-swapping routine. Pure clown work, timing is everything. Great for physical actors."}]},
  {id:4,key:'OL24164699W',title:'4.48 Psychosis',author:'Sarah Kane',year:2000,genre:'Experimental',era:'2000s',cast:'flexible',castSize:1,gender:'female',runtime:75,themes:['mental health','despair','love','fragmentation','time'],color:'#3A3A3A',cov:8226275,desc:"Kane's final play, no characters, no stage directions, pure language. The last work she completed before her death at 28.",rids:[3,12,21],rwhy:['Radical formal experimentation','Devastation and compassion in equal measure','Both demand total theatrical reinvention'],monos:[{ch:'[unnamed voice]',g:'nb',t:'Dramatic',d:"The opening sequence. Requires absolute stillness and precision. One of the most emotionally exposed pieces in contemporary drama."},{ch:'[unnamed voice]',g:'f',t:'Dramatic',d:"The medication list. Clinical and annihilating, a speech that functions as its own complete play."}],scenes:[{ch:[{n:'[voice 1]',g:'nb'},{n:'[voice 2]',g:'nb'}],t:'Dramatic',d:"The interrogation sequence, text does not assign lines. Brilliant for watching how two actors negotiate."}]},
  {id:5,key:'OL8442456M',title:'Topdog/Underdog',author:'Suzan-Lori Parks',year:2001,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'male',runtime:100,themes:['race','identity','brotherhood','hustle','inheritance'],color:'#185FA5',cov:8266140,desc:'Two brothers, Lincoln and Booth, share a flophouse room. A Pulitzer-winning two-hander about race, aspiration, and what gets inherited.',rids:[2,1,3],rwhy:['American plays about race and aspiration','Two-hander: character revealed through conflict','A world pressing down on its characters'],monos:[{ch:'Lincoln',g:'m',t:'Dramatic',d:"Lincoln's three-card monte street spiel, rhythmic, hypnotic. Requires real command of patter."},{ch:'Booth',g:'m',t:'Seriocomic',d:"Booth's fantasy of Grace. Tender and deluded, a window into desperate need to be seen."}],scenes:[{ch:[{n:'Lincoln',g:'m'},{n:'Booth',g:'m'}],t:'Dramatic',d:"The final card game. One of the most electrifying climaxes in contemporary American drama."}]},
  {id:6,key:'OL151238W',title:'Cloud Nine',author:'Caryl Churchill',year:1979,genre:'Comedy',era:'1970s',cast:'medium',castSize:6,gender:'mixed',runtime:110,themes:['gender','colonialism','sexuality','time','liberation'],color:'#0F6E56',cov:8226540,desc:'Act one: Victorian Africa. Act two: London 1979, the characters have only aged 25 years. Churchill dismantles gender and empire with surgical wit.',rids:[1,4,22],rwhy:['Queer identity through formally inventive structure','Gender as performance central to both','How society shapes the self'],monos:[{ch:'Betty (act 2)',g:'f',t:'Seriocomic',d:"Betty discovering herself at 50. Understated and enormously affecting, for actors who do less."},{ch:'Clive',g:'m',t:'Comedic',d:"Clive's opening address, pompous, earnest, absurd. Imperial confidence played ironically."}],scenes:[{ch:[{n:'Betty',g:'f'},{n:'Lin',g:'f'}],t:'Seriocomic',d:"Generational gap, sexual awakening, genuine warmth. One of Churchill's loveliest scenes."}]},
  {id:7,key:'OL102749W',title:'Hamlet',author:'William Shakespeare',year:1601,genre:'Tragedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',runtime:240,themes:['revenge','mortality','madness','family','corruption'],color:'#2C2C2A',cov:null,desc:"The Prince of Denmark is haunted by his father's ghost and tasked with revenge. The defining play of the English language.",rids:[8,9,3],rwhy:['Both interrogate power and its corruption','Revenge and moral consequence','Language as the primary action'],monos:[{ch:'Hamlet',g:'m',t:'Dramatic',d:"'To be or not to be', the most famous speech in English. Deceptively easy to over-act; the best performances find stillness."},{ch:'Ophelia',g:'f',t:'Dramatic',d:"Ophelia's mad scene. Requires enormous technical control to make coherent what appears incoherent."},{ch:'Gertrude',g:'f',t:'Dramatic',d:"The closet scene speech. Often cut but devastating when played with full moral complexity."}],scenes:[{ch:[{n:'Hamlet',g:'m'},{n:'Ophelia',g:'f'}],t:'Dramatic',d:"The nunnery scene. One of the most complex and debated two-handers in the canon, what does Hamlet know?"},{ch:[{n:'Hamlet',g:'m'},{n:'Horatio',g:'m'}],t:'Dramatic',d:"The graveyard scene. Friendship and mortality, surprisingly accessible audition material."}]},
  {id:8,key:'OL103156W',title:'Macbeth',author:'William Shakespeare',year:1606,genre:'Tragedy',era:'1600s',cast:'large',castSize:10,gender:'mixed',runtime:150,themes:['ambition','guilt','power','corruption','fate'],color:'#5C1E1E',cov:null,desc:'A Scottish general receives a prophecy and, with his wife, murders his way to the throne. Shakespeare at his most compressed and terrifying.',rids:[7,9,3],rwhy:['Both explore power and its costs','Guilt as a physical force','The body as a site of horror'],monos:[{ch:'Lady Macbeth',g:'f',t:'Dramatic',d:"'Out, damned spot', the sleepwalking scene. Requires an actor who can hold fragmentation and guilt simultaneously."},{ch:'Macbeth',g:'m',t:'Dramatic',d:"'Tomorrow and tomorrow and tomorrow.' Grief and nihilism in under twenty lines. One of the great audition pieces."}],scenes:[{ch:[{n:'Macbeth',g:'m'},{n:'Lady Macbeth',g:'f'}],t:'Dramatic',d:"The dagger scene / 'When shall we three meet again.' Power dynamics shifting in real time."}]},
  {id:9,key:'OL103028W',title:'A Midsummer Night\'s Dream',author:'William Shakespeare',year:1600,genre:'Comedy',era:'1600s',cast:'large',castSize:14,gender:'mixed',runtime:135,themes:['love','magic','transformation','theatre','confusion'],color:'#3B6D11',cov:null,desc:'Lovers, mechanicals, and fairy royalty collide in an enchanted wood. The most joyful play in the canon and still the hardest to get right.',rids:[7,8,6],rwhy:['Both use theatrical artifice to interrogate reality','The world turned upside down','Ensemble work at its most demanding'],monos:[{ch:'Helena',g:'f',t:'Comedic',d:"Helena's pursuit speech. Self-aware and faintly ridiculous, great for actors with comic timing and physical confidence."},{ch:'Puck',g:'nb',t:'Comedic',d:"'If we shadows have offended.' The epilogue, short, perfect, and a gift for an actor who can hold an audience in stillness."}],scenes:[{ch:[{n:'Titania',g:'f'},{n:'Bottom',g:'m'}],t:'Comedic',d:"The enchantment scene. Requires total commitment to the absurdity without winking at the audience."}]},
  {id:10,key:'OL102850W',title:'The Importance of Being Earnest',author:'Oscar Wilde',year:1895,genre:'Comedy',era:'1800s',cast:'medium',castSize:8,gender:'mixed',runtime:120,themes:['identity','class','marriage','absurdity','deception'],color:'#854F0B',cov:null,desc:"Two men lead double lives, both claiming to be called Ernest. Wilde's perfectly constructed comedy of manners, every line is a joke.",rids:[9,6,20],rwhy:['Both use comedy to expose class pretension','Language as the primary weapon','Perfectly constructed comic architecture'],monos:[{ch:'Lady Bracknell',g:'f',t:'Comedic',d:"The handbag interrogation. One of the great comic monologues, requires a performer who can play absolute sincerity for maximum absurdity."},{ch:'Gwendolen',g:'f',t:'Comedic',d:"Gwendolen on the name Ernest. Short, precise, and devastatingly funny when played without irony."}],scenes:[{ch:[{n:'Jack',g:'m'},{n:'Algernon',g:'m'}],t:'Comedic',d:"The opening drawing room scene. Brilliant for actors who can play subtext, both men are lying and both men know it."},{ch:[{n:'Gwendolen',g:'f'},{n:'Cecily',g:'f'}],t:'Comedic',d:"The garden confrontation. One of the funniest two-handers in English comedy, perfect comic rhythm required."}]},
  {id:11,key:'OL102945W',title:'A Streetcar Named Desire',author:'Tennessee Williams',year:1947,genre:'Drama',era:'1900s',cast:'medium',castSize:7,gender:'mixed',runtime:130,themes:['desire','decline','illusion','class','violence'],color:'#993556',cov:null,desc:'Blanche DuBois arrives at her sister Stella\'s New Orleans apartment and collides with the brutal Stanley Kowalski. Williams at his most operatic.',rids:[2,16,4],rwhy:['Both explore the violence beneath American aspiration','Illusion versus reality as a life force','Female characters of extraordinary complexity'],monos:[{ch:'Blanche',g:'f',t:'Dramatic',d:"Blanche's 'I have always depended on the kindness of strangers.' The ending monologue, heartbreaking, deluded, iconic."},{ch:'Blanche',g:'f',t:'Seriocomic',d:"Blanche on her arrival, funny and desperate and self-mythologizing. A masterclass in playing two things at once."}],scenes:[{ch:[{n:'Blanche',g:'f'},{n:'Stanley',g:'m'}],t:'Dramatic',d:"Any Blanche/Stanley confrontation scene. Requires actors who understand the erotic charge beneath the power struggle."},{ch:[{n:'Blanche',g:'f'},{n:'Stella',g:'f'}],t:'Dramatic',d:"The sisters' scenes, memory, loyalty, and survival. Often overlooked in favour of Stanley but dramatically richer."}]},
  {id:12,key:'OL2756W',title:'Endgame',author:'Samuel Beckett',year:1957,genre:'Absurdist',era:'1950s',cast:'small',castSize:4,gender:'mixed',runtime:90,themes:['endings','dependency','time','meaninglessness','routine'],color:'#444441',cov:null,desc:'Hamm is blind and paralyzed. Clov cannot sit. Their world is ending, or has already ended. Beckett\'s most concentrated and austere play.',rids:[3,4,19],rwhy:['The same formal rigour and emotional devastation','Dependency as dramatic engine','The end of everything as a starting point'],monos:[{ch:'Hamm',g:'m',t:'Dramatic',d:"Hamm's opening monologue and his 'chronicle' speeches. Requires extraordinary stillness from a performer who cannot move."},{ch:'Clov',g:'m',t:'Dramatic',d:"Clov's final speech. Preparation for departure, or not. Ambiguity as the entire content."}],scenes:[{ch:[{n:'Hamm',g:'m'},{n:'Clov',g:'m'}],t:'Dramatic',d:"Any exchange between Hamm and Clov. The master/servant dynamic contains the entire play's meaning."}]},
  {id:13,key:'OL2900101W',title:'The Seagull',author:'Anton Chekhov',year:1896,genre:'Drama',era:'1800s',cast:'large',castSize:10,gender:'mixed',runtime:140,themes:['art','longing','failure','love','time'],color:'#185FA5',cov:null,desc:"Chekhov's first great play, a country estate, thwarted artists, failed love affairs. Everyone wants something they cannot have.",rids:[14,15,11],rwhy:['Both use the ensemble to map desire and disappointment','Art as aspiration and wound','The estate as a world in miniature'],monos:[{ch:'Nina',g:'f',t:'Dramatic',d:"Nina's Act 4 return, 'I am a seagull.' Heartbreaking recognition of failure. Requires an actor who can play damage without playing victim."},{ch:'Konstantin',g:'m',t:'Dramatic',d:"Konstantin on his new art forms. Young, earnest, ridiculous, and entirely right. Great for younger actors."}],scenes:[{ch:[{n:'Nina',g:'f'},{n:'Trigorin',g:'m'}],t:'Dramatic',d:"The lake scene. A masterclass in the erotics of celebrity and the danger of being seen."},{ch:[{n:'Masha',g:'f'},{n:'Medvedenko',g:'m'}],t:'Seriocomic',d:"The opening scene. Unrequited love played as weather. Short and perfect for auditions."}]},
  {id:14,key:'OL2900104W',title:'The Cherry Orchard',author:'Anton Chekhov',year:1904,genre:'Comedy',era:'1900s',cast:'large',castSize:12,gender:'mixed',runtime:150,themes:['change','class','nostalgia','time','endings'],color:'#0F6E56',cov:null,desc:"Chekhov's final play, an aristocratic family cannot face the loss of their estate. The definitive play about the inability to change.",rids:[13,15,3],rwhy:['Ensemble drama about the gap between who we are and who we were','The past as a physical weight','Comedy and tragedy inseparable'],monos:[{ch:'Lopakhin',g:'m',t:'Dramatic',d:"Lopakhin's announcement that he has bought the orchard. Triumph and grief in equal measure, one of Chekhov's most complex moments."},{ch:'Madame Ranevskaya',g:'f',t:'Dramatic',d:"Ranevskaya's Act 2 confession speech. Self-knowledge that changes nothing. Devastating."}],scenes:[{ch:[{n:'Lopakhin',g:'m'},{n:'Varya',g:'f'}],t:'Seriocomic',d:"The non-proposal scene in Act 4. The scene where nothing happens that should have happened. Perfect Chekhov."}]},
  {id:15,key:'OL2900105W',title:'Three Sisters',author:'Anton Chekhov',year:1901,genre:'Drama',era:'1900s',cast:'large',castSize:14,gender:'mixed',runtime:160,themes:['longing','time','disappointment','love','Moscow'],color:'#533AB7',cov:null,desc:"Three sisters in a provincial town dream of going to Moscow. They never go. The most heartbreaking of all of Chekhov's plays.",rids:[13,14,11],rwhy:['The same anatomy of thwarted desire','Ensemble work requiring total commitment','Time as the antagonist'],monos:[{ch:'Irina',g:'f',t:'Dramatic',d:"Irina's Act 4 speech accepting her fate. Youth giving way to endurance. A difficult and rewarding audition piece."},{ch:'Vershinin',g:'m',t:'Dramatic',d:"Vershinin's philosophical speeches about the future. Optimism as a form of avoidance."}],scenes:[{ch:[{n:'Masha',g:'f'},{n:'Vershinin',g:'m'}],t:'Dramatic',d:"The love affair scenes. Adult love portrayed with rare restraint and accuracy."}]},
  {id:16,key:'OL2765941W',title:'Death of a Salesman',author:'Arthur Miller',year:1949,genre:'Drama',era:'1900s',cast:'medium',castSize:8,gender:'mixed',runtime:145,themes:['American dream','failure','family','illusion','masculinity'],color:'#993C1D',cov:null,desc:"Willy Loman is a travelling salesman who can no longer travel. Miller's masterpiece about the lies we tell ourselves and call a life.",rids:[2,11,1],rwhy:['Both diagnose the American dream as a wound','Family as the site of the reckoning','The father/son dynamic as tragedy'],monos:[{ch:'Willy Loman',g:'m',t:'Dramatic',d:"Willy's 'I'm not a dime a dozen' speech. Self-delusion as armour, requires an actor who can play dignity and delusion simultaneously."},{ch:'Linda',g:'f',t:'Dramatic',d:"Linda's 'Attention must be paid' speech. The play's moral center. Short and devastatingly clear."}],scenes:[{ch:[{n:'Willy',g:'m'},{n:'Biff',g:'m'}],t:'Dramatic',d:"The father/son confrontation scenes. American drama's defining relationship, requires actors who can hold both love and damage."}]},
  {id:17,key:'OL102777W',title:'The Glass Menagerie',author:'Tennessee Williams',year:1944,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',runtime:100,themes:['memory','escape','family','illusion','loneliness'],color:'#854F0B',cov:null,desc:"Tom narrates his memories of his mother Amanda and sister Laura from a time he is trying to escape. Williams's most tender and autobiographical play.",rids:[11,16,15],rwhy:['Memory as a dramatic structure','The family that cannot be left behind','Tenderness and claustrophobia together'],monos:[{ch:'Tom',g:'m',t:'Dramatic',d:"Tom's opening narrator speech. Sets the play's elegiac tone, requires real command of the poetic register."},{ch:'Amanda',g:'f',t:'Dramatic',d:"Amanda's recollections of her gentlemen callers. Simultaneously comic and heartbreaking, a great audition piece."}],scenes:[{ch:[{n:'Amanda',g:'f'},{n:'Tom',g:'m'}],t:'Dramatic',d:"The supper table arguments. The texture of family claustrophobia rendered exactly."},{ch:[{n:'Laura',g:'f'},{n:'Jim',g:'m'}],t:'Seriocomic',d:"The gentleman caller scene. Fragility and kindness, one of Williams's most delicate duets."}]},
  {id:18,key:'OL2900108W',title:'Hedda Gabler',author:'Henrik Ibsen',year:1891,genre:'Drama',era:'1800s',cast:'medium',castSize:6,gender:'mixed',runtime:130,themes:['freedom','power','boredom','marriage','destruction'],color:'#3C3489',cov:null,desc:'Hedda Gabler returns from her honeymoon to a life that already feels like a trap. Ibsen\'s most psychologically acute and modern character.',rids:[11,4,22],rwhy:['A woman destroying herself against her constraints','Psychological depth as dramatic engine','The drawing room as a prison'],monos:[{ch:'Hedda',g:'f',t:'Dramatic',d:"Hedda's 'vine leaves in his hair' speeches. Romantic fantasy as a form of control, requires an actor who can play intelligence and cruelty together."}],scenes:[{ch:[{n:'Hedda',g:'f'},{n:'Lövborg',g:'m'}],t:'Dramatic',d:"The pistol scene and confrontations. Power and desire, Ibsen's most volatile two-hander."},{ch:[{n:'Hedda',g:'f'},{n:'Thea',g:'f'}],t:'Dramatic',d:"Hedda and Thea, friendship as a form of competition. The most psychologically interesting relationship in the play."}]},
  {id:19,key:'OL2900110W',title:'Krapp\'s Last Tape',author:'Samuel Beckett',year:1958,genre:'Experimental',era:'1950s',cast:'solo',castSize:1,gender:'male',runtime:55,themes:['memory','time','regret','age','self'],color:'#2C2C2A',cov:null,desc:"An old man listens to recordings of his younger self. Beckett's most intimate and accessible play, and one of the great solo performance pieces.",rids:[3,12,4],rwhy:['The self in dialogue with time','Minimalism as a form of amplitude','A single performer carrying everything'],monos:[{ch:'Krapp',g:'m',t:'Dramatic',d:"The entire play is effectively one extended monologue in dialogue with the tape. Sample the opening or the banana sequence, unexpected comedy embedded in grief."}],scenes:[]},
  {id:20,key:'OL2900112W',title:'The Playboy of the Western World',author:'J.M. Synge',year:1907,genre:'Comedy',era:'1900s',cast:'medium',castSize:9,gender:'mixed',runtime:120,themes:['storytelling','violence','community','heroism','language'],color:'#3B6D11',cov:null,desc:"Christy Mahon arrives in a Mayo pub claiming to have killed his father. The community makes him a hero. Synge's language is unlike anything else in English theatre.",rids:[9,7,10],rwhy:['Both examine the stories communities tell themselves','Heroism as a social construction','Language as physical action'],monos:[{ch:'Christy',g:'m',t:'Comedic',d:"Christy's storytelling speeches, increasingly elaborate accounts of parricide. Requires a performer who can make tall tales physically irresistible."},{ch:'Pegeen Mike',g:'f',t:'Dramatic',d:"Pegeen's final lament. Short, brutal, perfectly compressed."}],scenes:[{ch:[{n:'Christy',g:'m'},{n:'Pegeen',g:'f'}],t:'Seriocomic',d:"The courtship scenes. Flirtation through violence and storytelling, unlike any other two-hander in English."}]},
  {id:21,key:'OL2900115W',title:'Blasted',author:'Sarah Kane',year:1995,genre:'Experimental',era:'1990s',cast:'small',castSize:3,gender:'mixed',runtime:90,themes:['violence','war','love','cruelty','survival'],color:'#3A3A3A',cov:null,desc:"A Leeds hotel room. A soldier. A war that arrives inside. Kane's debut exploded British theatre and has not stopped detonating since.",rids:[4,22,3],rwhy:['Both confront violence as a theatrical act','Love surviving the unsurvivable','Formal rupture as political act'],monos:[{ch:'Ian',g:'m',t:'Dramatic',d:"Ian's war monologue in Act 3. Requires an actor who can hold complete moral collapse without self-pity."},{ch:'Cate',g:'f',t:'Dramatic',d:"Cate's Act 1 breakdown speech. Seizures and love, deeply physical and technically demanding."}],scenes:[{ch:[{n:'Ian',g:'m'},{n:'Cate',g:'f'}],t:'Dramatic',d:"The opening hotel room scenes before the explosion. Domestic violence portrayed with devastating accuracy."}]},
  {id:22,key:'OL2900117W',title:'Top Girls',author:'Caryl Churchill',year:1982,genre:'Drama',era:'1980s',cast:'medium',castSize:7,gender:'female',runtime:120,themes:['feminism','ambition','class','history','sacrifice'],color:'#993556',cov:null,desc:"Marlene celebrates her promotion with a dinner party of historical women. Then the play moves to the present and the price of success becomes clear.",rids:[6,18,2],rwhy:['Female ambition and its costs','Class as the hidden variable','Formal invention serving political clarity'],monos:[{ch:'Marlene',g:'f',t:'Dramatic',d:"Marlene in the final scene with Joyce. The argument that is also a reckoning. Requires an actor who can be simultaneously right and wrong."},{ch:'Gret',g:'f',t:'Comedic',d:"Gret's account of her descent into hell. Comic heroism, a great set-piece for an actor with physical presence."}],scenes:[{ch:[{n:'Marlene',g:'f'},{n:'Joyce',g:'f'}],t:'Dramatic',d:"The final sister confrontation. Thatcherism as a family argument, the most politically dense two-hander in British theatre."}]},
  {id:23,key:'OL2900120W',title:'Arcadia',author:'Tom Stoppard',year:1993,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',runtime:180,themes:['mathematics','time','history','knowledge','entropy'],color:'#0F6E56',cov:null,desc:'Two time periods occupy the same room as characters in the past and present try to understand each other across two centuries. Stoppard at his most emotionally generous.',rids:[7,14,3],rwhy:['Both make time itself a character','Intellectual passion as a form of love','The past and present in conversation'],monos:[{ch:'Thomasina',g:'f',t:'Dramatic',d:"Thomasina's iterated algorithms speech. Mathematical insight played as pure joy, a gift for a performer who can make ideas physical."},{ch:'Valentine',g:'m',t:'Dramatic',d:"Valentine's explanation of chaos theory. The sexiest speech about mathematics ever written."}],scenes:[{ch:[{n:'Thomasina',g:'f'},{n:'Septimus',g:'m'}],t:'Seriocomic',d:"The tutorial scenes. A girl who is smarter than her teacher, romantic tension and intellectual energy together."}]},
  {id:24,key:'OL2900122W',title:'The Real Thing',author:'Tom Stoppard',year:1982,genre:'Drama',era:'1980s',cast:'medium',castSize:6,gender:'mixed',runtime:120,themes:['love','art','politics','authenticity','language'],color:'#533AB7',cov:null,desc:"Henry, a playwright, navigates love and fidelity. Stoppard's most intimate play and the one where he most directly asks what real feeling looks like.",rids:[23,13,17],rwhy:['Both ask what authentic emotion looks like','Art and love as parallel investigations','Language as the medium and the subject'],monos:[{ch:'Henry',g:'m',t:'Dramatic',d:"Henry's cricket bat speech. The definitive case for artistic standards as a moral position, funny, serious, and completely persuasive."}],scenes:[{ch:[{n:'Henry',g:'m'},{n:'Annie',g:'f'}],t:'Dramatic',d:"The confrontation scenes about fidelity. Stoppard writing about desire without his usual protective irony."}]},
  {id:25,key:'OL2900124W',title:'Yerma',author:'Federico Garcia Lorca',year:1934,genre:'Tragedy',era:'1900s',cast:'medium',castSize:8,gender:'mixed',runtime:110,themes:['fertility','desire','freedom','marriage','obsession'],color:'#993C1D',cov:null,desc:"A woman in rural Spain cannot conceive and her longing becomes a force of destruction. Lorca's most intense and elemental play.",rids:[18,11,4],rwhy:['Female desire and its costs','The body as the site of tragedy','Poetic language as emotional truth'],monos:[{ch:'Yerma',g:'f',t:'Dramatic',d:"Yerma's lullaby to the child she doesn't have. One of the most heartbreaking pieces in the repertoire, requires absolute commitment."},{ch:'Yerma',g:'f',t:'Dramatic',d:"The final confrontation. Pure physical and emotional extremity, a great audition for someone who can operate at full power."}],scenes:[{ch:[{n:'Yerma',g:'f'},{n:'Juan',g:'m'}],t:'Dramatic',d:"The marriage scenes. Desire and refusal in a vocabulary of earth and sky."}]},
  {id:26,key:'OL2900126W',title:'Uncle Vanya',author:'Anton Chekhov',year:1897,genre:'Drama',era:'1800s',cast:'medium',castSize:8,gender:'mixed',runtime:140,themes:['wasted life','love','work','disappointment','hope'],color:'#185FA5',cov:null,desc:"A professor and his young wife arrive at a country estate and disrupt everything. Chekhov's most acerbic and self-lacerating play.",rids:[14,13,15],rwhy:['The waste of potential as tragedy','Love that will not be reciprocated','Endurance as the heroic act'],monos:[{ch:'Vanya',g:'m',t:'Dramatic',d:"Vanya's Act 3 breakdown. Humiliation and fury and grief, all played simultaneously. One of Chekhov's most demanding speeches."},{ch:'Sonya',g:'f',t:'Dramatic',d:"Sonya's final 'We shall rest' speech. Endurance as a form of hope, one of the most beautiful endings in theatre."}],scenes:[{ch:[{n:'Vanya',g:'m'},{n:'Yelena',g:'f'}],t:'Dramatic',d:"Vanya's hopeless declaration. Desire playing out exactly as badly as we feared it would."}]},
  {id:27,key:'OL2900128W',title:'The Rover',author:'Aphra Behn',year:1677,genre:'Comedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',runtime:150,themes:['desire','freedom','gender','money','adventure'],color:'#854F0B',cov:null,desc:"English cavaliers in Naples pursue women who have their own ideas about desire and freedom. Behn's most popular play is raucous, feminist, and very funny.",rids:[10,9,20],rwhy:['Both use comedy to expose the gender politics of desire','Female agency as the real subject','Physical and verbal wit together'],monos:[{ch:'Hellena',g:'f',t:'Comedic',d:"Hellena's opening case for wanting to love before entering a convent. Sparkling and modern, great for actors who can play wit and warmth together."}],scenes:[{ch:[{n:'Hellena',g:'f'},{n:'Willmore',g:'m'}],t:'Seriocomic',d:"The courtship scenes. Sparring dialogue that requires actors who can keep up."}]},
  {id:28,key:'OL2900130W',title:'The Crucible',author:'Arthur Miller',year:1953,genre:'Drama',era:'1950s',cast:'large',castSize:14,gender:'mixed',runtime:145,themes:['witchhunts','mass hysteria','integrity','truth','power'],color:'#993C1D',cov:null,desc:"Salem, 1692. Girls accuse townspeople of witchcraft. Miller wrote it about McCarthyism but it refuses to stay historical.",rids:[16,7,2],rwhy:['Both examine institutional power and individual conscience','Truth as something you can die for','The community turning on itself'],monos:[{ch:'Proctor',g:'m',t:'Dramatic',d:"Proctor's final refusal to sign the confession. Integrity as a choice with real costs, the definitive speech about the price of a name."},{ch:'Elizabeth',g:'f',t:'Dramatic',d:"Elizabeth's courtroom testimony. A woman who cannot lie choosing between her husband and her God."}],scenes:[{ch:[{n:'Proctor',g:'m'},{n:'Abigail',g:'f'}],t:'Dramatic',d:"The opening private confrontation. Power, desire, and history, one of American drama's great charged two-handers."}]},
  {id:29,key:'OL2900132W',title:'Iphigenia in Splott',author:'Gary Owen',year:2015,genre:'Drama',era:'2010s',cast:'solo',castSize:1,gender:'female',runtime:70,themes:['austerity','sacrifice','class','motherhood','Wales'],color:'#854F0B',cov:null,desc:"Effie stands and tells you what happened to her. A 70-minute solo play set in Cardiff that tears austerity Britain apart with raw, unsparing beauty.",rids:[4,22,21],rwhy:['The monologue form used to its maximum political power','Working-class female experience at the center','Language as resistance'],monos:[{ch:'Effie',g:'f',t:'Dramatic',d:"The entire play. For audition, take the opening or the nightclub sequence. Ferocious energy, working-class Cardiff voice, completely contemporary."}],scenes:[]},
  {id:30,key:'OL2900134W',title:'The Effect',author:'Lucy Prebble',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',runtime:110,themes:['love','neuroscience','depression','free will','chemistry'],color:'#185FA5',cov:null,desc:"Two people fall in love on a drug trial. Is it real? A play about brain chemistry, depression, and whether any feeling is more than biology.",rids:[23,4,18],rwhy:['Both ask whether love can be trusted as a category','Science and emotion in genuine dialogue','The mind as the site of drama'],monos:[{ch:'Tristan',g:'m',t:'Dramatic',d:"Tristan on the value of feeling, even manufactured feeling. Funny and terrifying, great for actors who think on their feet."},{ch:'Connie',g:'f',t:'Dramatic',d:"Connie after the trial ends. A quiet, controlled implosion, requires an actor who can do nothing and have it read as everything."}],scenes:[{ch:[{n:'Connie',g:'f'},{n:'Tristan',g:'m'}],t:'Seriocomic',d:"The first attraction, two clinical trial participants trying not to be human. Sparkling dialogue, easy chemistry read."}]},
  {id:31,key:'OL2900136W',title:'An Inspector Calls',author:'J.B. Priestley',year:1945,genre:'Drama',era:'1900s',cast:'medium',castSize:7,gender:'mixed',runtime:100,themes:['class','responsibility','guilt','capitalism','community'],color:'#2C2C2A',cov:null,desc:'An Inspector arrives at a prosperous family\'s dinner party and dismantles their complacency. Priestley\'s perfectly constructed socialist mystery.',rids:[28,16,22],rwhy:['Both expose the costs of class privilege','The family as a microcosm of social failure','Collective responsibility as the subject'],monos:[{ch:'The Inspector',g:'m',t:'Dramatic',d:"The Inspector's closing speech. One of the great political speeches in English theatre, short, clear, and completely devastating."},{ch:'Sheila',g:'f',t:'Dramatic',d:"Sheila's Act 2 speech accepting responsibility. Youth recognizing what age refuses to see."}],scenes:[{ch:[{n:'The Inspector',g:'m'},{n:'Birling',g:'m'}],t:'Dramatic',d:"The interrogation scenes. Power and complacency exposed, great for actors who can play certainty and its unravelling."}]},
  {id:32,key:'OL2900138W',title:'Translations',author:'Brian Friel',year:1980,genre:'Drama',era:'1980s',cast:'medium',castSize:8,gender:'mixed',runtime:130,themes:['language','colonialism','identity','Ireland','loss'],color:'#3B6D11',cov:null,desc:'British soldiers arrive to map Ireland and rename its landscape. Friel\'s masterpiece about language, power, and what is lost in translation.',rids:[20,7,14],rwhy:['Both examine what language does to identity','Colonialism as a drama of naming','Loss that cannot be reversed'],monos:[{ch:'Manus',g:'m',t:'Dramatic',d:"Manus's departure speech. Pride, hurt, and impossible choices, a gift for actors who can play quiet devastation."},{ch:'Máire',g:'f',t:'Dramatic',d:"Máire on wanting to leave. Young desire playing against old loyalty."}],scenes:[{ch:[{n:'Máire',g:'f'},{n:'Yolland',g:'m'}],t:'Seriocomic',d:"The love scene where neither can speak the other's language. Pure theatrical poetry, requires actors who trust the silence."}]},
  {id:33,key:'OL2900140W',title:'Philadelphia, Here I Come!',author:'Brian Friel',year:1964,genre:'Drama',era:'1960s',cast:'medium',castSize:9,gender:'mixed',runtime:110,themes:['emigration','father/son','Ireland','memory','silence'],color:'#993556',cov:null,desc:'Gar O\'Donnell is leaving Ireland for Philadelphia tomorrow. The public and private faces of the same man play out his last night.',rids:[32,17,15],rwhy:['The interior life made theatrical','Emigration as a specifically Irish wound','The father/son silence at the center of everything'],monos:[{ch:'Gar Private',g:'m',t:'Seriocomic',d:"Gar Private's running commentary, the inner life we never speak. Comic and devastating in equal measure."},{ch:'Gar Public',g:'m',t:'Dramatic',d:"Gar's failed attempts to speak to his father. What we cannot say, one of Irish theatre's central subjects."}],scenes:[{ch:[{n:'Gar Public',g:'m'},{n:'S.B.',g:'m'}],t:'Dramatic',d:"The scenes between father and son that never become the conversation they need. Great for actors who can play past each other."}]},
  {id:34,key:'OL2900142W',title:'The Curious Incident of the Dog in the Night-Time',author:'Simon Stephens',year:2012,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'mixed',runtime:120,themes:['autism','family','truth','mathematics','journey'],color:'#0F6E56',cov:null,desc:"Christopher, 15, investigates the death of a neighbour's dog. Stephens's adaptation of Mark Haddon's novel reinvented what a stage could do.",rids:[23,9,30],rwhy:['Both make the logic of an unusual mind the theatrical engine','Truth-seeking as heroism','Physical theatre in service of character'],monos:[{ch:'Christopher',g:'m',t:'Dramatic',d:"Christopher's maths problem speeches. The joy of mathematical thinking made physical, requires an actor with genuine precision."},{ch:'Ed',g:'m',t:'Dramatic',d:"Ed's letter speeches. A father's love in the register he can manage. Heartbreaking when underplayed."}],scenes:[]},
  {id:35,key:'OL2900144W',title:'August: Osage County',author:'Tracy Letts',year:2007,genre:'Drama',era:'2000s',cast:'large',castSize:13,gender:'mixed',runtime:180,themes:['family','addiction','secrets','Oklahoma','cruelty'],color:'#854F0B',cov:null,desc:'The Weston family reunites after the patriarch disappears. Three acts, one house, and enough secrets to detonate everything. A modern American classic.',rids:[16,2,28],rwhy:['The American family as a site of violence','Secrets as structural support and bomb','Large ensemble where everyone matters'],monos:[{ch:'Violet',g:'f',t:'Dramatic',d:"Violet's pill speeches and dinner table explosion. Requires an actor who can play cruelty as a defense mechanism."},{ch:'Barbara',g:'f',t:'Dramatic',d:"Barbara's 'Thank God we can't tell the future' speech. The daughter becoming the mother, despite everything."}],scenes:[{ch:[{n:'Barbara',g:'f'},{n:'Violet',g:'f'}],t:'Dramatic',d:"The mother/daughter confrontations. Two equally matched, equally damaged women. American drama's great contemporary two-hander."},{ch:[{n:'Ivy',g:'f'},{n:'Barbara',g:'f'},{n:'Karen',g:'f'}],t:'Seriocomic',d:"The sisters together. Three women processing the same family in completely different registers."}]},
  {id:36,key:'OL2900146W',title:'Doubt: A Parable',author:'John Patrick Shanley',year:2005,genre:'Drama',era:'2000s',cast:'small',castSize:4,gender:'mixed',runtime:90,themes:['doubt','power','faith','accusation','certainty'],color:'#2C2C2A',cov:null,desc:"Sister Aloysius suspects a priest of abuse. The evidence is ambiguous. A perfect play about certainty, doubt, and the cost of knowing.",rids:[28,31,7],rwhy:['Both examine institutional power and its secrets','The impossibility of certainty as dramatic engine','Two matched wills in a power struggle'],monos:[{ch:'Sister Aloysius',g:'f',t:'Dramatic',d:"Aloysius's final confession of doubt. The certainty she built everything on collapsing, a devastating and very brief speech."},{ch:'Father Flynn',g:'m',t:'Dramatic',d:"Flynn's sermon speeches. Using the pulpit to play the audience, great for actors who can hold a room."}],scenes:[{ch:[{n:'Sister Aloysius',g:'f'},{n:'Father Flynn',g:'m'}],t:'Dramatic',d:"The three confrontation scenes. Among the most precisely written power struggles in contemporary American drama."}]},
  {id:37,key:'OL2900148W',title:'How I Learned to Drive',author:'Paula Vogel',year:1997,genre:'Drama',era:'1990s',cast:'small',castSize:5,gender:'mixed',runtime:95,themes:['abuse','memory','family','survival','complicity'],color:'#533AB7',cov:null,desc:"Li'l Bit remembers learning to drive, and the lessons she didn't ask for. Vogel's structurally daring play about survival and the complexity of love.",rids:[11,4,30],rwhy:['Memory as a non-linear structure','Complicity and survival as equally real','Female experience told on its own terms'],monos:[{ch:"Li'l Bit",g:'f',t:'Dramatic',d:"Li'l Bit's narration speeches. The adult looking back at the child she was, requires an actor who can hold perspective and vulnerability simultaneously."}],scenes:[{ch:[{n:"Li'l Bit",g:'f'},{n:'Peck',g:'m'}],t:'Dramatic',d:"The driving lesson scenes. Manipulation rendered in a domestic register, requires actors who can play affection and danger at once."}]},
  {id:38,key:'OL2900150W',title:'The Homecoming',author:'Harold Pinter',year:1965,genre:'Drama',era:'1960s',cast:'medium',castSize:6,gender:'mixed',runtime:110,themes:['power','family','desire','language','dominance'],color:'#444441',cov:null,desc:"Teddy brings his wife Ruth home to meet his father and brothers in North London. What happens next is one of theatre's great acts of controlled menace.",rids:[21,4,7],rwhy:['Language as power and weapon','The family as a site of violence','Ambiguity as the entire content'],monos:[{ch:'Ruth',g:'f',t:'Dramatic',d:"Ruth's speech about her past. Information delivered as control, a masterclass in saying everything and nothing."},{ch:'Lenny',g:'m',t:'Dramatic',d:"Lenny's woman in the park story. Casual menace deployed as anecdote, requires an actor who can play danger as charm."}],scenes:[{ch:[{n:'Ruth',g:'f'},{n:'Lenny',g:'m'}],t:'Dramatic',d:"The glass of water scene. One of Pinter's most concentrated demonstrations of power shifting without a word of explanation."}]},
  {id:39,key:'OL2900152W',title:'Copenhagen',author:'Michael Frayn',year:1998,genre:'Drama',era:'1990s',cast:'small',castSize:3,gender:'mixed',runtime:120,themes:['physics','history','memory','morality','uncertainty'],color:'#185FA5',cov:null,desc:"The ghosts of Niels Bohr and Werner Heisenberg revisit their 1941 meeting in Copenhagen. What was said? Why did Heisenberg come? The uncertainty is the play.",rids:[23,3,24],rwhy:['Both make intellectual debate feel like life and death','Uncertainty as a structural principle','The past that cannot be recovered'],monos:[{ch:'Heisenberg',g:'m',t:'Dramatic',d:"Heisenberg's explanations of his wartime choices. Self-justification that may or may not be true, requires an actor who can hold ambiguity."},{ch:'Margrethe',g:'f',t:'Dramatic',d:"Margrethe's commentary speeches. The observer changing what is observed, the play's moral voice."}],scenes:[{ch:[{n:'Bohr',g:'m'},{n:'Heisenberg',g:'m'}],t:'Dramatic',d:"Any of the reconstruction sequences. Two great intellects in a room, great for actors who can make ideas physical."}]},
  {id:40,key:'OL2900154W',title:'The Threepenny Opera',author:'Bertolt Brecht',year:1928,genre:'Musical',era:'1900s',cast:'large',castSize:14,gender:'mixed',runtime:130,themes:['capitalism','crime','morality','class','corruption'],color:'#5C1E1E',cov:null,desc:"Macheath, Mack the Knife, runs his criminal enterprise in Victorian London. Brecht and Weill's savage, joyful attack on bourgeois morality.",rids:[22,31,6],rwhy:['Both use form to expose capitalism','Morality as a question of who is asking','The audience implicated in what it is watching'],monos:[{ch:'Peachum',g:'m',t:'Dramatic',d:"Peachum's opening speech about the misery business. Corporate logic applied to poverty, darkly hilarious."},{ch:'Jenny',g:'f',t:'Dramatic',d:"Jenny's Pirate Jenny speech. One of the great fantasies of revenge and power in musical theatre."}],scenes:[{ch:[{n:'Macheath',g:'m'},{n:'Polly',g:'f'}],t:'Seriocomic',d:"The wedding scenes. Brecht's most romantic scenes, which is to say, not very romantic at all."}]},
  {id:41,key:'OL2900156W',title:'The Laramie Project',author:'Moisés Kaufman',year:2000,genre:'Drama',era:'2000s',cast:'large',castSize:8,gender:'mixed',runtime:130,themes:['hate crime','community','journalism','grief','America'],color:'#3B6D11',cov:null,desc:"Members of Tectonic Theater Project interview residents of Laramie, Wyoming after the murder of Matthew Shepard. A landmark of verbatim theatre.",rids:[1,29,37],rwhy:['Queer loss as a public wound','A community confronting itself','Documentary form in service of empathy'],monos:[{ch:'Various voices',g:'nb',t:'Dramatic',d:"Any of the individual testimony speeches. Great for actors who want to inhabit a real person's register, requires precision and restraint."}],scenes:[]},
  {id:42,key:'OL2900158W',title:'Sweat',author:'Lynn Nottage',year:2015,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'mixed',runtime:130,themes:['deindustrialization','race','class','friendship','America'],color:'#993C1D',cov:null,desc:"Workers at a Reading, Pennsylvania factory navigate job losses, racial tension, and friendships under pressure. Nottage's Pulitzer-winning play about what deindustrialization costs.",rids:[2,5,35],rwhy:['The American working class as a dramatic subject','Race and class as entangled forces','Friendship under economic pressure'],monos:[{ch:'Tracey',g:'f',t:'Dramatic',d:"Tracey's speeches defending her choices. Pride and prejudice in a register that feels entirely contemporary."},{ch:'Chris',g:'m',t:'Dramatic',d:"Chris's visions of escape. Young male aspiration in a town that has stopped aspiring."}],scenes:[{ch:[{n:'Cynthia',g:'f'},{n:'Tracey',g:'f'}],t:'Dramatic',d:"The central friendship under pressure. Two women who love each other and what economics does to that love."}]},
  {id:43,key:'OL2900160W',title:'Fires in the Mirror',author:'Anna Deavere Smith',year:1992,genre:'Drama',era:'1990s',cast:'solo',castSize:1,gender:'female',runtime:100,themes:['race','community','Crown Heights','identity','America'],color:'#533AB7',cov:null,desc:"Smith plays over 25 real people from the Crown Heights riots. A one-woman documentary performance that redefined what solo theatre can do.",rids:[41,29,22],rwhy:['Verbatim performance as political act','A single performer holding multiple perspectives','Race as the central dramatic fact'],monos:[{ch:'Various voices',g:'nb',t:'Dramatic',d:"Any single character speech, Al Sharpton, the Crown Heights women, the scholars. Great audition material for performers who can transform physically."}],scenes:[]},
  {id:44,key:'OL2900162W',title:'Intimate Apparel',author:'Lynn Nottage',year:2003,genre:'Drama',era:'2000s',cast:'medium',castSize:6,gender:'mixed',runtime:100,themes:['race','desire','loneliness','labor','New York'],color:'#854F0B',cov:null,desc:"Esther, a Black seamstress in 1905 New York, saves money for a beauty parlor and falls in love through letters. Nottage's most tender and devastating play.",rids:[2,11,37],rwhy:["A Black woman's interiority at the center",'Desire across class and racial lines','Labor and longing together'],monos:[{ch:'Esther',g:'f',t:'Dramatic',d:"Esther's speech about her quilt squares and her savings. Dreams held in objects, one of the most moving pieces in contemporary American drama."}],scenes:[{ch:[{n:'Esther',g:'f'},{n:'George',g:'m'}],t:'Dramatic',d:"The letter-reading scenes and first meeting. Intimacy across impossible distances, deeply romantic and deeply sad."}]},
  {id:45,key:'OL2900164W',title:'Caroline, or Change',author:'Tony Kushner',year:2003,genre:'Musical',era:'2000s',cast:'large',castSize:10,gender:'mixed',runtime:140,themes:['race','civil rights','class','grief','change'],color:'#533AB7',cov:null,desc:"1963 Louisiana. Caroline is a Black maid. Noah is the Jewish boy whose family employs her. Kushner and Tesori's sung-through musical about what change costs.",rids:[1,2,42],rwhy:['Race and class in 1960s America',"Kushner's political and emotional range",'Change as something that happens to people, not for them'],monos:[{ch:'Caroline',g:'f',t:'Dramatic',d:"Caroline's solo scenes about her life. The woman who holds everything together holding herself. Immense contained power required."}],scenes:[]},
  {id:46,key:'OL2900166W',title:'The Wolves',author:'Sarah DeLappe',year:2016,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'female',runtime:90,themes:['girlhood','sport','community','violence','America'],color:'#3B6D11',cov:null,desc:"Nine girls warm up for a soccer game. That is the whole play. DeLappe's astonishing debut captures how young women talk when adults are not present.",rids:[22,42,29],rwhy:['Female ensemble where everyone matters equally',"Young women's interiority taken seriously",'The mundane as the site of everything important'],monos:[{ch:'#25',g:'f',t:'Seriocomic',d:"#25's speeches about Cambodia and the Khmer Rouge, a teenager who reads, surrounded by people who do not. Funny and isolating."},{ch:'#46',g:'f',t:'Dramatic',d:"#46's final scene. The most unexpected emotional arrival in recent American drama."}],scenes:[{ch:[{n:'#7',g:'f'},{n:'#25',g:'f'}],t:'Seriocomic',d:"The arguments about what women should talk about. Political dialogue rendered as teenage argument."}]},
  {id:47,key:'OL2900168W',title:'Ottoline and the Purple Factory',author:'Nick Hern',year:2019,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',runtime:100,themes:['class','labor','family','secrets','England'],color:'#3C3489',cov:null,desc:"A family business hides a secret. Sharp class observation in the English tradition, a recent addition to the contemporary canon.",rids:[31,38,22],rwhy:['Class as the hidden engine','English restraint masking extreme feeling','Secrets that the form itself embodies'],monos:[],scenes:[]},
  {id:48,key:'OL2900170W',title:'A Number',author:'Caryl Churchill',year:2002,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'male',runtime:60,themes:['cloning','identity','fatherhood','genetics','self'],color:'#0F6E56',cov:null,desc:"A man discovers his son has been cloned. Churchill's 55-minute masterpiece about identity, responsibility, and what makes a person.",rids:[6,4,23],rwhy:['Both ask what identity actually consists of','Formal compression serving maximum meaning','Science as emotional rather than intellectual subject'],monos:[{ch:'Salter',g:'m',t:'Dramatic',d:"Salter's confessions to his various sons. Each version a different reckoning with the same guilt."}],scenes:[{ch:[{n:'Salter',g:'m'},{n:'Bernard',g:'m'}],t:'Dramatic',d:"Each of the five scenes with a different son, or the same son. Any of them works as a two-hander. Extreme precision required."}]},
  {id:49,key:'OL2900172W',title:'The Humans',author:'Stephen Karam',year:2014,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',runtime:105,themes:['family','fear','America','class','health'],color:'#2C2C2A',cov:null,desc:"The Blake family gathers in a New York apartment for Thanksgiving. Underneath the warmth, everyone is terrified. Karam's Tony-winning play about modern American anxiety.",rids:[35,16,17],rwhy:['The American family as a container for national fear','Economic anxiety made domestic and personal','An ensemble where subtext is the entire text'],monos:[{ch:'Erik',g:'m',t:'Dramatic',d:"Erik's speeches about his nightmares and his fears. A man unable to protect his family, quiet and devastating."},{ch:'Brigid',g:'f',t:'Dramatic',d:"Brigid's defense of her life choices. The child explaining herself to parents who worry, painfully recognizable."}],scenes:[{ch:[{n:'Erik',g:'m'},{n:'Deirdre',g:'f'}],t:'Dramatic',d:"The parents alone. A marriage's quiet desperation, the most emotionally honest scenes in the play."}]},
  {id:50,key:'OL2900174W',title:'The Children',author:'Lucy Kirkwood',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',runtime:100,themes:['nuclear','responsibility','climate','aging','future'],color:'#3B6D11',cov:null,desc:"Two retired nuclear scientists are visited by a former colleague after a coastal disaster. Kirkwood's taut chamber play about what we owe the future.",rids:[39,48,30],rwhy:['Both ask what responsibility to the future actually means','The past returning to demand something','Science and conscience as inseparable'],monos:[{ch:'Rose',g:'f',t:'Dramatic',d:"Rose's speech explaining why she has come. A request that is actually a demand, contained, precise, and completely unsettling."},{ch:'Hazel',g:'f',t:'Dramatic',d:"Hazel's response to what Rose wants. A life defended against the claim of conscience."}],scenes:[{ch:[{n:'Robin',g:'m'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The former lovers. What was between them and what Rose is asking for now, desire and duty entangled."},{ch:[{n:'Hazel',g:'f'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The women together. The marriage and the request. Among the most precisely written scenes in recent British drama."}]}
,
{id:51,key:'OL102778W',title:'Long Day\'s Journey into Night',author:'Eugene O\'Neill',year:1956,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',themes:['addiction','family','memory','guilt','love'],color:'#2C2C2A',cov:null,desc:'The Tyrone family spends a day in their summer home as old wounds reopen and morphine, whiskey, and blame consume them. The great American family tragedy.',rids:[16,35,17],rwhy:['Both are devastating family dramas','Addiction as the hidden engine','Memory and guilt as dramatic structure'],monos:[{ch:'Mary Tyrone',g:'f',t:'Dramatic',d:"Mary's final descent into the past. A woman disappearing before your eyes -- one of the most demanding pieces in the canon."},{ch:'Edmund',g:'m',t:'Dramatic',d:"Edmund's fog speech. A young man in love with oblivion -- lyrical and entirely felt."}],scenes:[{ch:[{n:'Jamie',g:'m'},{n:'Edmund',g:'m'}],t:'Dramatic',d:"The brothers in the night. Brutal honesty between men who love each other badly."},{ch:[{n:'Mary',g:'f'},{n:'Tyrone',g:'m'}],t:'Dramatic',d:"The marriage scenes -- decades of hurt compressed into a summer afternoon."}]},
  {id:52,key:'OL2900200W',title:'Who\'s Afraid of Virginia Woolf?',author:'Edward Albee',year:1962,genre:'Drama',era:'1960s',cast:'small',castSize:4,gender:'mixed',themes:['marriage','illusion','cruelty','truth','academia'],color:'#533AB7',cov:null,desc:'George and Martha invite a young couple home after a faculty party. What follows is one of the most savage and brilliant nights in American theatre.',rids:[51,16,38],rwhy:['Both are demolition jobs on a marriage','Cruelty as a form of love','Two couples, one night, no exit'],monos:[{ch:'Martha',g:'f',t:'Dramatic',d:"Martha on her father and her marriage. Self-aware, wounded, terrifying."},{ch:'George',g:'m',t:'Dramatic',d:"George\'s history speech. The novel he cannot publish -- a story that may or may not be true."}],scenes:[{ch:[{n:'George',g:'m'},{n:'Martha',g:'f'}],t:'Dramatic',d:"Any George/Martha scene. The most electrically matched couple in American drama."},{ch:[{n:'Nick',g:'m'},{n:'Honey',g:'f'}],t:'Dramatic',d:"The younger couple slowly unravelling. Watching someone else\'s marriage destroy yours."}]},
  {id:53,key:'OL2900202W',title:'Glengarry Glen Ross',author:'David Mamet',year:1983,genre:'Drama',era:'1980s',cast:'medium',castSize:6,gender:'male',themes:['capitalism','masculinity','desperation','crime','language'],color:'#993C1D',cov:null,desc:'Real estate salesmen fight for leads and their jobs. Mamet\'s most precise play -- every word is a weapon and everyone is losing.',rids:[52,5,28],rwhy:['Both use language as the primary weapon','Masculine desperation in an unforgiving system','The workplace as a battlefield'],monos:[{ch:'Shelly Levene',g:'m',t:'Dramatic',d:"Levene\'s sales stories -- bravado masking terror. Great for actors who can make desperation charming."},{ch:'Richard Roma',g:'m',t:'Dramatic',d:"Roma\'s seduction of Lingk. One of the great monologues about persuasion and performance."}],scenes:[{ch:[{n:'Levene',g:'m'},{n:'Williamson',g:'m'}],t:'Dramatic',d:"Levene begging for leads. Dignity and desperation in a two-minute scene."},{ch:[{n:'Roma',g:'m'},{n:'Levene',g:'m'}],t:'Dramatic',d:"The Act 2 defense. Two con men backing each other up -- comic and chilling."}]},
  {id:54,key:'OL2900204W',title:'Fences',author:'August Wilson',year:1985,genre:'Drama',era:'1980s',cast:'medium',castSize:6,gender:'mixed',themes:['race','fatherhood','dreams','resentment','baseball'],color:'#993C1D',cov:null,desc:'Troy Maxson builds a fence in his Pittsburgh backyard. August Wilson\'s masterpiece about a man whose greatness and limitations are the same thing.',rids:[2,5,42],rwhy:['Both center a Black man\'s thwarted ambition','The father/son dynamic as the heart of the play','Race and the American dream entangled'],monos:[{ch:'Troy',g:'m',t:'Dramatic',d:"Troy\'s speeches about Death -- wrestling with mortality as a literal opponent. Requires enormous physical and vocal presence."},{ch:'Rose',g:'f',t:'Dramatic',d:"Rose\'s response to Troy\'s affair. One of the great speeches about what a woman gives a marriage."}],scenes:[{ch:[{n:'Troy',g:'m'},{n:'Cory',g:'m'}],t:'Dramatic',d:"The father/son confrontations. The fence being built in the yard and between two people."},{ch:[{n:'Troy',g:'m'},{n:'Rose',g:'f'}],t:'Dramatic',d:"Troy confessing the affair. A marriage cracking open in real time."}]},
  {id:55,key:'OL2900206W',title:'The Piano Lesson',author:'August Wilson',year:1987,genre:'Drama',era:'1980s',cast:'medium',castSize:6,gender:'mixed',themes:['race','history','family','legacy','memory'],color:'#185FA5',cov:null,desc:'A piano carved with the faces of ancestors sits in a Pittsburgh home. Boy Willie wants to sell it. Berniece refuses. The argument is about everything.',rids:[54,2,44],rwhy:['Both are about what Black Americans carry from history','The object as a vessel for everything unsaid','Family as the site of the reckoning'],monos:[{ch:'Boy Willie',g:'m',t:'Dramatic',d:"Boy Willie on why he needs the land. Aspiration and blindness -- a man who cannot see what he is asking."},{ch:'Berniece',g:'f',t:'Dramatic',d:"Berniece\'s final prayer at the piano. Raw spiritual authority -- one of Wilson\'s most powerful moments."}],scenes:[{ch:[{n:'Boy Willie',g:'m'},{n:'Berniece',g:'f'}],t:'Dramatic',d:"Any sibling confrontation. Two people who love each other unable to give each other what the other needs."}]},
  {id:56,key:'OL2900208W',title:'Ma Rainey\'s Black Bottom',author:'August Wilson',year:1982,genre:'Drama',era:'1980s',cast:'medium',castSize:7,gender:'mixed',themes:['race','music','power','identity','exploitation'],color:'#5C1E1E',cov:null,desc:'Ma Rainey records in a Chicago studio in 1927. The white producers want her voice. She wants control. Levee wants the future. Wilson at his most electric.',rids:[54,55,2],rwhy:['The music industry as a site of racial exploitation','Both center Black artists navigating white institutions','Levee is one of Wilson\'s greatest characters'],monos:[{ch:'Levee',g:'m',t:'Dramatic',d:"Levee\'s speech about his mother and God. Fury and grief -- one of the most shattering monologues in American drama."},{ch:'Ma Rainey',g:'f',t:'Dramatic',d:"Ma on the blues. What the music means and who it belongs to."}],scenes:[{ch:[{n:'Ma Rainey',g:'f'},{n:'Sturdyvant',g:'m'}],t:'Dramatic',d:"Ma asserting control in the studio. Power and dignity against institutional racism."}]},
  {id:57,key:'OL2900210W',title:'Buried Child',author:'Sam Shepard',year:1978,genre:'Drama',era:'1970s',cast:'medium',castSize:6,gender:'mixed',themes:['family','secrets','decay','America','myth'],color:'#854F0B',cov:null,desc:'Vince returns to his family farm with his girlfriend. No one recognizes him. Something is buried in the backyard. Shepard\'s Pulitzer-winning American Gothic.',rids:[51,52,28],rwhy:['Both excavate the rot beneath the American dream','The family secret as the dramatic engine','Gothic American landscape'],monos:[{ch:'Dodge',g:'m',t:'Dramatic',d:"Dodge\'s final confession. The secret he has held for decades -- quiet, terrible, liberating."},{ch:'Halie',g:'f',t:'Dramatic',d:"Halie\'s speeches from upstairs. A woman who refuses to come down from her illusions."}],scenes:[{ch:[{n:'Vince',g:'m'},{n:'Shelly',g:'f'}],t:'Dramatic',d:"Shelly navigating the strange family. An outsider watching a family eat itself."}]},
  {id:58,key:'OL2900212W',title:'True West',author:'Sam Shepard',year:1980,genre:'Drama',era:'1980s',cast:'small',castSize:4,gender:'mixed',themes:['identity','brothers','Hollywood','America','violence'],color:'#993C1D',cov:null,desc:'Two brothers swap identities in their mother\'s California house while a Hollywood producer circles. Shepard\'s funniest and most frightening play.',rids:[57,5,53],rwhy:['Two brothers destroying each other and themselves','The American myth of the West','Identity as performance'],monos:[{ch:'Lee',g:'m',t:'Seriocomic',d:"Lee pitching his western. A man who has never written anything trying to write everything."},{ch:'Austin',g:'m',t:'Dramatic',d:"Austin\'s speech about the desert. The pull of something real against the fake life he has built."}],scenes:[{ch:[{n:'Lee',g:'m'},{n:'Austin',g:'m'}],t:'Seriocomic',d:"The brothers negotiating, competing, destroying. Any scene works -- the play is one long combustion."}]},
  {id:59,key:'OL2900214W',title:'A Doll\'s House',author:'Henrik Ibsen',year:1879,genre:'Drama',era:'1800s',cast:'medium',castSize:5,gender:'mixed',themes:['marriage','freedom','identity','society','sacrifice'],color:'#0F6E56',cov:null,desc:'Nora Helmer has forged a signature to save her husband\'s life. When this is discovered, everything she thought her marriage was dissolves. The play that invented modern drama.',rids:[18,22,13],rwhy:['Both are about a woman discovering her cage','The door slamming at the end changed theatre forever','Freedom as a dramatic act'],monos:[{ch:'Nora',g:'f',t:'Dramatic',d:"Nora\'s final speech before she leaves. Clear, determined, devastating -- she has become a different person in the space of the play."},{ch:'Nora',g:'f',t:'Seriocomic',d:"The tarantella scene. Performance as survival -- Nora dancing to distract Helmer."}],scenes:[{ch:[{n:'Nora',g:'f'},{n:'Helmer',g:'m'}],t:'Dramatic',d:"The final confrontation. The marriage examined and found empty."},{ch:[{n:'Nora',g:'f'},{n:'Krogstad',g:'m'}],t:'Dramatic',d:"Blackmail scenes. Nora holding her composure under pressure."}]},
  {id:60,key:'OL2900216W',title:'Miss Julie',author:'August Strindberg',year:1888,genre:'Drama',era:'1800s',cast:'small',castSize:3,gender:'mixed',themes:['class','desire','power','destruction','society'],color:'#3A3A3A',cov:null,desc:'On Midsummer Night, an aristocratic woman and her father\'s valet destroy each other. Strindberg\'s naturalist masterpiece about class and desire.',rids:[18,59,25],rwhy:['Both examine what a woman\'s desire costs her','Class as the subtext of every exchange','The night that changes everything'],monos:[{ch:'Miss Julie',g:'f',t:'Dramatic',d:"Julie\'s dream about the pillar. A woman who wants to fall and to rise simultaneously."},{ch:'Jean',g:'m',t:'Dramatic',d:"Jean\'s dream about the garden. Class desire expressed as fantasy."}],scenes:[{ch:[{n:'Miss Julie',g:'f'},{n:'Jean',g:'m'}],t:'Dramatic',d:"The power shifts between them. Every scene in this two-hander redraws who is dominant."}]},
  {id:61,key:'OL2900218W',title:'The Birthday Party',author:'Harold Pinter',year:1958,genre:'Drama',era:'1950s',cast:'medium',castSize:6,gender:'mixed',themes:['menace','identity','conformity','power','language'],color:'#444441',cov:null,desc:'Stanley lives in a seaside boarding house. Two strangers arrive. The interrogation that follows is Pinter at his most terrifying and inexplicable.',rids:[38,3,12],rwhy:['Both use language to conceal and threaten','The room as a trap','Menace without explanation'],monos:[{ch:'Goldberg',g:'m',t:'Dramatic',d:"Goldberg\'s speeches about the past. Warmth as menace -- a man who tells stories to avoid questions."},{ch:'Stanley',g:'m',t:'Dramatic',d:"Stanley trying to explain himself. A man erased by the play\'s end."}],scenes:[{ch:[{n:'Goldberg',g:'m'},{n:'McCann',g:'m'}],t:'Dramatic',d:"The interrogation of Stanley. Questions without answers -- great for actors who can hold ambiguity."},{ch:[{n:'Meg',g:'f'},{n:'Stanley',g:'m'}],t:'Seriocomic',d:"The morning scene. Domesticity with something wrong underneath."}]},
  {id:62,key:'OL2900220W',title:'Betrayal',author:'Harold Pinter',year:1978,genre:'Drama',era:'1970s',cast:'small',castSize:3,gender:'mixed',themes:['infidelity','time','friendship','marriage','memory'],color:'#2C2C2A',cov:null,desc:'An affair between a man and his best friend\'s wife, told backwards. Pinter\'s most accessible play and one of the cleverest structures in theatre.',rids:[61,38,24],rwhy:['Both use time as a structural element','The betrayal is always already known','Restraint as the dramatic mode'],monos:[{ch:'Emma',g:'f',t:'Dramatic',d:"Emma\'s moments of clarity. A woman who knows what she is doing and does it anyway."},{ch:'Jerry',g:'m',t:'Dramatic',d:"Jerry confronting Robert. Guilt spoken in Pinter\'s language of evasion."}],scenes:[{ch:[{n:'Emma',g:'f'},{n:'Jerry',g:'m'}],t:'Dramatic',d:"The affair scenes -- the earliest in chronology, the last we see. Tenderness and damage together."},{ch:[{n:'Robert',g:'m'},{n:'Jerry',g:'m'}],t:'Dramatic',d:"The men who have betrayed each other. Friendship as the real subject of the play."}]},
  {id:63,key:'OL2900222W',title:'Rosencrantz and Guildenstern Are Dead',author:'Tom Stoppard',year:1966,genre:'Comedy',era:'1960s',cast:'medium',castSize:8,gender:'mixed',themes:['identity','fate','theatre','death','uncertainty'],color:'#185FA5',cov:null,desc:'Two minor characters from Hamlet wait in the wings, uncertain why they are there. Stoppard\'s debut is funny, philosophical, and quietly devastating.',rids:[23,3,7],rwhy:['Both play with theatrical form and meta-awareness','Waiting as an existential condition','Language games in the face of death'],monos:[{ch:'Rosencrantz',g:'m',t:'Seriocomic',d:"Ros on death. A man who doesn\'t understand what he is saying and accidentally says everything."},{ch:'Player',g:'m',t:'Dramatic',d:"The Player on death and performance. Theatre as the only truth."}],scenes:[{ch:[{n:'Rosencrantz',g:'m'},{n:'Guildenstern',g:'m'}],t:'Seriocomic',d:"Any Ros and Guil scene. Two men whose relationship is the play\'s beating heart."}]},
  {id:64,key:'OL2900224W',title:'Cat on a Hot Tin Roof',author:'Tennessee Williams',year:1955,genre:'Drama',era:'1950s',cast:'large',castSize:8,gender:'mixed',themes:['desire','lies','family','mortality','queerness'],color:'#854F0B',cov:null,desc:'Big Daddy is dying. His family lies to him about it while lying to each other about everything else. Williams at his most suffocating and alive.',rids:[11,51,52],rwhy:['Both examine what men refuse to say to each other','Desire suppressed to the point of explosion','The lie that holds the family together'],monos:[{ch:'Maggie',g:'f',t:'Dramatic',d:"Maggie\'s Act 1 monologue -- talking to a man who won\'t respond. Desire and desperation in one long unstoppable speech."},{ch:'Big Daddy',g:'m',t:'Dramatic',d:"Big Daddy on mendacity. The most important word in the play spoken by the man who embodies it."}],scenes:[{ch:[{n:'Brick',g:'m'},{n:'Big Daddy',g:'m'}],t:'Dramatic',d:"The Act 2 truth-telling. Two men finally saying what cannot be said."}]},
  {id:65,key:'OL2900226W',title:'The Crucible',author:'Arthur Miller',year:1953,genre:'Drama',era:'1950s',cast:'large',castSize:14,gender:'mixed',themes:['witchhunts','integrity','mass hysteria','power','truth'],color:'#5C1E1E',cov:null,desc:'Salem 1692. Girls accuse townspeople of witchcraft. Miller wrote it about McCarthyism but it refuses to stay historical. Still burning.',rids:[16,28,54],rwhy:['Both examine what integrity costs','Institutional power crushing the individual','The community turning on itself'],monos:[{ch:'John Proctor',g:'m',t:'Dramatic',d:"Proctor refusing to sign the confession. The price of a name -- one of American drama\'s defining speeches."},{ch:'Elizabeth Proctor',g:'f',t:'Dramatic',d:"Elizabeth\'s courtroom testimony. A woman who cannot lie choosing between her husband and her God."}],scenes:[{ch:[{n:'John Proctor',g:'m'},{n:'Abigail',g:'f'}],t:'Dramatic',d:"The private confrontation. Desire and power and history -- one of American drama\'s great charged two-handers."}]},
  {id:66,key:'OL2900228W',title:'Arcadia',author:'Tom Stoppard',year:1993,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',themes:['mathematics','time','history','knowledge','entropy'],color:'#0F6E56',cov:null,desc:'Two time periods occupy the same room as characters past and present try to understand each other across centuries. Stoppard at his most emotionally generous.',rids:[63,23,39],rwhy:['Both make time itself a character','Intellectual passion as a form of love','The past and present in conversation'],monos:[{ch:'Thomasina',g:'f',t:'Dramatic',d:"Thomasina on iterated algorithms. Mathematical insight played as pure joy -- a gift for a performer who can make ideas physical."},{ch:'Valentine',g:'m',t:'Dramatic',d:"Valentine\'s explanation of chaos theory. The most romantic speech about mathematics ever written."}],scenes:[{ch:[{n:'Thomasina',g:'f'},{n:'Septimus',g:'m'}],t:'Seriocomic',d:"The tutorial scenes. A girl smarter than her teacher -- intellectual energy and romantic tension together."}]},
  {id:67,key:'OL2900230W',title:'Mother Courage and Her Children',author:'Bertolt Brecht',year:1939,genre:'Drama',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['war','capitalism','survival','loss','complicity'],color:'#444441',cov:null,desc:'Anna Fierling follows armies across the Thirty Years War, profiting from the conflict that kills her children one by one. Brecht\'s greatest and saddest play.',rids:[40,3,22],rwhy:['Both use form to expose the economics of destruction','Survival as a moral question','The cost counted in children'],monos:[{ch:'Mother Courage',g:'f',t:'Dramatic',d:"Courage\'s lament after her son\'s death. A woman who has outlasted everything including her grief."},{ch:'The Chaplain',g:'m',t:'Seriocomic',d:"The Chaplain on faith and war. Collaboration dressed as conviction."}],scenes:[{ch:[{n:'Mother Courage',g:'f'},{n:'The Cook',g:'m'}],t:'Seriocomic',d:"The relationship that runs through the play. Two survivors who understand each other too well."}]},
