  {id:224,key:'OL2900546W',title:'As You Like It',author:'William Shakespeare',year:1599,genre:'Comedy',era:'1600s',cast:'large',castSize:15,gender:'mixed',themes:['love','nature','disguise','pastoral','identity'],color:'#3B6D11',cov:null,desc:'Rosalind flees to the Forest of Arden and disguises herself as a man. She finds Orlando. She teaches him to woo -- her. Shakespeare\'s most joyful comedy and Rosalind is one of his greatest roles.',rids:[223,9,225],rwhy:['Both center a woman in disguise who controls the comic world','The pastoral as a space where identity can be played with','Love as something that can be rehearsed'],monos:[{ch:'Rosalind',g:'f',t:'Comedic',d:"Rosalind on love and time. A woman who sees clearly and cannot stop herself from falling anyway."},{ch:'Jacques',g:'m',t:'Dramatic',d:"\"All the world\'s a stage.\" The great speech -- requires an actor who can make philosophy feel earned."}],scenes:[{ch:[{n:'Rosalind',g:'f'},{n:'Orlando',g:'m'}],t:'Seriocomic',d:"The wooing lessons. Rosalind teaching the man she loves to love her -- the play\'s comic engine."},{ch:[{n:'Rosalind',g:'f'},{n:'Celia',g:'f'}],t:'Seriocomic',d:"The friendship. The best female friendship in Shakespeare."}]},
  {id:225,key:'OL2900548W',title:'Much Ado About Nothing',author:'William Shakespeare',year:1598,genre:'Comedy',era:'1600s',cast:'large',castSize:14,gender:'mixed',themes:['love','deception','honour','wit','marriage'],color:'#854F0B',cov:null,desc:'Beatrice and Benedick wage a war of words while denying their love. Hero is falsely accused of infidelity. Shakespeare\'s most verbally brilliant comedy.',rids:[224,223,9],rwhy:['Both center a couple who are already in love without knowing it','Wit as a defense against feeling','The plot that exists to test how love weathers accusation'],monos:[{ch:'Beatrice',g:'f',t:'Comedic',d:"Beatrice after she has been told Benedick loves her. A woman trying on a new feeling with her whole intelligence."},{ch:'Benedick',g:'m',t:'Comedic',d:"Benedick after he has been told Beatrice loves him. A man who has been entirely predictable trying to claim surprise."}],scenes:[{ch:[{n:'Beatrice',g:'f'},{n:'Benedick',g:'m'}],t:'Comedic',d:"Any sparring scene. The fastest and most precise comic dialogue in Shakespeare -- requires total precision and real chemistry."}]},
  {id:226,key:'OL2900550W',title:'The Tempest',author:'William Shakespeare',year:1611,genre:'Comedy',era:'1600s',cast:'large',castSize:13,gender:'mixed',themes:['power','colonialism','art','forgiveness','magic'],color:'#185FA5',cov:null,desc:'Prospero controls an island through magic. His enemies are at his mercy. The question is what he will do with that power. Shakespeare\'s farewell to theatre.',rids:[7,224,9],rwhy:['Both examine what power is for','Art and control as the same question','Forgiveness as a dramatic act'],monos:[{ch:'Prospero',g:'m',t:'Dramatic',d:"\'Our revels now are ended.\' The great speech about theatre and mortality -- requires absolute stillness."},{ch:'Caliban',g:'m',t:'Dramatic',d:"\'Be not afeard, the isle is full of noises.\' Caliban\'s dream speech -- the most beautiful thing in the play, spoken by its most wronged character."}],scenes:[{ch:[{n:'Prospero',g:'m'},{n:'Caliban',g:'m'}],t:'Dramatic',d:"The colonial relationship. Power and resentment -- every production must decide whose side it is on."},{ch:[{n:'Miranda',g:'f'},{n:'Ferdinand',g:'m'}],t:'Seriocomic',d:"The young love. Innocent and underrated."}]},
  {id:227,key:'OL2900552W',title:'Measure for Measure',author:'William Shakespeare',year:1603,genre:'Drama',era:'1600s',cast:'large',castSize:14,gender:'mixed',themes:['justice','power','sexuality','mercy','corruption'],color:'#5C1E1E',cov:null,desc:'Angelo is left in charge of Vienna. He condemns Claudio to death for fornication, then demands sex from Claudio\'s sister Isabella in exchange for his life. Shakespeare\'s most uncomfortable play.',rids:[7,59,69],rwhy:['Both center a woman confronting a powerful man\'s abuse of authority','Sexual coercion and institutional power','The problem comedy that refuses easy resolution'],monos:[{ch:'Isabella',g:'f',t:'Dramatic',d:"Isabella\'s rejection of Angelo\'s offer. A woman choosing her brother\'s death over her own debasement -- requires total moral conviction."},{ch:'Angelo',g:'m',t:'Dramatic',d:"Angelo confronting his own desire. A man who thought himself incorruptible discovering he isn\'t."}],scenes:[{ch:[{n:'Isabella',g:'f'},{n:'Angelo',g:'m'}],t:'Dramatic',d:"The negotiation. Sexual coercion enacted in the language of law -- one of Shakespeare\'s most troubling and essential scenes."}]},
  {id:228,key:'OL2900554W',title:'The Winter\'s Tale',author:'William Shakespeare',year:1611,genre:'Drama',era:'1600s',cast:'large',castSize:13,gender:'mixed',themes:['jealousy','time','redemption','loss','wonder'],color:'#533AB7',cov:null,desc:'Leontes is consumed by unfounded jealousy and destroys his family. Sixteen years later, time and grace offer restoration. Shakespeare\'s strangest and most moving late play.',rids:[226,224,7],rwhy:['Both examine what redemption requires','Time as the only thing that can heal certain wounds','The statue scene as one of theatre\'s great magical moments'],monos:[{ch:'Leontes',g:'m',t:'Dramatic',d:"Leontes in the grip of jealousy. Delusion playing as certainty -- requires an actor who can be entirely wrong and entirely convinced."},{ch:'Paulina',g:'f',t:'Dramatic',d:"Paulina confronting Leontes after Hermione\'s death. One of Shakespeare\'s great female speeches of accusation."}],scenes:[{ch:[{n:'Hermione',g:'f'},{n:'Leontes',g:'m'}],t:'Dramatic',d:"The trial scene. Hermione defending herself with absolute dignity against a man who has lost his mind."}]},
  {id:229,key:'OL2900556W',title:'King Lear',author:'William Shakespeare',year:1606,genre:'Tragedy',era:'1600s',cast:'large',castSize:15,gender:'mixed',themes:['age','power','family','madness','love'],color:'#2C2C2A',cov:null,desc:'Lear divides his kingdom between his daughters. He misjudges everything. By the end, everything is destroyed. The largest and most punishing play in the English language.',rids:[7,8,51],rwhy:['Both examine what old age means when power goes','Children and parents and what each owes the other','The most ambitious thing Shakespeare ever attempted'],monos:[{ch:'Lear',g:'m',t:'Dramatic',d:"Lear in the storm. A king stripped of everything speaking to the weather -- one of the great roles in the canon."},{ch:'Edgar',g:'m',t:'Dramatic',d:"Edgar as Poor Tom. Sanity performing madness while watching his father go genuinely mad."},{ch:'Cordelia',g:'f',t:'Dramatic',d:"Cordelia\'s return. Brief and full -- the daughter who was honest when honesty was catastrophic."}],scenes:[{ch:[{n:'Lear',g:'m'},{n:'Cordelia',g:'f'}],t:'Dramatic',d:"The reconciliation. Two people who love each other after everything has been destroyed."},{ch:[{n:'Lear',g:'m'},{n:'Fool',g:'m'}],t:'Dramatic',d:"The king and the fool. The only person who tells Lear the truth -- in riddles."}]},
  {id:230,key:'OL2900558W',title:'Othello',author:'William Shakespeare',year:1603,genre:'Tragedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',themes:['jealousy','race','manipulation','love','destruction'],color:'#993C1D',cov:null,desc:'Iago destroys Othello through the appearance of evidence. Race, love, and the machinery of jealousy. The most technically perfect of the tragedies.',rids:[7,8,229],rwhy:['Both examine how easily love can be weaponized','The villain who is also the most interesting character','Jealousy as a clinical process'],monos:[{ch:'Othello',g:'m',t:'Dramatic',d:"Othello\'s senate speech. A soldier telling his story -- one of Shakespeare\'s great self-presentations."},{ch:'Iago',g:'m',t:'Dramatic',d:"Any of Iago\'s soliloquies. A man thinking through evil in real time -- requires an actor who can make cleverness seductive."},{ch:'Desdemona',g:'f',t:'Dramatic',d:"Desdemona\'s willow song. A woman sensing what is coming and unable to stop it."}],scenes:[{ch:[{n:'Othello',g:'m'},{n:'Iago',g:'m'}],t:'Dramatic',d:"The temptation scenes. Iago working on Othello -- one of drama\'s great studies in manipulation."},{ch:[{n:'Othello',g:'m'},{n:'Desdemona',g:'f'}],t:'Dramatic',d:"The accusation scenes. Love destroyed by evidence that is not evidence."}]},
  {id:231,key:'OL2900560W',title:'Julius Caesar',author:'William Shakespeare',year:1599,genre:'Tragedy',era:'1600s',cast:'large',castSize:15,gender:'mixed',themes:['power','loyalty','betrayal','Rome','rhetoric'],color:'#5C1E1E',cov:null,desc:'Brutus joins the conspiracy to assassinate Caesar for Rome\'s good. The good man who does a terrible thing. Shakespeare\'s most political play.',rids:[7,8,229],rwhy:['Both examine the politics of honorable men making catastrophic choices','Rhetoric as the subject -- this play is about speeches','The cost of idealism in political life'],monos:[{ch:'Mark Antony',g:'m',t:'Dramatic',d:"\'Friends, Romans, countrymen.\' One of the most famous speeches in the language -- deceptively simple and completely manipulative."},{ch:'Brutus',g:'m',t:'Dramatic',d:"Brutus\'s funeral oration. The honest man\'s case for assassination -- outclassed by Antony."}],scenes:[{ch:[{n:'Brutus',g:'m'},{n:'Cassius',g:'m'}],t:'Dramatic',d:"The quarrel and reconciliation. The friendship that drives the play."}]},
  {id:232,key:'OL2900562W',title:'Richard III',author:'William Shakespeare',year:1593,genre:'Tragedy',era:'1600s',cast:'large',castSize:15,gender:'mixed',themes:['ambition','villainy','power','deformity','performance'],color:'#3A3A3A',cov:null,desc:'Richard of Gloucester wills himself to be king through charm, manipulation, and murder. The greatest villain role in the canon -- and the play that proves wickedness is more fun to watch than virtue.',rids:[7,8,231],rwhy:['Both center a villain who makes us complicit in enjoying his crimes','Rhetoric as the tool of power','The body as an argument'],monos:[{ch:'Richard',g:'m',t:'Dramatic',d:"\'Now is the winter of our discontent.\' Richard announcing his intentions to the audience -- intimacy as manipulation."},{ch:'Richard',g:'m',t:'Dramatic',d:"Richard\'s nightmare before the battle. The conscience returning at last."}],scenes:[{ch:[{n:'Richard',g:'m'},{n:'Lady Anne',g:'f'}],t:'Dramatic',d:"The wooing over the coffin. The most audacious seduction scene in Shakespeare -- and it works."}]},
  {id:233,key:'OL2900564W',title:'Antony and Cleopatra',author:'William Shakespeare',year:1606,genre:'Tragedy',era:'1600s',cast:'large',castSize:18,gender:'mixed',themes:['love','empire','desire','death','glory'],color:'#854F0B',cov:null,desc:'Mark Antony abandons Rome for Cleopatra\'s Egypt. Rome and desire are incompatible. The grandest of Shakespeare\'s late tragedies -- the lovers who choose each other over the world.',rids:[7,229,231],rwhy:['Both examine what people sacrifice for love','The political and personal refusing to separate','The woman who is the equal of every man around her'],monos:[{ch:'Cleopatra',g:'f',t:'Dramatic',d:"Cleopatra after Antony\'s death. A woman who turns grief into performance -- the role of a lifetime."},{ch:'Enobarbus',g:'m',t:'Dramatic',d:"\'The barge she sat in\' -- the most beautiful description of a woman in Shakespeare. Spoken by a man who cannot believe what he has seen."}],scenes:[{ch:[{n:'Antony',g:'m'},{n:'Cleopatra',g:'f'}],t:'Dramatic',d:"The great love scenes. Two extraordinary people treating each other as equals -- rare in Shakespeare."}]},
  {id:234,key:'OL2900566W',title:'The Merchant of Venice',author:'William Shakespeare',year:1596,genre:'Comedy',era:'1600s',cast:'large',castSize:13,gender:'mixed',themes:['mercy','justice','race','money','love'],color:'#854F0B',cov:null,desc:'Shylock demands his pound of flesh. Portia disguises herself as a lawyer. The casket plot resolves. The play that is impossible to produce without confronting its antisemitism -- and essential for that reason.',rids:[7,9,227],rwhy:['Both center a woman who disguises herself to deliver justice','The problem comedy that must be confronted','Shylock as one of Shakespeare\'s most complex and troubling characters'],monos:[{ch:'Shylock',g:'m',t:'Dramatic',d:"\'Hath not a Jew eyes?\' The plea for common humanity from the character the play also makes a villain -- one of the most contested speeches in the canon."},{ch:'Portia',g:'f',t:'Dramatic',d:"\'The quality of mercy is not strained.\' The great mercy speech -- Portia arguing for what the play ultimately refuses Shylock."}],scenes:[{ch:[{n:'Shylock',g:'m'},{n:'Antonio',g:'m'}],t:'Dramatic',d:"The bond. Two men who hate each other making a contract that will destroy one of them."}]},
  {id:235,key:'OL2900568W',title:'Henry V',author:'William Shakespeare',year:1599,genre:'History',era:'1600s',cast:'large',castSize:20,gender:'mixed',themes:['war','kingship','rhetoric','England','responsibility'],color:'#3B6D11',cov:null,desc:'Henry V leads England to Agincourt. Shakespeare\'s most ambivalent war play -- the rhetoric is glorious and the war is terrible, and the play keeps both in view.',rids:[231,7,8],rwhy:['Both examine what war rhetoric conceals','The king who must perform kingship','Patriotism and its costs in a single play'],monos:[{ch:'Henry V',g:'m',t:'Dramatic',d:"\'Once more unto the breach.\' The most famous rally speech in English -- often used as pure inspiration, more interesting as a performance of inspiration."},{ch:'Henry V',g:'m',t:'Dramatic',d:"\'We few, we happy few.\' St Crispin\'s Day. A speech that has recruited for every war since."}],scenes:[{ch:[{n:'Henry',g:'m'},{n:'Williams',g:'m'}],t:'Dramatic',d:"The King in disguise on the night before battle. The man beneath the king."}]},
  {id:236,key:'OL2900570W',title:'The Taming of the Shrew',author:'William Shakespeare',year:1590,genre:'Comedy',era:'1600s',cast:'large',castSize:13,gender:'mixed',themes:['gender','marriage','power','performance','identity'],color:'#854F0B',cov:null,desc:'Petruchio woos Katharina -- against her will. The play every production must reckon with. Either the most misogynistic play in the canon or a meta-theatrical meditation on performance -- sometimes both.',rids:[227,223,224],rwhy:['Both center a woman performing a self she does not believe','The question of what Katharina actually means','Gender and performance as inseparable'],monos:[{ch:'Katharina',g:'f',t:'Dramatic',d:"The final speech. A woman saying what she may or may not mean -- the most debated monologue in Shakespeare. Every production must decide what she is doing."},{ch:'Petruchio',g:'m',t:'Comedic',d:"Petruchio announcing his strategy. A man who has decided to win a woman by deciding he has won her."}],scenes:[{ch:[{n:'Katharina',g:'f'},{n:'Petruchio',g:'m'}],t:'Dramatic',d:"The wooing scenes. Both equally matched -- requires actors who can find the comedy without losing the discomfort."}]},
  {id:237,key:'OL2900572W',title:'The Comedy of Errors',author:'William Shakespeare',year:1594,genre:'Comedy',era:'1600s',cast:'large',castSize:13,gender:'mixed',themes:['identity','twins','confusion','family','recognition'],color:'#3B6D11',cov:null,desc:'Two sets of identical twins are separated and reunite in Ephesus with complete chaos. Shakespeare\'s most farcical play -- pure comic mechanism and surprisingly moving at its end.',rids:[223,224,225],rwhy:['Both use identity confusion as a comic engine','The recognition scene as the emotional payoff of farce','Shakespeare\'s youngest play and still technically perfect'],monos:[{ch:'Adriana',g:'f',t:'Dramatic',d:"Adriana on marriage and identity. A woman whose husband doesn\'t recognize her -- funnier and sadder than it should be."},{ch:'Antipholus of Syracuse',g:'m',t:'Dramatic',d:"Antipholus discovering he is being treated as someone else. The comic confusion taking on a dreamlike quality."}],scenes:[{ch:[{n:'Antipholus of Ephesus',g:'m'},{n:'Antipholus of Syracuse',g:'m'}],t:'Comedic',d:"The twin brothers finally meeting. The resolution of all the play\'s errors -- requires perfect comic timing."}]},
  {id:238,key:'OL2900574W',title:'The Moors',author:'Jen Silverman',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['Bronte','servants','desire','power','loneliness'],color:'#3A3A3A',cov:null,desc:'On a Bronte-esque moor, two sisters await a husband who never arrives. Their servants enact parallel dramas of desire and power. Silverman\'s most gothic and witty play.',rids:[116,74,18],rwhy:['Both examine women trapped in a landscape that reflects their confinement','Gothic atmosphere as psychological state','Servants who are more than servants'],monos:[{ch:'Agatha',g:'f',t:'Dramatic',d:"Agatha on the husband and what she has been told to want."},{ch:'Emilie',g:'f',t:'Dramatic',d:"Emilie on desire and the moor. A woman who has found a different kind of company."}],scenes:[{ch:[{n:'Agatha',g:'f'},{n:'Emilie',g:'f'}],t:'Dramatic',d:"The sisters. Dependence and resentment between women who have only each other."},{ch:[{n:'Mastiff',g:'m'},{n:'Huldey',g:'f'}],t:'Seriocomic',d:"The servants\' parallel drama. Class and desire in a minor key."}]},
  {id:239,key:'OL2900576W',title:'The Roommate',author:'Jen Silverman',year:2015,genre:'Drama',era:'2010s',cast:'small',castSize:2,gender:'female',themes:['friendship','reinvention','Iowa','secrets','freedom'],color:'#533AB7',cov:null,desc:'Sharon, a recently divorced Iowan, takes in Robyn, a woman with a mysterious past. A two-hander about what it means to reinvent yourself at any age.',rids:[238,139,132],rwhy:['Both examine friendship between women at unexpected life junctures','Reinvention as a dramatic subject','The two-hander that contains a whole world'],monos:[{ch:'Sharon',g:'f',t:'Seriocomic',d:"Sharon describing her life before Robyn. A woman who has been comfortable and is starting to notice."},{ch:'Robyn',g:'f',t:'Dramatic',d:"Robyn on her past. Fragments of a life that doesn\'t add up -- until it does."}],scenes:[{ch:[{n:'Sharon',g:'f'},{n:'Robyn',g:'f'}],t:'Seriocomic',d:"Any scene between them. The rhythm of two women discovering each other is the play\'s entire pleasure."}]},
  {id:240,key:'OL2900578W',title:'Witch',author:'Jen Silverman',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['Faust','desire','deals','gender','power'],color:'#854F0B',cov:null,desc:'A gender-flipped Faust. A woman makes a deal with a female devil. Silverman\'s most theatrically playful work -- anachronistic, funny, and genuinely dark.',rids:[194,238,239],rwhy:['Both use the Faust myth to examine what we sell ourselves for','Gender and desire as inseparable questions','Theatrical self-consciousness as a form of wit'],monos:[{ch:'Martha (Faust)',g:'f',t:'Dramatic',d:"Martha on what she wants. A woman articulating a desire so large it requires supernatural assistance."},{ch:'The Devil',g:'f',t:'Comedic',d:"The Devil\'s pitch. Female villainy played as business -- completely delightful."}],scenes:[{ch:[{n:'Martha',g:'f'},{n:'The Devil',g:'f'}],t:'Seriocomic',d:"The negotiation. Two women making a deal -- Silverman at her most theatrically alive."}]}
];
</script>
<script>
var API = 'https://mystagevault-production.up.railway.app';
var DEVICE_ID = 'dev_local';
try {
  var stored = localStorage.getItem('msv_id');
  if (stored) { DEVICE_ID = stored; }
  else { DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('msv_id', DEVICE_ID); }
} catch(e) {}

function apiSave(path, method, body) {
  fetch(API + path, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }).catch(function(){});
}

function loadFromBackend() {
  fetch(API + '/api/shelf/' + DEVICE_ID)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ shelf[r.play_key] = r.status; });
      return fetch(API + '/api/ratings/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ ratings[r.play_key] = r.rating; });
      return fetch(API + '/api/notes/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ notes[r.play_key] = r.note; });
      render();
    })
    .catch(function(){ render(); });
}

// State
var shelf={}, ratings={}, notes={}, page='discover', stab='read';
var monoQ='', monoGender='All', monoType='All', monoEra='All', monoLen='All';
var sceneQ='', sceneGender='All', sceneEra='All';
var playQ='', playGenre='All', playEra='All';
var olResults=[], olLoading=false;
var did=null;

// Color helpers
var COLORS=['#533AB7','#0F6E56','#993C1D','#3A3A3A','#185FA5','#854F0B','#993556','#444441','#3C3489','#3B6D11','#5C1E1E','#2C2C2A'];
function hc(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function ini(t){return(t||'').split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}

// Cover image
function cov(p,w,h){
  var c=p.color||hc(p.title||'');
  var url=null;
  if(p.cov) url='https://covers.openlibrary.org/b/id/'+p.cov+'-M.jpg';
  else if(p.key) url='https://covers.openlibrary.org/b/olid/'+p.key+'-M.jpg';
  return '<div class="cov" style="width:'+w+'px;height:'+h+'px;background:'+c+'">'
    +(url?'<img src="'+url+'" onerror="this.style.display=\'none\'">':ini(p.title))
    +'</div>';
}

// Shelf buttons on cards
function sbtns(id){
  id=String(id);
  var s=shelf[id]||null;
  return '<div class="sbtns" onclick="event.stopPropagation()">'
    +'<button class="sab'+(s==='read'?' sr':'')+'" onclick="tog(\''+id+'\',\'read\')">&#10003; Read</button>'
    +'<button class="sab'+(s==='reading'?' sg':'')+'" onclick="tog(\''+id+'\',\'reading\')">Reading</button>'
    +'<button class="sab'+(s==='want'?' sw':'')+'" onclick="tog(\''+id+'\',\'want\')">&#9829; Want</button>'
    +'</div>';
}

// Play card
function card(p){
  var pid=String(p.key||p.id);
  var s=shelf[pid]||null;
  var r=ratings[pid]||0;
  var rl={read:'&#10003; Read',reading:'Reading',want:'&#9829; Want'};
  var rc={read:'rr',reading:'rg',want:'rw'};
  return '<div class="pc" onclick="odp(\''+pid+'\')">'
    +(s?'<div class="rib '+rc[s]+'">'+rl[s]+'</div>':'')
    +cov(p,118,165)
    +'<div class="ctitle">'+p.title+'</div>'
    +'<div class="cauth">'+p.author+'</div>'
    +'<div class="cmeta">'
    +'<span style="font-size:10px;color:'+(r?'#f59e0b':'#e4e1da')+'">&#9733;&#9733;&#9733;&#9733;&#9733;</span>'
    +'<span class="cgenre">'+p.genre+'</span></div>'
    +sbtns(pid)+'</div>';
}

function grid(plays){
  return plays.length
    ?'<div class="cards">'+plays.map(card).join('')+'</div>'
    :'<div class="empty">&#128218; Nothing found.</div>';
}

// Gender dot
function gdot(g){
  var c={f:'#d4537e',m:'#378add',nb:'#639922'};
  return '<span class="gdot g'+g+'" style="background:'+(c[g]||'#999')+'"></span>';
}

// Script links
function scriptLinks(p){
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  return '<div class="get-script">'
    +'<span style="font-size:10px;color:#a09d97">Get the script:</span>'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">DPS</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">Library</a>'
    +'</div>';
}

// Navigation
var NAVS=[
  {id:'discover',icon:'&#127918;',label:'Discover'},
  {id:'shelf',icon:'&#128218;',label:'My shelf'},
  {id:'search',icon:'&#128269;',label:'Play search'},
  {section:'Audition tools'},
  {id:'monologues',icon:'&#127908;',label:'Monologue search'},
  {id:'scenes',icon:'&#128101;',label:'Scene search'}
];

function renderNav(){
  var html='';
  NAVS.forEach(function(n){
    if(n.section){
      html+='<div class="nav-section">'+n.section+'</div>';
    } else {
      html+='<div class="ni'+(page===n.id?' on':'')+'" onclick="go(\''+n.id+'\')">'
        +'<span class="ni-icon">'+n.icon+'</span>'+n.label+'</div>';
    }
  });
  document.getElementById('nav').innerHTML=html;
}

function go(p){page=p;render();}

// THEMES for featured rotation
var THEMES=[
  {name:'Plays by women',desc:'Playwrights who changed what theatre can say',filter:function(p){return ['Lorraine Hansberry','Caryl Churchill','Sarah Kane','Suzan-Lori Parks','Lynn Nottage','Paula Vogel','Sarah DeLappe','Lucy Kirkwood','Lucy Prebble','Anna Deavere Smith','Aphra Behn'].indexOf(p.author)>=0;}},
  {name:'Two-handers',desc:'Plays for exactly two actors',filter:function(p){return p.cast==='small'&&p.castSize===2;}},
  {name:'Solo shows',desc:'One performer carrying the whole stage',filter:function(p){return p.cast==='solo'||p.castSize===1;}},
  {name:'Queer theatre',desc:'Plays centering queer experience and identity',filter:function(p){return (p.themes||[]).some(function(t){return t==='queerness'||t==='sexuality'||t==='gender'||t==='AIDS';});}},
  {name:'American classics',desc:'The plays that defined American drama',filter:function(p){return ['Drama','Tragedy'].indexOf(p.genre)>=0&&['1940s','1950s','1960s','1970s','1980s','1990s','1900s'].indexOf(p.era)>=0&&['Tony Kushner','Lorraine Hansberry','Arthur Miller','Tennessee Williams','Suzan-Lori Parks','Edward Albee','Eugene O\'Neill','Sam Shepard'].indexOf(p.author)>=0;}},
  {name:'British theatre',desc:'From Pinter to Kane -- the British tradition',filter:function(p){return ['Harold Pinter','Caryl Churchill','Sarah Kane','Tom Stoppard','Lucy Kirkwood','Lucy Prebble','Brian Friel','J.M. Synge','Oscar Wilde','George Bernard Shaw'].indexOf(p.author)>=0;}},
  {name:'Classical roots',desc:'Shakespeare, the Greeks, and the canon',filter:function(p){return ['1600s','Ancient','Medieval','1500s'].indexOf(p.era)>=0||['William Shakespeare','Sophocles','Euripides','Aeschylus','Aristophanes','Moliere'].indexOf(p.author)>=0;}},
  {name:'Plays about race',desc:'Theatre that confronts race and identity head-on',filter:function(p){return (p.themes||[]).indexOf('race')>=0;}},
  {name:'Experimental and form-breaking',desc:'Plays that reinvented what theatre can be',filter:function(p){return ['Experimental','Absurdist'].indexOf(p.genre)>=0;}},

function getFeatured(){
  var week=Math.floor(Date.now()/604800000);
  var theme=THEMES[week%THEMES.length];
  var matching=PLAYS.filter(theme.filter);
  // if fewer than 6 matching, pad with others
  if(matching.length<6){
    var others=PLAYS.filter(function(p){return matching.indexOf(p)<0;});
    var seed=week*7;
    while(matching.length<Math.min(12,PLAYS.length)&&others.length>0){
      seed=(seed*1664525+1013904223)&0xffffffff;
      var idx=Math.abs(seed)%others.length;
      matching.push(others[idx]);
      others.splice(idx,1);
    }
  }
  return {theme:theme,plays:matching.slice(0,12)};
}

function getMonoItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.monos||[]).forEach(function(m){
      var matchQ=!monoQ||(m.ch&&m.ch.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||(m.d&&m.d.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(monoQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(monoQ.toLowerCase())>=0||(p.themes||[]).join(' ').toLowerCase().indexOf(monoQ.toLowerCase())>=0;
      var matchG=monoGender==='All'||m.g===monoGender;
      var matchT=monoType==='All'||m.t===monoType;
      var matchE=monoEra==='All'||(monoEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(monoEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(monoEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchT&&matchE) items.push({p:p,m:m});
    });
  });
  return items;
}

function getSceneItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.scenes||[]).forEach(function(s){
      var fs=s.ch.filter(function(c){return c.g==='f';}).length;
      var ms=s.ch.filter(function(c){return c.g==='m';}).length;
      var mix='Mixed/3+';
      if(s.ch.length===2){if(fs===2)mix='F/F';else if(ms===2)mix='M/M';else if(fs===1&&ms===1)mix='M/F';}
      var matchQ=!sceneQ||(s.d&&s.d.toLowerCase().indexOf(sceneQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||s.ch.some(function(c){return c.n&&c.n.toLowerCase().indexOf(sceneQ.toLowerCase())>=0;})||(p.themes||[]).join(' ').toLowerCase().indexOf(sceneQ.toLowerCase())>=0;
      var matchG=sceneGender==='All'||sceneGender===mix;
      var matchE=sceneEra==='All'||(sceneEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(sceneEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(sceneEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchE) items.push({p:p,s:s,mix:mix});
    });
  });
  return items;
}

// Global search bar
var sd;
function onSrch(v){
  playQ=v;monoQ=v;sceneQ=v;
  if(v.length>2){
    if(page==='discover') go('search');
    olLoading=true;render();
    clearTimeout(sd);
    sd=setTimeout(function(){doOLSearch(v);},400);
  } else {
    olResults=[];olLoading=false;
    render();
  }
}

function doOLSearch(q){
  fetch('https://openlibrary.org/search.json?q='+encodeURIComponent(q)+'&subject=drama&fields=key,title,author_name,first_publish_year,cover_i&limit=20')
    .then(function(r){return r.json();})
    .then(function(data){
      olResults=(data.docs||[]).map(function(doc){
        for(var i=0;i<PLAYS.length;i++){if(PLAYS[i].key===doc.key)return PLAYS[i];}
        return {id:doc.key,key:doc.key,title:doc.title||'Unknown',author:(doc.author_name||['Unknown'])[0],year:doc.first_publish_year||null,genre:'Drama',color:hc(doc.title||''),cov:doc.cover_i||null,themes:[],desc:'',rids:[],rwhy:[],monos:[],scenes:[]};
      });
      olLoading=false;render();
    })
    .catch(function(){olLoading=false;render();});
}

  if((p.monos||[]).length){
    h+='<div class="dp-sub">Monologues from this play</div>';
    p.monos.forEach(function(m){
      h+='<div class="mini"><div class="mini-top">'+gdot(m.g)+'<strong style="font-size:11px">'+m.ch+'</strong><span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+m.t+'</span></div><p class="mini-desc">'+m.d+'</p></div>';
    });
  }
  if((p.scenes||[]).length){
    h+='<div class="dp-sub">Scenes from this play</div>';
    p.scenes.forEach(function(sc){
      h+='<div class="mini"><div class="mini-top">'+sc.ch.map(function(c){return gdot(c.g)+'<span style="font-size:11px;font-weight:500">'+c.n+'</span>';}).join('<span style="color:#a09d97;margin:0 2px">&middot;</span>')+'<span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+sc.t+'</span></div><p class="mini-desc">'+sc.d+'</p></div>';
    });
  }
  h+='</div>';
  var dp=document.getElementById('dp');
  dp.innerHTML=h;dp.classList.add('open');
  document.getElementById('ov').style.display='block';
}

function cdp(){did=null;document.getElementById('dp').classList.remove('open');document.getElementById('ov').style.display='none';}
function hov(n){document.querySelectorAll('#rr .rst').forEach(function(el,i){el.style.color=i<n?'#f59e0b':'#e4e1da';});}
function uhov(r){document.querySelectorAll('#rr .rst').forEach(function(el,i){el.style.color=i<r?'#f59e0b':'#e4e1da';});}

var tt;
function showT(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show');},2400);}

// Event delegation for chip buttons
document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-fn]');
  if(!btn) return;
  var fn = btn.getAttribute('data-fn');
  var val = btn.getAttribute('data-val');
  var fns = {
    setMG:setMG, setMT:setMT, setME:setME,
    setSG:setSG, setSE:setSE,
    setPG:setPG, setPE:setPE
  };
  if(fns[fn]) fns[fn](val);
});

// Event delegation for play cards and mono/scene cards
document.addEventListener('click', function(e){
  var card = e.target.closest('[data-play]');
  if(card && !e.target.closest('.sbtns') && !e.target.closest('[data-fn]')) {
    odp(card.getAttribute('data-play'));
  }
  var sab = e.target.closest('[data-shelf]');
  if(sab) {
    e.stopPropagation();
    var parts = sab.getAttribute('data-shelf').split('|');
    tog(parts[0], parts[1]);
  }
});


// Mobile navigation
function toggleMobileNav() {
  var sb = document.querySelector('.sb');
  var ov = document.getElementById('mob-overlay');
  if (!sb || !ov) return;
  var isOpen = sb.classList.contains('open');
  if (isOpen) {
    sb.classList.remove('open');
    ov.classList.remove('show');
  } else {
    sb.classList.add('open');
    ov.classList.add('show');
  }
}

function closeMobileNav() {
  var sb = document.querySelector('.sb');
  var ov = document.getElementById('mob-overlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('show');
}

// Close mobile nav when a nav item is clicked
var origGo = go;
go = function(p) {
  closeMobileNav();
  origGo(p);
};

loadFromBackend();
