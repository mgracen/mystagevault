  {id:145,key:'OL2900388W',title:'Seven Guitars',author:'August Wilson',year:1995,genre:'Drama',era:'1990s',cast:'medium',castSize:7,gender:'mixed',themes:['music','death','dreams','Pittsburgh','race'],color:'#993C1D',cov:null,desc:'Floyd Barton\'s friends gather after his funeral to remember him. What happened? Wilson\'s blues play moves between elegiac memory and desperate present.',rids:[56,54,109],rwhy:['Music as the structure of grief and aspiration','The ensemble gathering around the absent center','Blues as both form and subject'],monos:[{ch:'Floyd',g:'m',t:'Dramatic',d:"Floyd on his music and his future. A man who cannot see the wall in front of him."},{ch:'Vera',g:'f',t:'Dramatic',d:"Vera on Floyd. A woman who has loved someone she cannot hold."}],scenes:[{ch:[{n:'Floyd',g:'m'},{n:'Vera',g:'f'}],t:'Dramatic',d:"The reunion. Love that has been apart and is trying to reassemble."}]},
  {id:146,key:'OL2900390W',title:'Two Trains Running',author:'August Wilson',year:1990,genre:'Drama',era:'1990s',cast:'medium',castSize:7,gender:'mixed',themes:['Pittsburgh','civil rights','1960s','community','change'],color:'#993C1D',cov:null,desc:'A diner in Pittsburgh 1969. The neighborhood is changing. MLK and Malcolm X are dead. Wilson\'s quietest and most political play.',rids:[113,54,144],rwhy:['The community that holds when everything outside is changing','1960s Black American life in a single room','Wilson\'s most sustained meditation on justice'],monos:[{ch:'Sterling',g:'m',t:'Dramatic',d:"Sterling just out of prison. A young man who has decided to stop waiting."},{ch:'Memphis',g:'m',t:'Dramatic',d:"Memphis on his land in Mississippi. What was taken and what is owed."}],scenes:[{ch:[{n:'Memphis',g:'m'},{n:'Sterling',g:'m'}],t:'Dramatic',d:"The diner as a world. Two men across a generation."}]},
  {id:147,key:'OL2900392W',title:'King Hedley II',author:'August Wilson',year:1999,genre:'Drama',era:'1990s',cast:'medium',castSize:6,gender:'mixed',themes:['Pittsburgh','violence','1980s','legacy','identity'],color:'#993C1D',cov:null,desc:'Pittsburgh 1985. King Hedley II is trying to start over. The past will not let him. Wilson\'s darkest play -- the Reagan years rendered as tragedy.',rids:[145,144,54],rwhy:['The Reagan era as a Wilson subject','Sons and what they inherit','Tragedy in the full Greek sense'],monos:[{ch:'King Hedley II',g:'m',t:'Dramatic',d:"King on who he is and what he is owed. A man claiming his identity in a world that refuses it."},{ch:'Ruby',g:'f',t:'Dramatic',d:"Ruby on her past. A woman who has survived things she cannot name."}],scenes:[{ch:[{n:'King',g:'m'},{n:'Tonya',g:'f'}],t:'Dramatic',d:"The couple and the pregnancy. The argument about whether to bring life into this world."}]},
  {id:148,key:'OL2900394W',title:'Intimate Apparel',author:'Lynn Nottage',year:2003,genre:'Drama',era:'2000s',cast:'medium',castSize:6,gender:'mixed',themes:['race','desire','loneliness','labor','New York'],color:'#854F0B',cov:null,desc:'Esther, a Black seamstress in 1905 New York, saves money and falls in love through letters. Nottage\'s most tender play.',rids:[44,80,140],rwhy:['A Black woman\'s interiority at the center','Desire across class and racial lines','Labor and longing together'],monos:[{ch:'Esther',g:'f',t:'Dramatic',d:"Esther on her quilt squares and her savings. Dreams held in objects -- one of the most moving pieces in contemporary American drama."}],scenes:[{ch:[{n:'Esther',g:'f'},{n:'George',g:'m'}],t:'Dramatic',d:"The letter-reading scenes and first meeting. Intimacy across impossible distances."}]},
  {id:149,key:'OL2900396W',title:'Clyde\'s',author:'Lynn Nottage',year:2021,genre:'Drama',era:'2020s',cast:'small',castSize:5,gender:'mixed',themes:['food','redemption','labor','incarceration','dignity'],color:'#3B6D11',cov:null,desc:'A sandwich shop staffed by formerly incarcerated workers. The owner is a tyrant. One cook dreams of a perfect sandwich. Nottage\'s most joyful play is also her most political.',rids:[79,80,148],rwhy:['Both center the dignity of labor','Formerly incarcerated people as full human subjects','Food as metaphor and love language'],monos:[{ch:'Clyde',g:'f',t:'Dramatic',d:"Clyde on her empire and her rules. A woman whose cruelty comes from a specific history."},{ch:'Montrellous',g:'m',t:'Dramatic',d:"Montrellous on the perfect sandwich. A man for whom cooking is a spiritual practice."}],scenes:[{ch:[{n:'Montrellous',g:'m'},{n:'Jason',g:'m'}],t:'Dramatic',d:"The mentor and the student. Two men across race and experience finding a common language."}]},
  {id:150,key:'OL2900398W',title:'The Laramie Project',author:'Moises Kaufman',year:2000,genre:'Drama',era:'2000s',cast:'large',castSize:8,gender:'mixed',themes:['hate crime','community','journalism','grief','America'],color:'#3B6D11',cov:null,desc:'Members of Tectonic Theater Project interview residents of Laramie, Wyoming after the murder of Matthew Shepard. A landmark of verbatim theatre that changed what documentary drama could do.',rids:[1,82,95],rwhy:['Queer loss as a public wound','A community confronting itself','Documentary form in service of empathy'],monos:[{ch:'Various voices',g:'nb',t:'Dramatic',d:"Any individual testimony speech. Great for actors who want to inhabit a real person\'s register -- requires precision and restraint."}],scenes:[]}
,
{id:151,key:'OL2900400W',title:'The Balcony',author:'Jean Genet',year:1956,genre:'Experimental',era:'1950s',cast:'large',castSize:10,gender:'mixed',themes:['power','fantasy','revolution','theatre','desire'],color:'#3A3A3A',cov:null,desc:'A brothel where clients enact fantasies of power -- judge, bishop, general -- while a revolution rages outside. Genet\'s most theatrical and politically savage play.',rids:[68,108,4],rwhy:['Both examine power as performance','The theatrical frame as political argument','Desire and authority inseparable'],monos:[{ch:'The Chief of Police',g:'m',t:'Dramatic',d:"The Chief on his need to be represented in the brothel\'s fantasies. Power that needs to be witnessed to exist."},{ch:'Irma',g:'f',t:'Dramatic',d:"Irma\'s closing speech to the audience. The Madame who runs the fantasy factory addressing us directly."}],scenes:[{ch:[{n:'The Judge',g:'m'},{n:'The Thief',g:'f'}],t:'Dramatic',d:"The fantasy scene. Power enacted as ritual -- theatrical and disturbing."}]},
  {id:152,key:'OL2900402W',title:'The Maids',author:'Jean Genet',year:1947,genre:'Drama',era:'1900s',cast:'small',castSize:3,gender:'female',themes:['class','desire','murder','ritual','identity'],color:'#993556',cov:null,desc:'Two maids ritually enact the murder of their mistress while she is away. When she returns, the ritual must become real. Genet\'s most concentrated play.',rids:[151,22,116],rwhy:['Both center female servants with murderous fantasies','Ritual as the dramatic structure','Class hatred expressed as love'],monos:[{ch:'Solange',g:'f',t:'Dramatic',d:"Solange\'s climactic speech. A servant claiming power through performance of destruction."},{ch:'Claire',g:'f',t:'Dramatic',d:"Claire as Madame. The impersonation that becomes something else."}],scenes:[{ch:[{n:'Solange',g:'f'},{n:'Claire',g:'f'}],t:'Dramatic',d:"The ritual. The sisters enacting the murder they cannot commit -- requires total physical commitment."}]},
  {id:153,key:'OL2900404W',title:'The Bald Soprano',author:'Eugene Ionesco',year:1950,genre:'Absurdist',era:'1950s',cast:'small',castSize:6,gender:'mixed',themes:['language','routine','meaninglessness','society','communication'],color:'#444441',cov:null,desc:'Two couples have a conversation that reveals language has lost all meaning. Ionesco\'s anti-play is the funniest and most disturbing work of the Theatre of the Absurd.',rids:[3,12,68],rwhy:['Language collapsing as dramatic subject','Domestic routine as existential horror','The comedy that has no bottom'],monos:[{ch:'The Fire Chief',g:'m',t:'Comedic',d:"The Fire Chief\'s anecdotes. Narrative that has completely disconnected from meaning -- great for physical comedians."},{ch:'Mrs. Martin',g:'f',t:'Comedic',d:"The discovery speech. Two people realizing they might be married -- logic applied to the illogical."}],scenes:[{ch:[{n:'Mr. Smith',g:'m'},{n:'Mrs. Smith',g:'f'}],t:'Comedic',d:"The opening scene. Domestic conversation revealing that communication has broken down entirely."}]},
  {id:154,key:'OL2900406W',title:'The Chairs',author:'Eugene Ionesco',year:1952,genre:'Absurdist',era:'1950s',cast:'small',castSize:3,gender:'mixed',themes:['old age','communication','absence','death','message'],color:'#3A3A3A',cov:null,desc:'An old couple prepare for an evening of guests to hear the old man\'s life message. The guests are invisible. The chairs multiply. The orator arrives to speak for him.',rids:[153,3,12],rwhy:['Both use absence as a dramatic presence','The message that cannot be delivered','Old age and the urgency of being heard'],monos:[{ch:'The Old Man',g:'m',t:'Dramatic',d:"The Old Man on his life and his message. A man who has waited his entire life to say something he cannot say."},{ch:'The Old Woman',g:'f',t:'Seriocomic',d:"The Old Woman welcoming invisible guests. Love and delusion as the same act."}],scenes:[{ch:[{n:'The Old Man',g:'m'},{n:'The Old Woman',g:'f'}],t:'Seriocomic',d:"The couple preparing. Two people at the end of life staging their last act."}]},
  {id:155,key:'OL2900408W',title:'Rhinoceros',author:'Eugene Ionesco',year:1959,genre:'Absurdist',era:'1950s',cast:'large',castSize:9,gender:'mixed',themes:['conformity','fascism','resistance','transformation','society'],color:'#3B6D11',cov:null,desc:'The townspeople are turning into rhinoceroses. One by one, everyone conforms. Only Berenger refuses. Ionesco\'s most politically direct play -- about how fascism happens.',rids:[153,67,3],rwhy:['Both examine how conformity swallows individuals','The last holdout as the dramatic subject','Absurdism with a political spine'],monos:[{ch:'Berenger',g:'m',t:'Dramatic',d:"Berenger\'s final refusal. A mediocre man who turns out to be the only one left -- unexpected heroism."},{ch:'Jean',g:'m',t:'Dramatic',d:"Jean transforming. A man becoming a rhinoceros -- the intellectual who succumbs first."}],scenes:[{ch:[{n:'Berenger',g:'m'},{n:'Jean',g:'m'}],t:'Seriocomic',d:"The friends\' argument before and during Jean\'s transformation."}]},
  {id:156,key:'OL2900410W',title:'Happy Days',author:'Samuel Beckett',year:1961,genre:'Absurdist',era:'1960s',cast:'small',castSize:2,gender:'mixed',themes:['time','optimism','burial','marriage','endurance'],color:'#444441',cov:null,desc:'Winnie is buried to her waist -- then to her neck -- in a mound of earth. She continues to speak. Her husband Willie barely responds. Beckett\'s most formally extreme and strangely uplifting play.',rids:[3,12,19],rwhy:['Both use formal constraint to examine endurance','Optimism in the face of the unsurvivable','A monologue that is also a marriage'],monos:[{ch:'Winnie',g:'f',t:'Dramatic',d:"Any of Winnie\'s sustained speeches. A woman maintaining brightness while being literally buried -- one of the great female roles in the canon."}],scenes:[{ch:[{n:'Winnie',g:'f'},{n:'Willie',g:'m'}],t:'Dramatic',d:"The exchanges between Winnie and Willie. A marriage rendered as two people who can barely reach each other."}]},
  {id:157,key:'OL2900412W',title:'Accidental Death of an Anarchist',author:'Dario Fo',year:1970,genre:'Comedy',era:'1970s',cast:'medium',castSize:6,gender:'mixed',themes:['police','corruption','satire','Italy','justice'],color:'#854F0B',cov:null,desc:'A maniac infiltrates a police station investigating an anarchist\'s suspicious death and exposes corruption through absurdist impersonation. Fo\'s most performed political comedy.',rids:[67,40,155],rwhy:['Both use comedy to expose state violence','Impersonation as political weapon','The clown who tells the truth'],monos:[{ch:'The Maniac',g:'m',t:'Comedic',d:"The Maniac\'s impersonations and exposures. A virtuoso comic performance requiring an actor who can play six characters while playing one."},{ch:'The Maniac',g:'m',t:'Comedic',d:"The courtroom summary. Comic timing and political clarity in the same speech."}],scenes:[{ch:[{n:'The Maniac',g:'m'},{n:'Inspector Bertozzo',g:'m'}],t:'Comedic',d:"The Maniac running rings around the police. Satire through superior logic."}]},
  {id:158,key:'OL2900414W',title:'The Visit',author:'Friedrich Durrenmatt',year:1956,genre:'Drama',era:'1950s',cast:'large',castSize:12,gender:'mixed',themes:['justice','money','revenge','corruption','community'],color:'#2C2C2A',cov:null,desc:'The richest woman in the world returns to her poor hometown with an offer: a billion for the life of the man who wronged her. The town\'s principles have a price.',rids:[158,67,40],rwhy:['Both examine the price at which communities sell their principles','Justice and revenge as the same thing','Money as the measure of everything'],monos:[{ch:'Clara Zachanassian',g:'f',t:'Dramatic',d:"Clara on what was done to her and what she has decided. A woman who has spent decades building toward one act."},{ch:'Alfred Ill',g:'m',t:'Dramatic',d:"Ill accepting his fate. A man who knows he is guilty and stops running."}],scenes:[{ch:[{n:'Clara',g:'f'},{n:'Ill',g:'m'}],t:'Dramatic',d:"The confrontation. Forty years compressed into a scene."}]},
  {id:159,key:'OL2900416W',title:'A View from the Bridge',author:'Arthur Miller',year:1955,genre:'Tragedy',era:'1950s',cast:'medium',castSize:7,gender:'mixed',themes:['immigration','desire','betrayal','honor','community'],color:'#993C1D',cov:null,desc:'Eddie Carbone harbors two illegal immigrants and falls disastrously in love with his niece. Miller\'s most Greek play -- a modern tragedy in the full classical sense.',rids:[51,65,28],rwhy:['Both are Greek tragedies in modern dress','The protagonist who cannot stop himself','Community and honor as the frame for private desire'],monos:[{ch:'Eddie',g:'m',t:'Dramatic',d:"Eddie explaining himself -- or failing to. A man who does not understand his own desire."},{ch:'Alfieri (narrator)',g:'m',t:'Dramatic',d:"Alfieri\'s frame speeches. The lawyer watching the inevitable and unable to stop it."}],scenes:[{ch:[{n:'Eddie',g:'m'},{n:'Marco',g:'m'}],t:'Dramatic',d:"The final confrontation. Honor cultures in collision."}]},
  {id:160,key:'OL2900418W',title:'All My Sons',author:'Arthur Miller',year:1947,genre:'Drama',era:'1900s',cast:'medium',castSize:8,gender:'mixed',themes:['war','guilt','responsibility','family','capitalism'],color:'#993C1D',cov:null,desc:'Joe Keller shipped defective parts during the war. Men died. He got away with it. Now his son is home and the truth wants out. Miller\'s first great play.',rids:[16,51,65],rwhy:['Both examine the American father\'s guilt','Business ethics as a family matter','The truth that arrives too late'],monos:[{ch:'Joe Keller',g:'m',t:'Dramatic',d:"Joe\'s defense of what he did. A man who genuinely cannot see the boundary between family and crime."},{ch:'Kate Keller',g:'f',t:'Dramatic',d:"Kate holding the family myth together. The mother who cannot afford the truth."}],scenes:[{ch:[{n:'Joe',g:'m'},{n:'Chris',g:'m'}],t:'Dramatic',d:"Father and son. The cost of the American dream made intimate."}]},
  {id:161,key:'OL2900420W',title:'Picnic',author:'William Inge',year:1953,genre:'Drama',era:'1950s',cast:'medium',castSize:9,gender:'mixed',themes:['desire','small town','women','yearning','escape'],color:'#533AB7',cov:null,desc:'A drifter arrives at a Kansas neighborhood on Labor Day. The women\'s lives are changed. Inge\'s Pulitzer winner about what happens when desire arrives in a place with no room for it.',rids:[64,11,10],rwhy:['Both center desire arriving in a constrained world','Women\'s yearning as the dramatic subject','The stranger who catalyzes everything'],monos:[{ch:'Hal',g:'m',t:'Dramatic',d:"Hal on his life and his failures. A man whose charm is also his damage."},{ch:'Madge',g:'f',t:'Dramatic',d:"Madge on what she wants. A beautiful woman who has never been allowed to want."}],scenes:[{ch:[{n:'Hal',g:'m'},{n:'Madge',g:'f'}],t:'Dramatic',d:"The dance. Physical attraction made theatrical -- requires actors with genuine chemistry."}]},
  {id:162,key:'OL2900422W',title:'Bus Stop',author:'William Inge',year:1955,genre:'Drama',era:'1950s',cast:'medium',castSize:8,gender:'mixed',themes:['love','Kansas','snow','desire','community'],color:'#3B6D11',cov:null,desc:'Snowbound travelers wait at a Kansas diner. A cowboy has kidnapped a nightclub singer he loves. Inge\'s most optimistic play -- love that eventually learns to be kind.',rids:[161,10,9],rwhy:['Both examine desire and what it needs to learn','The confined space as the world','Love as something that has to be educated'],monos:[{ch:'Bo',g:'m',t:'Seriocomic',d:"Bo on Cherie and what he wants. A man who has never had to ask."},{ch:'Cherie',g:'f',t:'Dramatic',d:"Cherie on her life. A nightclub singer who knows exactly what she has and has not had."}],scenes:[{ch:[{n:'Bo',g:'m'},{n:'Cherie',g:'f'}],t:'Seriocomic',d:"The negotiation. A man learning that love requires consent."}]},
  {id:163,key:'OL2900424W',title:'Awake and Sing!',author:'Clifford Odets',year:1935,genre:'Drama',era:'1900s',cast:'medium',castSize:7,gender:'mixed',themes:['Depression','Jewish family','dreams','socialism','America'],color:'#185FA5',cov:null,desc:'The Berger family in the Bronx during the Depression. Everyone wants something they cannot have. Odets\' masterpiece invented the Jewish American family drama.',rids:[16,51,2],rwhy:['Both use a family under economic pressure','The immigrant family dream versus American reality','Idealism as a survival strategy'],monos:[{ch:'Jacob',g:'m',t:'Dramatic',d:"Jacob on socialism and his grandson. An old man passing something on that he couldn\'t use himself."},{ch:'Bessie',g:'f',t:'Dramatic',d:"Bessie holding the family together by whatever means necessary. The mother as pragmatic monster."}],scenes:[{ch:[{n:'Ralph',g:'m'},{n:'Jacob',g:'m'}],t:'Dramatic',d:"Grandfather and grandson. The old world dreaming through the young."}]},
  {id:164,key:'OL2900426W',title:'The Little Foxes',author:'Lillian Hellman',year:1939,genre:'Drama',era:'1900s',cast:'medium',castSize:9,gender:'mixed',themes:['greed','family','the South','capitalism','cruelty'],color:'#5C1E1E',cov:null,desc:'The Hubbard family in Alabama 1900 tears each other apart over money. Hellman\'s most concentrated and ruthless play.',rids:[78,51,57],rwhy:['Both center a family where cruelty is the mother tongue','Southern Gothic in the classic mode','Women with power in a world that begrudges it'],monos:[{ch:'Regina',g:'f',t:'Dramatic',d:"Regina exposing what she has always known about her husband. A woman claiming the power she was always denied."},{ch:'Birdie',g:'f',t:'Dramatic',d:"Birdie drunk, telling the truth. The one person who sees clearly and cannot be heard."}],scenes:[{ch:[{n:'Regina',g:'f'},{n:'Horace',g:'m'}],t:'Dramatic',d:"The marriage as a legal negotiation. Love that has become only strategy."}]},
  {id:165,key:'OL2900428W',title:'The Children\'s Hour',author:'Lillian Hellman',year:1934,genre:'Drama',era:'1900s',cast:'medium',castSize:8,gender:'mixed',themes:['lies','lesbianism','reputation','children','justice'],color:'#993556',cov:null,desc:'A student\'s lie destroys two women\'s school and their lives. Hellman\'s debut -- about the power of accusation and what a lie about queerness costs.',rids:[164,36,69],rwhy:['Both are about the power of an accusation','A lie that cannot be disproven','Queerness as the weapon used against the innocent'],monos:[{ch:'Karen',g:'f',t:'Dramatic',d:"Karen on what has been taken. A woman whose life has been destroyed by a child\'s lie."},{ch:'Martha',g:'f',t:'Dramatic',d:"Martha\'s confession. A woman discovering the truth about herself in the worst possible moment."}],scenes:[{ch:[{n:'Karen',g:'f'},{n:'Martha',g:'f'}],t:'Dramatic',d:"The women after. Friendship tested by a revelation that changes everything."}]},
  {id:166,key:'OL2900430W',title:'The Matchmaker',author:'Thornton Wilder',year:1955,genre:'Comedy',era:'1950s',cast:'large',castSize:10,gender:'mixed',themes:['adventure','love','money','New York','life'],color:'#3B6D11',cov:null,desc:'Dolly Levi arranges a marriage while arranging her own. Two clerks escape to New York for one day of adventure. The source of Hello Dolly -- irrepressible and joyful.',rids:[9,10,117],rwhy:['Both use comic architecture to argue for living fully','The matchmaker who arranges her own happiness','Adventure as a democratic right'],monos:[{ch:'Dolly Levi',g:'f',t:'Comedic',d:"Dolly\'s address to Ephraim\'s portrait. A widow claiming the right to live again."},{ch:'Dolly Levi',g:'f',t:'Comedic',d:"Dolly on money. The philosophy of spending as a moral position."}],scenes:[{ch:[{n:'Cornelius',g:'m'},{n:'Barnaby',g:'m'}],t:'Comedic',d:"The clerks in New York. Two men discovering the world for the first time."}]},
  {id:167,key:'OL2900432W',title:'Our Town',author:'Thornton Wilder',year:1938,genre:'Drama',era:'1900s',cast:'large',castSize:14,gender:'mixed',themes:['time','community','death','ordinary life','appreciation'],color:'#0F6E56',cov:null,desc:'Grover\'s Corners, New Hampshire. Birth, marriage, death. No scenery. A Stage Manager who narrates. The play that proved theatre doesn\'t need anything except the actor and the audience.',rids:[166,49,77],rwhy:['Both argue that ordinary life is the subject','Minimalism as a form of celebration','Death as the lens that makes life visible'],monos:[{ch:'The Stage Manager',g:'nb',t:'Dramatic',d:"The Stage Manager\'s philosophical addresses. A narrator who becomes a character who becomes a voice for everything."},{ch:'Emily',g:'f',t:'Dramatic',d:"Emily\'s return scene. A dead woman asking to relive one ordinary day -- one of theatre\'s most devastating moments."}],scenes:[{ch:[{n:'Emily',g:'f'},{n:'George',g:'m'}],t:'Seriocomic',d:"The drugstore scene. Young love in an ordinary moment made extraordinary by what follows."}]},
  {id:168,key:'OL2900434W',title:'A Moon for the Misbegotten',author:'Eugene O\'Neill',year:1943,genre:'Drama',era:'1900s',cast:'small',castSize:5,gender:'mixed',themes:['guilt','alcoholism','grief','love','forgiveness'],color:'#2C2C2A',cov:null,desc:'Jamie Tyrone comes to the Hogan farm. He has not slept since his mother\'s coffin crossed the country. Josie Hogan may be the only one who can give him peace. O\'Neill\'s last completed play.',rids:[51,121,52],rwhy:['Both center grief that cannot be spoken directly','The impossible love that is also the play\'s mercy','O\'Neill writing toward forgiveness'],monos:[{ch:'Jamie',g:'m',t:'Dramatic',d:"Jamie\'s confession about his mother\'s coffin. The story he has never told -- one of O\'Neill\'s most raw and devastating scenes."},{ch:'Josie',g:'f',t:'Dramatic',d:"Josie\'s vigil speeches. A woman holding a man through the night."}],scenes:[{ch:[{n:'Jamie',g:'m'},{n:'Josie',g:'f'}],t:'Dramatic',d:"The night together. The entire play builds to this -- two damaged people giving each other something."}]},
  {id:169,key:'OL2900436W',title:'The Iceman Cometh',author:'Eugene O\'Neill',year:1946,genre:'Drama',era:'1900s',cast:'large',castSize:15,gender:'mixed',themes:['pipe dreams','alcoholism','disillusionment','death','community'],color:'#444441',cov:null,desc:'The regulars at Harry Hope\'s bar live on pipe dreams. When Hickey arrives and tries to take those dreams away, it kills them. O\'Neill\'s longest and most ambitious play.',rids:[168,3,51],rwhy:['Both examine what sustaining illusions costs','The community as protagonist','The man who tells the truth as the villain'],monos:[{ch:'Hickey',g:'m',t:'Dramatic',d:"Hickey\'s great confession. A salesman who has murdered his wife out of love -- one of the longest and most demanding monologues in American drama."},{ch:'Larry Slade',g:'m',t:'Dramatic',d:"Larry on pipe dreams and death. The philosopher of the play who is the last to lose his illusion."}],scenes:[{ch:[{n:'Hickey',g:'m'},{n:'Larry',g:'m'}],t:'Dramatic',d:"The two men. The apostle of sobriety and the man who sees through him."}]},
  {id:170,key:'OL2900438W',title:'Blues for Mister Charlie',author:'James Baldwin',year:1964,genre:'Drama',era:'1960s',cast:'large',castSize:14,gender:'mixed',themes:['race','murder','civil rights','America','justice'],color:'#993C1D',cov:null,desc:'A young Black man is murdered in a Southern town. A white man is tried. Loosely based on Emmett Till. Baldwin\'s most formally ambitious and furious play.',rids:[2,89,54],rwhy:['Both insist on the full humanity of Black men\'s lives','Murder and its aftermath as a political structure','The trial as a site of American racial drama'],monos:[{ch:'Richard',g:'m',t:'Dramatic',d:"Richard\'s speeches. A young Black man who has come home from the North with no more room to give."},{ch:'Juanita',g:'f',t:'Dramatic',d:"Juanita on grief and what comes after. A young woman insisting on the future."}],scenes:[{ch:[{n:'Richard',g:'m'},{n:'Parnell',g:'m'}],t:'Dramatic',d:"Black man and white liberal. The friendship that cannot survive what America is."}]},
  {id:171,key:'OL2900440W',title:'The Amen Corner',author:'James Baldwin',year:1954,genre:'Drama',era:'1950s',cast:'large',castSize:13,gender:'mixed',themes:['religion','family','music','race','love'],color:'#533AB7',cov:null,desc:'Sister Margaret leads her Harlem congregation. Her estranged husband returns dying. Her son wants to follow his father into jazz. Baldwin on the church, Black family, and the cost of holiness.',rids:[170,54,2],rwhy:['Both examine faith and its costs in Black American life','The family as the site of the spiritual battle','Music as salvation and departure'],monos:[{ch:'Sister Margaret',g:'f',t:'Dramatic',d:"Margaret\'s sermons and her private collapse. A woman whose public power and private grief are the same size."},{ch:'Luke',g:'m',t:'Dramatic',d:"Luke on what he left and what he found. A musician coming home to die."}],scenes:[{ch:[{n:'Margaret',g:'f'},{n:'Luke',g:'m'}],t:'Dramatic',d:"The estranged couple. A marriage that ended and didn\'t end."}]},
  {id:172,key:'OL2900442W',title:'M. Butterfly',author:'David Henry Hwang',year:1988,genre:'Drama',era:'1980s',cast:'medium',castSize:7,gender:'mixed',themes:['Orientalism','deception','love','gender','colonialism'],color:'#533AB7',cov:null,desc:'A French diplomat falls in love with a Chinese opera singer he believes to be a woman. Twenty years of illusion. Hwang\'s play about the fantasies of empire.',rids:[108,90,87],rwhy:['Both use theatrical illusion as the political argument','Desire and Orientalism as inseparable','Identity as performance in the most literal sense'],monos:[{ch:'Gallimard',g:'m',t:'Dramatic',d:"Gallimard on his perfect woman. A man whose fantasy is an entire colonial worldview."},{ch:'Song Liling',g:'nb',t:'Dramatic',d:"Song on what it takes to maintain the illusion. The performer addressing the audience directly."}],scenes:[{ch:[{n:'Gallimard',g:'m'},{n:'Song Liling',g:'nb'}],t:'Dramatic',d:"The love affair. Desire built on complete misrecognition."}]},
  {id:173,key:'OL2900444W',title:'Six Degrees of Separation',author:'John Guare',year:1990,genre:'Drama',era:'1990s',cast:'large',castSize:12,gender:'mixed',themes:['class','identity','race','connection','New York'],color:'#185FA5',cov:null,desc:'A young Black man appears at a wealthy Manhattan couple\'s door claiming to be Sidney Poitier\'s son. He is not. The story spreads across New York. Guare on connection, race, and the stories we believe.',rids:[172,87,52],rwhy:['Both examine the fantasies white people project onto Black men','Six degrees as a structure for examining privilege','The con as a form of desire for inclusion'],monos:[{ch:'Paul',g:'m',t:'Dramatic',d:"Paul on the Catcher in the Rye and the imagination. A man performing an identity he has researched perfectly."},{ch:'Ouisa',g:'f',t:'Dramatic',d:"Ouisa on what Paul gave her. The woman whose life is changed by the con -- the play\'s moral center."}],scenes:[{ch:[{n:'Ouisa',g:'f'},{n:'Flan',g:'m'}],t:'Dramatic',d:"The couple processing. A marriage illuminated by a stranger."}]},
  {id:174,key:'OL2900446W',title:'Zoot Suit',author:'Luis Valdez',year:1978,genre:'Drama',era:'1970s',cast:'large',castSize:14,gender:'mixed',themes:['Chicano identity','justice','Los Angeles','race','music'],color:'#854F0B',cov:null,desc:'Henry Reyna and the Sleepy Lagoon murder case. The first Chicano play on Broadway. Valdez uses El Pachuco as a mythic narrator/alter ego -- teatro, corrido, and expressionism combined.',rids:[170,2,89],rwhy:['Both center the trial of a man of color as a political act','The community as the body of the play','Music and style as resistance'],monos:[{ch:'El Pachuco',g:'m',t:'Dramatic',d:"El Pachuco\'s interventions. The mythic alter ego who speaks what Henry cannot -- requires a performer with total charisma."},{ch:'Henry',g:'m',t:'Dramatic',d:"Henry on his identity. A young Chicano man navigating what America will and will not allow."}],scenes:[{ch:[{n:'Henry',g:'m'},{n:'El Pachuco',g:'m'}],t:'Dramatic',d:"The man and his alter ego. The internal debate made theatrical."}]},
  {id:175,key:'OL2900448W',title:'Anna in the Tropics',author:'Nilo Cruz',year:2002,genre:'Drama',era:'2000s',cast:'medium',castSize:7,gender:'mixed',themes:['Cuba','literature','desire','family','change'],color:'#3B6D11',cov:null,desc:'A Cuban cigar factory in 1929 hires a lector to read novels aloud while the workers roll. He reads Anna Karenina. Desire enters. Cruz\'s Pulitzer winner is lyrical and devastating.',rids:[148,44,25],rwhy:['Both find the erotic in the literary','Desire entering a closed community','Latin American experience at the center'],monos:[{ch:'Juan Julian (the lector)',g:'m',t:'Dramatic',d:"Juan Julian reading. A man whose voice changes everyone around him -- the power of literature as seduction."},{ch:'Ofelia',g:'f',t:'Dramatic',d:"Ofelia on her cigar and her life. A woman in a world where beauty and labor are the same."}],scenes:[{ch:[{n:'Juan Julian',g:'m'},{n:'Conchita',g:'f'}],t:'Dramatic',d:"The reader and the listener who hears too much."}]},
  {id:176,key:'OL2900450W',title:'The Heidi Chronicles',author:'Wendy Wasserstein',year:1988,genre:'Drama',era:'1980s',cast:'large',castSize:9,gender:'mixed',themes:['feminism','friendship','disillusionment','1960s-80s','identity'],color:'#993556',cov:null,desc:'Heidi Holland moves through thirty years of American feminist history and emerges feeling profoundly alone. Wasserstein\'s Pulitzer winner about what the women\'s movement did and didn\'t do.',rids:[22,13,95],rwhy:['Both examine what the feminist movement gave and cost women','A woman\'s life across decades as the subject','The political and the personal entangled'],monos:[{ch:'Heidi',g:'f',t:'Dramatic',d:"Heidi\'s speech at the high school reunion. A woman admitting in public that she feels stranded -- one of the great feminist speeches in American drama."},{ch:'Heidi',g:'f',t:'Seriocomic',d:"Heidi on her painting. Art as the one place she has always been herself."}],scenes:[{ch:[{n:'Heidi',g:'f'},{n:'Scoop',g:'m'}],t:'Seriocomic',d:"The recurring relationship. A woman who keeps returning to a man who never quite chooses her."}]},
  {id:177,key:'OL2900452W',title:'Machinal',author:'Sophie Treadwell',year:1928,genre:'Experimental',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['marriage','imprisonment','desire','modernity','execution'],color:'#3A3A3A',cov:null,desc:'A Young Woman moves from machine to machine -- office, marriage, motherhood -- until she kills her husband and is executed. Treadwell\'s expressionist masterpiece based on a real case.',rids:[59,22,116],rwhy:['Both examine a woman trapped by social machinery','Expressionism as a way of rendering interiority','The system that processes women'],monos:[{ch:'Young Woman',g:'f',t:'Dramatic',d:"The Young Woman\'s recurring refrain -- I can\'t breathe. A woman suffocating in every space she occupies."},{ch:'Young Woman',g:'f',t:'Dramatic',d:"The confession. A woman who has done something terrible and knows exactly why."}],scenes:[{ch:[{n:'Young Woman',g:'f'},{n:'Husband',g:'m'}],t:'Dramatic',d:"The marriage scenes. The Young Woman unable to say what she cannot bear."}]},
  {id:178,key:'OL2900454W',title:'The Sign in Sidney Brustein\'s Window',author:'Lorraine Hansberry',year:1964,genre:'Drama',era:'1960s',cast:'medium',castSize:7,gender:'mixed',themes:['intellectuals','commitment','disillusionment','Greenwich Village','politics'],color:'#3C3489',cov:null,desc:'Sidney Brustein, a Greenwich Village intellectual, reluctantly gets involved in local politics. Hansberry\'s most autobiographical play -- about why disengagement is not an option.',rids:[2,163,176],rwhy:['Both examine the intellectual\'s relationship to political commitment','The Village in the 1960s as a world','Personal life and politics refusing to separate'],monos:[{ch:'Sidney',g:'m',t:'Dramatic',d:"Sidney on commitment and the temptation to disengage. Hansberry\'s argument for engagement made personal."},{ch:'Iris',g:'f',t:'Dramatic',d:"Iris on what she wants beyond what Sidney sees. A woman demanding to be seen as more than her husband\'s idea of her."}],scenes:[{ch:[{n:'Sidney',g:'m'},{n:'Iris',g:'f'}],t:'Dramatic',d:"The marriage under political strain."}]},
  {id:179,key:'OL2900456W',title:'Trouble in Mind',author:'Alice Childress',year:1955,genre:'Drama',era:'1950s',cast:'medium',castSize:8,gender:'mixed',themes:['race','theatre','stereotypes','dignity','protest'],color:'#993C1D',cov:null,desc:'A Black actress rehearsing a Broadway play about lynching finds herself unable to perform a scene that demands she degrade herself. Childress\'s play about race and artistic integrity was the first by a Black woman to win an Obie.',rids:[2,170,43],rwhy:['Both examine what Black performers are asked to give','The rehearsal room as a site of racial negotiation','Dignity as a non-negotiable artistic position'],monos:[{ch:'Wiletta',g:'f',t:'Dramatic',d:"Wiletta refusing the scene. A veteran Black actress finding her line and holding it -- one of the great speeches about artistic integrity."},{ch:'Wiletta',g:'f',t:'Seriocomic',d:"Wiletta on surviving in the business. Accommodation and resistance as the same act."}],scenes:[{ch:[{n:'Wiletta',g:'f'},{n:'Al Manners',g:'m'}],t:'Dramatic',d:"The confrontation. A Black woman and a white director -- power and race in a rehearsal room."}]},
  {id:180,key:'OL2900458W',title:'For Colored Girls Who Have Considered Suicide When the Rainbow Is Enuf',author:'Ntozake Shange',year:1976,genre:'Drama',era:'1970s',cast:'medium',castSize:7,gender:'female',themes:['Black womanhood','love','violence','joy','survival'],color:'#993556',cov:null,desc:'Seven women -- named by color -- share poems, songs, and stories. A choreopoem that invented a new form for Black women\'s experience. Still electrifying.',rids:[2,44,179],rwhy:['Both center Black women\'s interiority as the whole subject','Form invented to contain an experience no existing form could hold','Joy and grief as inseparable'],monos:[{ch:'Lady in Red',g:'f',t:'Dramatic',d:"\"somebody almost walked off wid alla my stuff.\" One of the defining speeches of American feminist theatre."},{ch:'Lady in Blue',g:'f',t:'Dramatic',d:"The abortion poem. A woman\'s body and what she decides -- utterly contemporary."}],scenes:[{ch:[{n:'Lady in Purple',g:'f'},{n:'Lady in Orange',g:'f'}],t:'Dramatic',d:"Any of the shared sequences. The chorus work requires physical precision and emotional openness."}]},
  {id:181,key:'OL2900460W',title:'Topdog/Underdog',author:'Suzan-Lori Parks',year:2001,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'male',themes:['race','identity','brothers','hustle','history'],color:'#185FA5',cov:null,desc:'Two brothers -- Lincoln and Booth -- in a flophouse room. Lincoln works as an Abraham Lincoln impersonator at an arcade. The card game at the end is inevitable. Parks\'s Pulitzer winner.',rids:[5,54,163],rwhy:['Race and performance as the same subject','Brothers as the tightest dramatic unit','The American myth consumed by its inhabitants'],monos:[{ch:'Lincoln',g:'m',t:'Dramatic',d:"Lincoln on the Gettysburg Address -- the one he has to perform every day. History as a job."},{ch:'Booth',g:'m',t:'Seriocomic',d:"Booth practicing three-card monte. A man rehearsing the life he wants."}],scenes:[{ch:[{n:'Lincoln',g:'m'},{n:'Booth',g:'m'}],t:'Dramatic',d:"The final card game. Everything the play has built to -- do not reveal the ending."}]},
  {id:182,key:'OL2900462W',title:'Eurydice',author:'Sarah Ruhl',year:2003,genre:'Drama',era:'2000s',cast:'small',castSize:6,gender:'mixed',themes:['love','death','memory','myth','fathers'],color:'#533AB7',cov:null,desc:'The myth of Orpheus and Eurydice told from Eurydice\'s perspective. She meets her father in the underworld. Ruhl\'s most beloved play -- poetic, funny, and absolutely heartbreaking.',rids:[4,75,129],rwhy:['Both use myth to examine love\'s limits','Death as a place where love continues in a different key','The father/daughter relationship as the hidden subject'],monos:[{ch:'Eurydice',g:'f',t:'Dramatic',d:"Eurydice\'s letters. A woman writing to the living from the dead."},{ch:'Father',g:'m',t:'Dramatic',d:"The Father teaching Eurydice to remember. Love as the act of helping someone keep who they are."}],scenes:[{ch:[{n:'Eurydice',g:'f'},{n:'Father',g:'m'}],t:'Dramatic',d:"Father and daughter in the underworld. One of contemporary theatre\'s most tender relationships."}]},
  {id:183,key:'OL2900464W',title:'In the Next Room',author:'Sarah Ruhl',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:6,gender:'mixed',themes:['sexuality','marriage','Victorian','science','desire'],color:'#993556',cov:null,desc:'A Victorian doctor uses a vibrator to treat female hysteria. His wife wonders what is happening in the next room. Ruhl\'s most formally playful and romantic play.',rids:[182,59,117],rwhy:['Both examine what happens when desire has no name','Comedy that is also feminist argument','Victorian repression in theatrical form'],monos:[{ch:'Catherine',g:'f',t:'Seriocomic',d:"Catherine on what she wants. A Victorian woman who cannot say the word for what she needs."},{ch:'Dr. Givings',g:'m',t:'Seriocomic',d:"The doctor explaining his treatment. A man entirely innocent of what he is doing -- and what he is missing."}],scenes:[{ch:[{n:'Catherine',g:'f'},{n:'Mrs. Daldry',g:'f'}],t:'Seriocomic',d:"The women. Desire recognized between two women who cannot quite name it."}]},
  {id:184,key:'OL2900466W',title:'Dead Man\'s Cell Phone',author:'Sarah Ruhl',year:2007,genre:'Drama',era:'2000s',cast:'small',castSize:6,gender:'mixed',themes:['death','connection','technology','love','responsibility'],color:'#3B6D11',cov:null,desc:'A woman answers a dead stranger\'s cell phone and becomes responsible for his afterlife. Ruhl at her most absurdist and warmest.',rids:[182,183,167],rwhy:['Both find the enormous in the small gesture','Death as a comic and tender subject','The stranger we become responsible for'],monos:[{ch:'Jean',g:'f',t:'Seriocomic',d:"Jean explaining herself to strangers. A woman who has taken on a life she cannot put down."},{ch:'Gordon (dead)',g:'m',t:'Dramatic',d:"Gordon\'s posthumous addresses. A dead man explaining himself -- Ruhl\'s funniest idea."}],scenes:[{ch:[{n:'Jean',g:'f'},{n:'Hermia',g:'f'}],t:'Seriocomic',d:"Jean and the widow. Two women sorting out a man they both barely knew."}]},
  {id:185,key:'OL2900468W',title:'The Clean House',author:'Sarah Ruhl',year:2004,genre:'Drama',era:'2000s',cast:'small',castSize:5,gender:'mixed',themes:['cleaning','love','death','jokes','Brazil'],color:'#854F0B',cov:null,desc:'A Brazilian cleaning woman would rather tell jokes than clean. Her employer is a surgeon whose husband falls in love with his patient. Ruhl\'s debut -- magical realism in American drama.',rids:[182,184,183],rwhy:['Both mix comedy and grief without apology','The joke as a form of love','Magical realism in a domestic space'],monos:[{ch:'Matilde',g:'f',t:'Comedic',d:"Matilde\'s jokes. A cleaning woman who is also a comedian -- the jokes are actually funny and must be told straight."},{ch:'Ana',g:'f',t:'Dramatic',d:"Ana on her apple tree. A woman who knows she is dying and refuses to be sad about it."}],scenes:[{ch:[{n:'Matilde',g:'f'},{n:'Virginia',g:'f'}],t:'Seriocomic',d:"The cleaning women. Two women who cannot stop cleaning and cannot stop talking."}]},
  {id:186,key:'OL2900470W',title:'Choir Boy',author:'Tarell Alvin McCraney',year:2012,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'male',themes:['queerness','Black masculinity','religion','school','music'],color:'#533AB7',cov:null,desc:'Pharus is the lead singer of the choir at a Black prep school. His queerness threatens his place. McCraney\'s play about faith, music, and what Black institutions ask their members to sacrifice.',rids:[99,130,1],rwhy:['Both examine queerness within Black community','Music as both belonging and expression of selfhood','The institution that gives and demands'],monos:[{ch:'Pharus',g:'m',t:'Dramatic',d:"Pharus on his voice and his faith. A young man who refuses to separate his queerness from his God."},{ch:'Headmaster Marrow',g:'m',t:'Dramatic',d:"The Headmaster on tradition. An institution\'s case for itself."}],scenes:[{ch:[{n:'Pharus',g:'m'},{n:'Bobby',g:'m'}],t:'Dramatic',d:"The central conflict. Two young men whose closeness has become dangerous."}]},
  {id:187,key:'OL2900472W',title:'Mlima\'s Tale',author:'Lynn Nottage',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['ivory trade','Africa','corruption','death','haunting'],color:'#2C2C2A',cov:null,desc:'Mlima is a great elephant who is killed for his tusks. His ghost follows the ivory through poachers, middlemen, and markets. Nottage\'s most formally inventive play.',rids:[80,79,148],rwhy:['Both follow a thing through the world to expose a system','The non-human subject who demands human accountability','Theatre as a tool for environmental and economic justice'],monos:[{ch:'Mlima',g:'m',t:'Dramatic',d:"Mlima\'s presence speeches. A ghost made of weight and memory -- requires a performer with physical authority."},{ch:'Poacher',g:'m',t:'Dramatic',d:"The poacher\'s justification. A man at the bottom of the supply chain."}],scenes:[{ch:[{n:'Mlima',g:'m'},{n:'Poacher',g:'m'}],t:'Dramatic',d:"The ghost haunting the man. Accusation as presence."}]},
  {id:188,key:'OL2900474W',title:'Fires in the Mirror',author:'Anna Deavere Smith',year:1992,genre:'Drama',era:'1990s',cast:'solo',castSize:1,gender:'female',themes:['race','Crown Heights','community','journalism','identity'],color:'#993C1D',cov:null,desc:'Smith performs over 25 real people from the Crown Heights riots. A one-woman documentary that redefined what solo theatre could do and what race meant in America.',rids:[43,95,150],rwhy:['Verbatim performance as political act','A single performer holding multiple perspectives','Race as the central dramatic fact'],monos:[{ch:'Various voices',g:'nb',t:'Dramatic',d:"Any single character speech -- Al Sharpton, the Crown Heights women, the scholars. Requires the performer to transform physically. Great for actors who can inhabit without impersonating."}],scenes:[]},
  {id:189,key:'OL2900476W',title:'Twilight: Los Angeles 1992',author:'Anna Deavere Smith',year:1993,genre:'Drama',era:'1990s',cast:'solo',castSize:1,gender:'female',themes:['LA riots','race','justice','community','America'],color:'#854F0B',cov:null,desc:'Smith performs the people of Los Angeles after the Rodney King verdict. Jurors, rioters, police, Korean shopkeepers, and politicians -- all in one body.',rids:[188,43,150],rwhy:['Both use the documentary body to explore race\'s complexity','The city after violence as a theatrical subject','One performer holding contradictory truths simultaneously'],monos:[{ch:'Various voices',g:'nb',t:'Dramatic',d:"Any of the individual testimonies. The form requires actors who can hold specificity and empathy together without judgment."}],scenes:[]},
  {id:190,key:'OL2900478W',title:'The Colored Museum',author:'George C. Wolfe',year:1986,genre:'Comedy',era:'1980s',cast:'medium',castSize:5,gender:'mixed',themes:['race','Black culture','stereotypes','history','satire'],color:'#533AB7',cov:null,desc:'Eleven exhibits in a museum of African American experience -- from the Middle Passage to Mama on the Couch. Wolfe\'s satire of Black stereotypes is savage, celebratory, and formally brilliant.',rids:[180,43,170],rwhy:['Both examine how Black experience is represented and misrepresented','Satire as a form of love and rage','Theatrical form as political argument'],monos:[{ch:'The Git on Board Flight Attendant',g:'f',t:'Comedic',d:"The opening exhibit. A flight attendant on a slave ship -- absurdist and harrowing simultaneously."},{ch:'The Man',g:'m',t:'Dramatic',d:"Git on Board. A man choosing between his past and his future."}],scenes:[{ch:[{n:'Lala',g:'f'},{n:'Madame Re-Re',g:'f'}],t:'Comedic',d:"The Lala exhibit. A Black celebrity confronting her past -- one of the sharpest pieces in the play."}]},
  {id:191,key:'OL2900480W',title:'Topdog/Underdog',author:'Suzan-Lori Parks',year:2001,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'male',themes:['race','performance','brothers','America','history'],color:'#3C3489',cov:null,desc:'See id:5 -- included here as a reminder that Parks\'s other major works deserve equal attention. See also: In the Blood, Fucking A, Father Comes Home from the Wars.',rids:[5,54,2],rwhy:['Parks across her career','The full range of her dramatic imagination','American history as the raw material'],monos:[],scenes:[]},
  {id:192,key:'OL2900482W',title:'The Rover',author:'Aphra Behn',year:1677,genre:'Comedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',themes:['desire','freedom','gender','money','carnival'],color:'#854F0B',cov:null,desc:'English cavaliers in Naples during carnival pursue women who have their own ideas about desire and freedom. Behn\'s most popular play -- raucous, proto-feminist, and very funny.',rids:[27,9,10],rwhy:['Both use comedy to expose the gender politics of desire','Female agency as the real subject','Physical and verbal wit together'],monos:[{ch:'Hellena',g:'f',t:'Comedic',d:"Hellena\'s case for wanting to love before entering a convent. Sparkling and modern -- great for actors who can play wit and warmth together."},{ch:'Angellica',g:'f',t:'Dramatic',d:"Angellica on love and commerce. A courtesan who falls in love and refuses to pretend it doesn\'t cost her."}],scenes:[{ch:[{n:'Hellena',g:'f'},{n:'Willmore',g:'m'}],t:'Seriocomic',d:"The courtship scenes. Sparring dialogue that requires actors who can keep up -- very fast."}]},
  {id:193,key:'OL2900484W',title:'The Duchess of Malfi',author:'John Webster',year:1613,genre:'Tragedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',themes:['power','desire','death','corruption','obsession'],color:'#5C1E1E',cov:null,desc:'The Duchess secretly marries her steward. Her brothers find out. What follows is one of the most blood-soaked and psychologically complex Jacobean tragedies -- and the female role is extraordinary.',rids:[8,7,103],rwhy:['Both center a woman destroyed by men who claim to love her','Jacobean darkness at its most concentrated','The Duchess as one of the great female roles of the period'],monos:[{ch:'The Duchess',g:'f',t:'Dramatic',d:"The Duchess in prison. A woman who faces death with more dignity than her brothers will ever have."},{ch:'Ferdinand',g:'m',t:'Dramatic',d:"Ferdinand\'s obsession speeches. Desire that has curdled into something unnamed and terrible."}],scenes:[{ch:[{n:'The Duchess',g:'f'},{n:'Antonio',g:'m'}],t:'Dramatic',d:"The proposal scene. A woman doing the proposing in a world that forbids it."}]},
  {id:194,key:'OL2900486W',title:'Doctor Faustus',author:'Christopher Marlowe',year:1592,genre:'Tragedy',era:'1600s',cast:'large',castSize:12,gender:'mixed',themes:['ambition','knowledge','damnation','desire','bargain'],color:'#3A3A3A',cov:null,desc:'Faustus sells his soul to Mephistopheles for twenty-four years of power and knowledge. Marlowe\'s great play about the cost of wanting everything.',rids:[7,8,104],rwhy:['Both are about the price of transgressive ambition','The deal with the devil as a dramatic structure','Marlowe writing the play Shakespeare would have to reckon with'],monos:[{ch:'Faustus',g:'m',t:'Dramatic',d:"Faustus\'s opening survey of learning. A man who has mastered everything and finds it insufficient."},{ch:'Mephistopheles',g:'m',t:'Dramatic',d:"Mephistopheles on hell. The most honest speech in the play -- hell is where Faustus already is."}],scenes:[{ch:[{n:'Faustus',g:'m'},{n:'Mephistopheles',g:'m'}],t:'Dramatic',d:"The bargain. The most important negotiation in English Renaissance drama."}]},
  {id:195,key:'OL2900488W',title:'Life Is a Dream',author:'Pedro Calderon de la Barca',year:1635,genre:'Drama',era:'1600s',cast:'medium',castSize:8,gender:'mixed',themes:['fate','free will','identity','dream','honor'],color:'#533AB7',cov:null,desc:'Segismundo has been imprisoned since birth because of a prophecy. Released to test the prophecy, he behaves as predicted. But is it fate or the prison\'s effect? The great Spanish Baroque play.',rids:[7,108,3],rwhy:['Both examine whether character is destiny or circumstance','The dream as a metaphor for life itself','Honor and identity in the Spanish Golden Age tradition'],monos:[{ch:'Segismundo',g:'m',t:'Dramatic',d:"Segismundo on life as a dream. A man who has been given philosophical questions he didn\'t ask for -- one of the great European soliloquies."},{ch:'Rosaura',g:'f',t:'Dramatic',d:"Rosaura in disguise. A woman navigating a man\'s world with a man\'s weapons."}],scenes:[{ch:[{n:'Segismundo',g:'m'},{n:'Rosaura',g:'f'}],t:'Dramatic',d:"The encounter. A prisoner and an exile -- two people outside the social order."}]},
  {id:196,key:'OL2900490W',title:'The Caucasian Chalk Circle',author:'Bertolt Brecht',year:1944,genre:'Drama',era:'1900s',cast:'large',castSize:12,gender:'mixed',themes:['justice','motherhood','class','war','possession'],color:'#444441',cov:null,desc:'See id:110 -- referenced here to note Brecht\'s other major works for the catalogue: Mother Courage, The Good Person of Szechwan, Life of Galileo, The Threepenny Opera.',rids:[67,110,157],rwhy:['Brecht across the full range','Epic theatre at its most varied','The V-effect from multiple angles'],monos:[],scenes:[]},
  {id:197,key:'OL2900492W',title:'Translations',author:'Brian Friel',year:1980,genre:'Drama',era:'1980s',cast:'medium',castSize:8,gender:'mixed',themes:['language','colonialism','Ireland','identity','loss'],color:'#3B6D11',cov:null,desc:'British soldiers arrive to map Ireland and rename its landscape. Friel\'s masterpiece about language, power, and what is lost when a culture\'s names are taken.',rids:[32,72,114],rwhy:['Both examine what language does to a people','Colonialism as a drama of naming','Loss that cannot be undone'],monos:[{ch:'Manus',g:'m',t:'Dramatic',d:"Manus\'s departure. Pride and hurt and impossible choices."},{ch:'Marie',g:'f',t:'Dramatic',d:"Marie on wanting to leave. Young desire against old loyalty."}],scenes:[{ch:[{n:'Marie',g:'f'},{n:'Yolland',g:'m'}],t:'Seriocomic',d:"The love scene where neither speaks the other\'s language. Pure theatrical poetry -- requires actors who trust silence."}]},
  {id:198,key:'OL2900494W',title:'Philadelphia Here I Come',author:'Brian Friel',year:1964,genre:'Drama',era:'1960s',cast:'medium',castSize:9,gender:'mixed',themes:['emigration','father-son','Ireland','memory','silence'],color:'#533AB7',cov:null,desc:'Gar O\'Donnell leaves for Philadelphia tomorrow. Public Gar and Private Gar -- played by two actors -- spend his last night in Donegal. Friel\'s most formally inventive early play.',rids:[197,72,33],rwhy:['The interior life made theatrical','Emigration as the Irish wound','The father-son silence at the center of everything'],monos:[{ch:'Private Gar',g:'m',t:'Seriocomic',d:"Private Gar\'s running commentary. The inner life we never speak -- comic and devastating."},{ch:'Public Gar',g:'m',t:'Dramatic',d:"Gar\'s failed attempts to speak to his father. What we cannot say."}],scenes:[{ch:[{n:'Public Gar',g:'m'},{n:'S.B.',g:'m'}],t:'Dramatic',d:"Father and son who cannot talk. The scenes that never become the conversation they need."}]},
  {id:199,key:'OL2900496W',title:'The Playboy of the Western World',author:'J.M. Synge',year:1907,genre:'Comedy',era:'1900s',cast:'medium',castSize:9,gender:'mixed',themes:['storytelling','heroism','community','Ireland','language'],color:'#3B6D11',cov:null,desc:'Christy Mahon arrives in a Mayo pub claiming to have killed his father. He becomes a hero. The language is Synge\'s own creation -- heightened Irish speech that rioted at its premiere.',rids:[20,197,114],rwhy:['Both examine the stories communities tell themselves','Heroism as a social construction','Language as the primary theatrical act'],monos:[{ch:'Christy',g:'m',t:'Comedic',d:"Christy\'s increasingly elaborate accounts of patricide. Requires a performer who can make tall tales physically irresistible."},{ch:'Pegeen Mike',g:'f',t:'Dramatic',d:"Pegeen\'s final lament. Short, brutal, perfectly compressed."}],scenes:[{ch:[{n:'Christy',g:'m'},{n:'Pegeen Mike',g:'f'}],t:'Seriocomic',d:"The courtship. Flirtation through violence and storytelling."}]},
  {id:200,key:'OL2900498W',title:'Dancing at Lughnasa',author:'Brian Friel',year:1990,genre:'Drama',era:'1990s',cast:'medium',castSize:7,gender:'mixed',themes:['memory','Ireland','family','music','pagan'],color:'#0F6E56',cov:null,desc:'Five sisters in 1930s Donegal. A summer that will end everything. Michael narrates from the future. Friel\'s most celebrated play -- about what memory preserves and what it cannot.',rids:[198,197,114],rwhy:['Both use memory as the dramatic structure','Ireland at a moment of transition','The dance that contains everything the sisters cannot say'],monos:[{ch:'Michael (narrator)',g:'m',t:'Dramatic',d:"Michael\'s narrations. The child become adult, making sense of what he witnessed."},{ch:'Maggie',g:'f',t:'Seriocomic',d:"Maggie\'s jokes and songs. The sister who keeps everyone alive with laughter -- deceptively demanding."}],scenes:[{ch:[{n:'Chris',g:'f'},{n:'Gerry',g:'m'}],t:'Seriocomic',d:"The dance. The most famous scene in Irish theatre -- joy and grief in the same gesture."}]}
,
{id:201,key:'OL2900500W',title:'Circle Mirror Transformation',author:'Annie Baker',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:5,gender:'mixed',themes:['acting','community','loneliness','theatre','change'],color:'#444441',cov:null,desc:'Five adults take a community acting class in a Vermont recreation center. Baker uses theatre exercises to reveal everything. Her most accessible play and a masterclass in dramatic patience.',rids:[77,131,49],rwhy:['Both find the enormous in the deliberately small','Theatre exercises as a way into real feeling','Ensemble work where everyone carries equal weight'],monos:[{ch:'Marty',g:'f',t:'Dramatic',d:"Marty leading an exercise that becomes something else. A teacher who accidentally opens herself."},{ch:'James',g:'m',t:'Dramatic',d:"James in an exercise about the past. A man who cannot control what comes out."}],scenes:[{ch:[{n:'Lauren',g:'f'},{n:'Schultz',g:'m'}],t:'Seriocomic',d:"The unexpected attraction. Two people discovering something in an exercise room."},{ch:[{n:'Marty',g:'f'},{n:'James',g:'m'}],t:'Dramatic',d:"The marriage underneath the class. What the exercises reveal about two people who live together."}]},
  {id:202,key:'OL2900502W',title:'The Aliens',author:'Annie Baker',year:2010,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'male',themes:['friendship','failure','youth','Vermont','loss'],color:'#3A3A3A',cov:null,desc:'Two older guys hang out behind a coffee shop. A teenager starts hanging out with them. Then one of the guys dies. Baker\'s most direct play about male friendship and grief.',rids:[77,201,49],rwhy:['Both treat male friendship with the seriousness it deserves','Vermont as a world with its own grammar','Grief that arrives after the fact'],monos:[{ch:'KJ',g:'m',t:'Dramatic',d:"KJ on his novel and his life. A man who has not done what he thought he would."},{ch:'Jasper',g:'m',t:'Seriocomic',d:"Jasper\'s pronouncements. A stoner philosopher who is sometimes right."}],scenes:[{ch:[{n:'KJ',g:'m'},{n:'Jasper',g:'m'}],t:'Seriocomic',d:"The two friends. A friendship that has the easy grammar of long acquaintance."},{ch:[{n:'Evan',g:'m'},{n:'KJ',g:'m'}],t:'Dramatic',d:"The teenager and the older man. Mentorship that neither asked for."}]},
  {id:203,key:'OL2900504W',title:'John',author:'Annie Baker',year:2015,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['dolls','Gettysburg','relationship','haunting','history'],color:'#533AB7',cov:null,desc:'A couple stays at a Gettysburg B&B full of dolls. The relationship is ending. The host has her own history. Baker\'s most formally ambitious play -- three and a half hours of escalating strangeness.',rids:[77,201,202],rwhy:['Both use a specific American landscape as a container for everything else','The uncanny in the domestic','Time and space as the dramatic material'],monos:[{ch:'Mertis',g:'f',t:'Dramatic',d:"Mertis on the dolls and the house. A woman whose relationship to objects is a philosophy of survival."},{ch:'Jenny',g:'f',t:'Dramatic',d:"Jenny in the night. A woman coming apart in a strange bed."}],scenes:[{ch:[{n:'Jenny',g:'f'},{n:'Elias',g:'m'}],t:'Dramatic',d:"The couple. A relationship examined through the lens of a haunted place."},{ch:[{n:'Mertis',g:'f'},{n:'Jenny',g:'f'}],t:'Dramatic',d:"The host and the guest. Two women and the things they cannot say."}]},
  {id:204,key:'OL2900506W',title:'The Antipodes',author:'Annie Baker',year:2017,genre:'Drama',era:'2010s',cast:'medium',castSize:8,gender:'mixed',themes:['storytelling','capitalism','creation','myth','office'],color:'#2C2C2A',cov:null,desc:'A group of writers in a conference room tries to find the world\'s oldest story. A food delivery never arrives. Someone is missing. Baker\'s strangest and funniest play.',rids:[203,77,108],rwhy:['Both examine storytelling as a form of power','The office as a place where myth is made','The story that cannot be told'],monos:[{ch:'Sandy',g:'m',t:'Dramatic',d:"Sandy on the project and what he wants from it. A producer who may or may not be honest."},{ch:'Eleanor',g:'f',t:'Dramatic',d:"Eleanor\'s story. The one that might be the real one."}],scenes:[{ch:[{n:'Adam',g:'m'},{n:'Danny',g:'m'}],t:'Seriocomic',d:"The writers trying to work. Comic desperation under an unclear mandate."}]},
  {id:205,key:'OL2900508W',title:'Plano',author:'Will Arbery',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['family','Texas','faith','sisters','loss'],color:'#854F0B',cov:null,desc:'Three sisters in Texas. Men come and go. The sisters endure. Arbery\'s debut -- Chekhovian in its structure, entirely American in its feeling.',rids:[142,15,131],rwhy:['Both use sisters as an ensemble to map everything','Texas as a world with its own spiritual grammar','Faith and doubt living in the same house'],monos:[{ch:'Christine',g:'f',t:'Dramatic',d:"Christine on what she believes. A woman whose faith is total and examined."},{ch:'Julie',g:'f',t:'Dramatic',d:"Julie\'s anger. The sister who left and carries the leaving with her."}],scenes:[{ch:[{n:'Christine',g:'f'},{n:'Julie',g:'f'}],t:'Dramatic',d:"The sisters\' central argument. Faith and doubt between women who love each other."},{ch:[{n:'Julie',g:'f'},{n:'Bobbie',g:'f'}],t:'Seriocomic',d:"Two sisters processing the third. The way families talk around the person who isn\'t there."}]},
  {id:206,key:'OL2900510W',title:'Dana H.',author:'Lucas Hnath',year:2019,genre:'Drama',era:'2010s',cast:'solo',castSize:1,gender:'female',themes:['trauma','survival','true story','kidnapping','identity'],color:'#3A3A3A',cov:null,desc:'Hnath\'s mother was kidnapped by a man she was trying to help. Dana H. lip-syncs to the recording of her own story. One of the most formally radical and disturbing plays of its era.',rids:[128,4,95],rwhy:['Both use formal extremity to approach unbearable material','The survivor\'s own voice as the theatrical medium','Trauma that cannot be narrativized in conventional form'],monos:[{ch:'Dana H.',g:'f',t:'Dramatic',d:"The entire play -- Dana lip-syncing to the recording of her own voice telling her story. The form is the content: a woman returning to what happened to her."}],scenes:[]},
  {id:207,key:'OL2900512W',title:'The Christians',author:'Lucas Hnath',year:2014,genre:'Drama',era:'2010s',cast:'small',castSize:5,gender:'mixed',themes:['faith','hell','church','community','doubt'],color:'#533AB7',cov:null,desc:'Pastor Paul announces from the pulpit that he no longer believes in hell. The congregation, his associate, his wife all respond differently. A play about what a belief costs when you lose it.',rids:[142,167,205],rwhy:['Both examine faith as a community and not just a private matter','The cost of changing your mind about the most important thing','Theatre in a church as a formal choice'],monos:[{ch:'Pastor Paul',g:'m',t:'Dramatic',d:"Paul\'s sermon announcing his change of belief. A man dismantling the structure he has spent his life building."},{ch:'Elizabeth',g:'f',t:'Dramatic',d:"Elizabeth on what the marriage has been. A wife responding to a change she did not ask for."}],scenes:[{ch:[{n:'Paul',g:'m'},{n:'Associate Pastor Joshua',g:'m'}],t:'Dramatic',d:"The two pastors. Faith and its institutions at war inside two men who once agreed on everything."}]},
  {id:208,key:'OL2900514W',title:'Red Speedo',author:'Lucas Hnath',year:2014,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['sports','drugs','family','ambition','Olympics'],color:'#993C1D',cov:null,desc:'A competitive swimmer is days from the Olympic trials. Someone has hidden performance-enhancing drugs in the pool refrigerator. His relationships collapse under pressure.',rids:[207,69,53],rwhy:['Both use a confined world to expose everything','Ambition as the engine that destroys','The body as the site of the argument'],monos:[{ch:'Ray',g:'m',t:'Dramatic',d:"Ray on what he needs. A swimmer who has made his body his entire identity."},{ch:'Peter',g:'m',t:'Dramatic',d:"Peter on his brother. Management that is also a form of ownership."}],scenes:[{ch:[{n:'Ray',g:'m'},{n:'Peter',g:'m'}],t:'Dramatic',d:"The brothers. One body, two different ideas about what it is for."},{ch:[{n:'Ray',g:'m'},{n:'Rachel',g:'f'}],t:'Dramatic',d:"The relationship under pressure. Love measured against ambition."}]},
  {id:209,key:'OL2900516W',title:'The Thin Place',author:'Lucas Hnath',year:2019,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['grief','psychics','the supernatural','skepticism','mothers'],color:'#2C2C2A',cov:null,desc:'Hilda sees a psychic after her grandmother dies and wonders if she can contact her. Hnath\'s most formally simple and emotionally devastating play.',rids:[206,207,184],rwhy:['Both approach grief through formal invention','The supernatural as a lens for what we cannot let go','Skepticism that wants to believe'],monos:[{ch:'Hilda',g:'f',t:'Dramatic',d:"Hilda on her grandmother. Grief expressed as a need to keep talking to someone."},{ch:'Linda (the psychic)',g:'f',t:'Dramatic',d:"Linda on what she can and cannot do. A woman who may be a fraud and may not be."}],scenes:[{ch:[{n:'Hilda',g:'f'},{n:'Linda',g:'f'}],t:'Dramatic',d:"The sessions. A woman wanting to believe, sitting with a woman who may be lying."}]},
  {id:210,key:'OL2900518W',title:'Yerma',author:'Federico Garcia Lorca',year:1934,genre:'Tragedy',era:'1900s',cast:'medium',castSize:8,gender:'mixed',themes:['fertility','desire','marriage','obsession','Spain'],color:'#993C1D',cov:null,desc:'Yerma cannot conceive and her desire becomes a consuming force. Her husband does not understand. Lorca\'s most intimate and physical tragedy.',rids:[107,116,103],rwhy:['Both center female desire as a tragic force','The body as the site of a cultural argument','Lorca\'s poetic language in its most concentrated form'],monos:[{ch:'Yerma',g:'f',t:'Dramatic',d:"Yerma\'s lullaby to the child she doesn\'t have. One of the most heartbreaking pieces in the repertoire."},{ch:'Yerma',g:'f',t:'Dramatic',d:"The final confrontation. Pure physical and emotional extremity."}],scenes:[{ch:[{n:'Yerma',g:'f'},{n:'Juan',g:'m'}],t:'Dramatic',d:"The marriage scenes. Desire and refusal in a language of earth and sky."}]},
  {id:211,key:'OL2900520W',title:'The House of Bernarda Alba',author:'Federico Garcia Lorca',year:1936,genre:'Drama',era:'1900s',cast:'large',castSize:10,gender:'female',themes:['repression','desire','mourning','Spain','tyranny'],color:'#2C2C2A',cov:null,desc:'After their father dies, Bernarda imposes eight years of strict mourning on her daughters. The youngest will not survive it. Lorca\'s final play -- written two months before his death.',rids:[107,210,116],rwhy:['All-female world under a patriarchal law','Repression until explosion','Lorca at his most direct and devastating'],monos:[{ch:'Bernarda',g:'f',t:'Dramatic',d:"Bernarda\'s commands. Authority as violence -- every line is a prohibition."},{ch:'Adela',g:'f',t:'Dramatic',d:"Adela\'s defiance. The youngest daughter claiming her body -- short, electrifying."}],scenes:[{ch:[{n:'Adela',g:'f'},{n:'Martirio',g:'f'}],t:'Dramatic',d:"Sisters competing for the same man. Desire and cruelty inseparable."},{ch:[{n:'Bernarda',g:'f'},{n:'Poncia',g:'f'}],t:'Dramatic',d:"Mistress and servant. The woman who controls and the woman who sees everything."}]},
  {id:212,key:'OL2900522W',title:'When the Rain Stops Falling',author:'Andrew Bovell',year:2008,genre:'Drama',era:'2000s',cast:'medium',castSize:8,gender:'mixed',themes:['climate','family','time','Australia','inheritance'],color:'#185FA5',cov:null,desc:'Four generations of an Australian family across eighty years as the rain stops. Bovell\'s play moves backward and forward in time -- the sins of the father amplified through generations.',rids:[127,23,50],rwhy:['Both examine what we pass on to those who follow','Time as a non-linear dramatic structure','Climate as backdrop and inevitable subject'],monos:[{ch:'Gabriel York',g:'m',t:'Dramatic',d:"Gabriel on fish falling from the sky. A man at the edge of something -- ecological and personal."},{ch:'Elizabeth',g:'f',t:'Dramatic',d:"Elizabeth on what she has chosen not to tell. A woman who has held a secret for decades."}],scenes:[{ch:[{n:'Gabriel',g:'m'},{n:'Gabrielle',g:'f'}],t:'Dramatic',d:"The same names across generations. Love and inheritance playing out again."}]},
  {id:213,key:'OL2900524W',title:'The Good Person of Szechwan',author:'Bertolt Brecht',year:1943,genre:'Drama',era:'1900s',cast:'large',castSize:14,gender:'mixed',themes:['goodness','capitalism','poverty','identity','gods'],color:'#444441',cov:null,desc:'Three gods visit earth looking for one good person. Shen Te, a prostitute in Szechwan, is the only one they find. But goodness requires a disguise to survive. Brecht\'s most accessible and warm play.',rids:[67,110,157],rwhy:['Both ask whether goodness is possible in a capitalist world','The double identity as a political argument','Epic theatre with a genuinely human center'],monos:[{ch:'Shen Te',g:'f',t:'Dramatic',d:"Shen Te on what goodness requires. A woman who has discovered that being good destroys you."},{ch:'Shui Ta (Shen Te\'s alter ego)',g:'m',t:'Dramatic',d:"Shui Ta\'s business speeches. The ruthless self that goodness cannot afford to be."}],scenes:[{ch:[{n:'Shen Te',g:'f'},{n:'Yang Sun',g:'m'}],t:'Dramatic',d:"The love affair that complicates everything. Brecht\'s most romantic writing."}]},
  {id:214,key:'OL2900526W',title:'Life of Galileo',author:'Bertolt Brecht',year:1943,genre:'Drama',era:'1900s',cast:'large',castSize:14,gender:'mixed',themes:['science','truth','cowardice','authority','knowledge'],color:'#3A3A3A',cov:null,desc:'Galileo discovers that the earth moves around the sun. The church disagrees. He recants. Brecht\'s most ambivalent play -- is Galileo a hero, a coward, or a scientist who understood that survival serves truth?',rids:[67,125,194],rwhy:['Both examine what a man will sacrifice for truth versus survival','Science and authority in permanent collision','The recantation as the central dramatic act'],monos:[{ch:'Galileo',g:'m',t:'Dramatic',d:"Galileo\'s self-examination after his recantation. A man trying to explain cowardice that may have been wisdom."},{ch:'Andrea',g:'m',t:'Dramatic',d:"Andrea\'s accusation. The student who cannot forgive his teacher for surviving."}],scenes:[{ch:[{n:'Galileo',g:'m'},{n:'Inquisitor',g:'m'}],t:'Dramatic',d:"The confrontation with the church. Science and faith as equally powerful institutions."},{ch:[{n:'Galileo',g:'m'},{n:'Andrea',g:'m'}],t:'Dramatic',d:"Teacher and student across a betrayal. Science as a relationship."}]},
  {id:215,key:'OL2900528W',title:'The Resistible Rise of Arturo Ui',author:'Bertolt Brecht',year:1941,genre:'Drama',era:'1900s',cast:'large',castSize:15,gender:'mixed',themes:['fascism','Hitler','capitalism','crime','rise to power'],color:'#5C1E1E',cov:null,desc:'Hitler\'s rise to power retold as a Chicago gangster parable. A vegetable racket becomes a political machine. Brecht\'s most direct anti-fascist play and the one that bites hardest now.',rids:[67,157,214],rwhy:['Both use comedy to expose how fascism rises','The gangster as a figure for political corruption','Brecht\'s most urgent and theatrical warning'],monos:[{ch:'Arturo Ui',g:'m',t:'Dramatic',d:"Ui learning to speak. The gangster practicing rhetoric -- Brecht\'s most brilliant and chilling theatrical idea."},{ch:'Ui',g:'m',t:'Dramatic',d:"The final speech. Fascism announcing its victory and warning that it can happen again."}],scenes:[{ch:[{n:'Ui',g:'m'},{n:'Givola',g:'m'}],t:'Dramatic',d:"Ui and his henchmen. The mechanics of political violence organized as a corporation."}]},
  {id:216,key:'OL2900530W',title:'Marat/Sade',author:'Peter Weiss',year:1963,genre:'Experimental',era:'1960s',cast:'large',castSize:20,gender:'mixed',themes:['revolution','madness','theatre','history','ideology'],color:'#3A3A3A',cov:null,desc:'The inmates of Charenton asylum perform a play about the assassination of Marat, directed by the Marquis de Sade. Revolution, madness, and performance collapse into each other.',rids:[151,67,108],rwhy:['Both use a play-within-a-play to examine theatre\'s relationship to violence','Madness and political passion as indistinguishable','The asylum as the world'],monos:[{ch:'De Sade',g:'m',t:'Dramatic',d:"De Sade\'s philosophical arguments with Marat. An individualist and a collectivist arguing from inside a madhouse."},{ch:'Marat',g:'m',t:'Dramatic',d:"Marat\'s revolutionary speeches. A dead man\'s idealism voiced by a madman."}],scenes:[{ch:[{n:'De Sade',g:'m'},{n:'Marat',g:'m'}],t:'Dramatic',d:"The central ideological debate. Two visions of freedom that cannot coexist."}]},
  {id:217,key:'OL2900532W',title:'Right You Are If You Think You Are',author:'Luigi Pirandello',year:1917,genre:'Drama',era:'1900s',cast:'medium',castSize:9,gender:'mixed',themes:['truth','identity','society','reality','gossip'],color:'#533AB7',cov:null,desc:'A town tries to find out the truth about a mysterious family. Both possible truths are equally verifiable. Pirandello\'s most comedic examination of the impossibility of objective reality.',rids:[108,3,153],rwhy:['Both make epistemological uncertainty the dramatic subject','Society\'s need to know as a form of violence','The play that has no answer and doesn\'t pretend to'],monos:[{ch:'Laudisi',g:'m',t:'Comedic',d:"Laudisi\'s philosophical commentary. The character who sees the comedy of everyone else\'s certainty -- great for actors with dry wit."},{ch:'Signora Frola',g:'f',t:'Dramatic',d:"Signora Frola\'s account. Either a devoted mother or a madwoman -- both completely convincing."}],scenes:[{ch:[{n:'Signora Frola',g:'f'},{n:'Ponza',g:'m'}],t:'Dramatic',d:"The impossible confrontation. Two contradictory truths occupying the same scene."}]},
  {id:218,key:'OL2900534W',title:'Henry IV',author:'Luigi Pirandello',year:1922,genre:'Drama',era:'1900s',cast:'medium',castSize:8,gender:'mixed',themes:['madness','identity','time','performance','reality'],color:'#2C2C2A',cov:null,desc:'A man fell from a horse and believed he was the Emperor Henry IV. He recovered twenty years ago but continues to perform madness. Pirandello\'s most philosophically complex play.',rids:[108,217,3],rwhy:['Both examine whether sanity and performance can be separated','The choice to remain in a fictional identity','Theatre itself as the subject'],monos:[{ch:'Henry IV',g:'m',t:'Dramatic',d:"Henry\'s revelation speech. A man explaining why he chose to stay mad -- one of the great theatrical monologues about identity and freedom."},{ch:'Henry IV',g:'m',t:'Dramatic',d:"The final confrontation. A man who has been performing stepping briefly into reality with violent consequences."}],scenes:[{ch:[{n:'Henry IV',g:'m'},{n:'Donna Matilda',g:'f'}],t:'Dramatic',d:"The former lover visiting. Twenty years and a fixed performance between two people who were once real to each other."}]},
  {id:219,key:'OL2900536W',title:'The Father',author:'August Strindberg',year:1887,genre:'Drama',era:'1800s',cast:'small',castSize:6,gender:'mixed',themes:['marriage','power','paternity','madness','women'],color:'#444441',cov:null,desc:'A Captain and his wife fight over who will control their daughter\'s upbringing. The wife plants doubt about the daughter\'s paternity. Strindberg\'s most concentrated study of marital warfare.',rids:[60,18,51],rwhy:['Both examine marriage as a power struggle with no rules','Doubt as a weapon','The domestic space as a battlefield'],monos:[{ch:'The Captain',g:'m',t:'Dramatic',d:"The Captain on paternity and certainty. A man whose entire identity unravels on a question he cannot answer."},{ch:'Laura',g:'f',t:'Dramatic',d:"Laura on her strategy. A woman who fights the only way available to her."}],scenes:[{ch:[{n:'The Captain',g:'m'},{n:'Laura',g:'f'}],t:'Dramatic',d:"The central power struggle. A marriage as a zero-sum game."}]},
  {id:220,key:'OL2900538W',title:'A Dream Play',author:'August Strindberg',year:1902,genre:'Experimental',era:'1900s',cast:'large',castSize:15,gender:'mixed',themes:['suffering','dream','god','humanity','pity'],color:'#3C3489',cov:null,desc:'The daughter of Indra descends to earth to understand human suffering. The play moves like a dream -- characters dissolve and reappear, settings shift, logic is emotional not rational.',rids:[219,108,4],rwhy:['Both abandon realistic structure to render consciousness','The divine encountering the mundane','Suffering as the dramatic subject and the form'],monos:[{ch:'Agnes (Indra\'s daughter)',g:'f',t:'Dramatic',d:"Agnes on human suffering. A goddess who has understood what she came to understand -- grief and pity as the same thing."},{ch:'The Lawyer',g:'m',t:'Dramatic',d:"The Lawyer on marriage. Humanity\'s institutions exposed through their most representative figure."}],scenes:[{ch:[{n:'Agnes',g:'f'},{n:'The Lawyer',g:'m'}],t:'Dramatic',d:"The marriage. Divine empathy and human disappointment."}]},
  {id:221,key:'OL2900540W',title:'Miss Julie',author:'August Strindberg',year:1888,genre:'Drama',era:'1800s',cast:'small',castSize:3,gender:'mixed',themes:['class','desire','power','destruction','midsummer'],color:'#3A3A3A',cov:null,desc:'On Midsummer Night, an aristocratic woman and her father\'s valet enact each other\'s destruction. Strindberg\'s naturalist masterpiece -- all psychology, no resolution.',rids:[219,18,60],rwhy:['Both study what class and desire do to each other','The single night that contains everything','Strindberg\'s most concentrated dramatic thinking'],monos:[{ch:'Miss Julie',g:'f',t:'Dramatic',d:"Julie\'s dream. A woman who wants to fall and to rise simultaneously -- pure Strindberg."},{ch:'Jean',g:'m',t:'Dramatic',d:"Jean\'s dream of the orchard. Class desire as fantasy."}],scenes:[{ch:[{n:'Miss Julie',g:'f'},{n:'Jean',g:'m'}],t:'Dramatic',d:"The power shifts between them across the night. Who is dominant changes with every scene."}]},
  {id:222,key:'OL2900542W',title:'The Ghost Sonata',author:'August Strindberg',year:1907,genre:'Experimental',era:'1900s',cast:'medium',castSize:9,gender:'mixed',themes:['guilt','death','appearance','corruption','redemption'],color:'#2C2C2A',cov:null,desc:'A student enters a ghost world of secrets, guilt, and the living dead. Strindberg\'s chamber play dissolves realism completely in favor of a language of souls.',rids:[220,4,3],rwhy:['Both abandon realism to render psychological states','The haunted house as a state of mind','Chamber theatre at its most extreme'],monos:[{ch:'The Colonel (as a mummy)',g:'m',t:'Dramatic',d:"The mummy speaking. A man reduced to a haunted puppet -- bizarre and devastating."},{ch:'The Student',g:'m',t:'Dramatic',d:"The Student\'s final lament. Youth confronting a world of corruption -- Strindberg\'s farewell to optimism."}],scenes:[{ch:[{n:'The Student',g:'m'},{n:'The Young Woman',g:'f'}],t:'Dramatic',d:"The young couple. Love in a world that has decayed -- Strindberg as heartbreaking as he ever gets."}]},
  {id:223,key:'OL2900544W',title:'Twelfth Night',author:'William Shakespeare',year:1601,genre:'Comedy',era:'1600s',cast:'large',castSize:14,gender:'mixed',themes:['love','identity','disguise','desire','melancholy'],color:'#0F6E56',cov:null,desc:'Viola shipwrecks on Illyria and disguises herself as a man. She falls in love with the Duke who loves Olivia who falls in love with Viola-as-man. Shakespeare\'s most tender and melancholy comedy.',rids:[9,7,224],rwhy:['Both examine desire that cannot know its own object','Disguise as a way into queer feeling','The comedy that keeps reaching toward sadness'],monos:[{ch:'Viola',g:'f',t:'Dramatic',d:"Viola on her secret. A woman who cannot speak her love -- one of Shakespeare\'s most delicate soliloquies."},{ch:'Malvolio',g:'m',t:'Comedic',d:"Malvolio reading the letter. Self-love made hilarious -- the greatest comic set-piece in Shakespeare."}],scenes:[{ch:[{n:'Viola',g:'f'},{n:'Olivia',g:'f'}],t:'Seriocomic',d:"Viola wooing Olivia on behalf of the Duke. Both of them confused for opposite reasons."},{ch:[{n:'Viola',g:'f'},{n:'Orsino',g:'m'}],t:'Dramatic',d:"The conversations by the sea. Intimacy between a man and a woman who is dressed as a man."}]},
