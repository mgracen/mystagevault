  {id:68,key:'OL2900232W',title:'No Exit',author:'Jean-Paul Sartre',year:1944,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',themes:['hell','other people','identity','judgment','eternity'],color:'#3A3A3A',cov:null,desc:'Three people are locked in a room together forever. Hell is other people. Sartre\'s most performed play and his most purely theatrical idea.',rids:[3,12,4],rwhy:['Both place characters in a space they cannot leave','The other person as the source of suffering','Existence as a dramatic problem'],monos:[{ch:'Garcin',g:'m',t:'Dramatic',d:"Garcin on cowardice. A man who cannot stop trying to prove what he already knows about himself."},{ch:'Inez',g:'f',t:'Dramatic',d:"Inez\'s lucid cruelty speeches. A woman who understands hell and chooses to inhabit it fully."}],scenes:[{ch:[{n:'Garcin',g:'m'},{n:'Inez',g:'f'}],t:'Dramatic',d:"The central power struggle. Two people who need each other and cannot stand each other."},{ch:[{n:'Inez',g:'f'},{n:'Estelle',g:'f'}],t:'Dramatic',d:"Inez pursuing Estelle. Desire weaponized in an eternal room."}]},
  {id:69,key:'OL2900234W',title:'Oleanna',author:'David Mamet',year:1992,genre:'Drama',era:'1990s',cast:'small',castSize:2,gender:'mixed',themes:['power','education','accusation','language','gender'],color:'#533AB7',cov:null,desc:'A student and professor. Two acts, same office, one accusation that changes everything. The most divisive play about power and language in contemporary American theatre.',rids:[53,36,52],rwhy:['Both make the audience complicit in judgment','Power as the subject of every line','Two-hander where the stakes are total'],monos:[{ch:'Carol',g:'f',t:'Dramatic',d:"Carol\'s accusations in Act 2. A woman who has found language to name something -- requires total conviction."},{ch:'John',g:'m',t:'Dramatic',d:"John\'s explanations. A man whose reasonable self-presentation becomes its own indictment."}],scenes:[{ch:[{n:'John',g:'m'},{n:'Carol',g:'f'}],t:'Dramatic',d:"Any of the three acts\' central confrontations. The power shifts in each one -- great for exploring status."}]},
  {id:70,key:'OL2900236W',title:'Doubt: A Parable',author:'John Patrick Shanley',year:2005,genre:'Drama',era:'2000s',cast:'small',castSize:4,gender:'mixed',themes:['doubt','power','faith','accusation','certainty'],color:'#2C2C2A',cov:null,desc:'Sister Aloysius suspects a priest of abuse. The evidence is ambiguous. A perfect play about certainty, doubt, and the cost of knowing.',rids:[69,36,65],rwhy:['Both examine institutional power and its secrets','The impossibility of certainty as dramatic engine','Two matched wills in a power struggle'],monos:[{ch:'Sister Aloysius',g:'f',t:'Dramatic',d:"Aloysius\'s final confession of doubt. The certainty she built everything on collapsing."},{ch:'Father Flynn',g:'m',t:'Dramatic',d:"Flynn\'s sermon speeches. Using the pulpit to play the audience -- great for actors who can hold a room."}],scenes:[{ch:[{n:'Sister Aloysius',g:'f'},{n:'Father Flynn',g:'m'}],t:'Dramatic',d:"The confrontation scenes. Among the most precisely written power struggles in contemporary American drama."}]},
  {id:71,key:'OL2900238W',title:'The Glass Menagerie',author:'Tennessee Williams',year:1944,genre:'Drama',era:'1900s',cast:'small',castSize:4,gender:'mixed',themes:['memory','escape','family','illusion','loneliness'],color:'#854F0B',cov:null,desc:'Tom narrates memories of his mother Amanda and sister Laura from a life he is trying to escape. Williams\'s most tender and autobiographical play.',rids:[64,51,17],rwhy:['Memory as a dramatic structure','The family that cannot be left behind','Tenderness and claustrophobia together'],monos:[{ch:'Tom',g:'m',t:'Dramatic',d:"Tom\'s narrator speeches. The adult looking back at his escape -- requires command of Williams\'s poetic register."},{ch:'Amanda',g:'f',t:'Seriocomic',d:"Amanda\'s recollections of her gentlemen callers. Simultaneously comic and heartbreaking."}],scenes:[{ch:[{n:'Amanda',g:'f'},{n:'Tom',g:'m'}],t:'Dramatic',d:"The supper table arguments. Family claustrophobia rendered exactly."},{ch:[{n:'Laura',g:'f'},{n:'Jim',g:'m'}],t:'Seriocomic',d:"The gentleman caller scene. Fragility and kindness -- Williams\'s most delicate duet."}]},
  {id:72,key:'OL2900240W',title:'Dancing at Lughnasa',author:'Brian Friel',year:1990,genre:'Drama',era:'1990s',cast:'medium',castSize:7,gender:'mixed',themes:['memory','Ireland','family','music','paganism'],color:'#3B6D11',cov:null,desc:'Five sisters in 1930s Donegal. A summer that will end everything. Friel\'s memory play captures a world before it disappears.',rids:[33,32,15],rwhy:['Both use memory as a way of holding what was lost','Ireland as a world with its own grammar','The ensemble of women at its center'],monos:[{ch:'Michael (narrator)',g:'m',t:'Dramatic',d:"Michael\'s narration -- the child as adult, making sense of what he could not understand then."},{ch:'Maggie',g:'f',t:'Seriocomic',d:"Maggie\'s jokes and songs. The one who keeps the family alive with laughter."}],scenes:[{ch:[{n:'Chris',g:'f'},{n:'Gerry',g:'m'}],t:'Seriocomic',d:"The dance. The most famous scene in Irish theatre -- joy and grief in the same moment."}]},
  {id:73,key:'OL2900242W',title:'The Pillowman',author:'Martin McDonagh',year:2003,genre:'Drama',era:'2000s',cast:'medium',castSize:4,gender:'mixed',themes:['storytelling','violence','children','art','totalitarianism'],color:'#3A3A3A',cov:null,desc:'A writer in a totalitarian state is interrogated about his dark fairy tales and their possible connection to child murders. McDonagh\'s most disturbing and brilliant play.',rids:[21,4,38],rwhy:['Both use violence as a theatrical fact','Art\'s relationship to its darkest material','The interrogation room as a theatrical space'],monos:[{ch:'Katurian',g:'m',t:'Dramatic',d:"Katurian telling his stories. A writer defending his work -- requires total commitment to material that is genuinely disturbing."},{ch:'Michal',g:'m',t:'Dramatic',d:"Michal\'s confession. Childlike language describing terrible things."}],scenes:[{ch:[{n:'Katurian',g:'m'},{n:'Tupolski',g:'m'}],t:'Dramatic',d:"The interrogation. Two men playing games while the stakes are total."}]},
  {id:74,key:'OL2900244W',title:'The Beauty Queen of Leenane',author:'Martin McDonagh',year:1996,genre:'Drama',era:'1990s',cast:'small',castSize:4,gender:'mixed',themes:['Ireland','mother/daughter','cruelty','escape','loneliness'],color:'#993556',cov:null,desc:'Maureen cares for her elderly mother in a Galway cottage. Ray arrives. Escape seems possible. McDonagh\'s debut is funny and devastating in equal measure.',rids:[73,20,32],rwhy:['Both are about a woman trapped by care and custom','Irish cruelty played as dark comedy','The small room where everything happens'],monos:[{ch:'Maureen',g:'f',t:'Seriocomic',d:"Maureen on her fantasies of escape. Longing and bitterness inseparable."},{ch:'Mag',g:'f',t:'Seriocomic',d:"Mag\'s complaints and manipulations. One of the great comic monster mothers."}],scenes:[{ch:[{n:'Maureen',g:'f'},{n:'Mag',g:'f'}],t:'Seriocomic',d:"Any mother/daughter scene. The power balance shifts constantly -- requires actors who can play cruelty as love."}]},
  {id:75,key:'OL2900246W',title:'Constellations',author:'Nick Payne',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:2,gender:'mixed',themes:['love','quantum mechanics','time','fate','loss'],color:'#533AB7',cov:null,desc:'Roland and Marianne\'s relationship plays out across multiple parallel universes simultaneously. A 70-minute two-hander about everything love contains.',rids:[30,48,23],rwhy:['Both use science as an emotional lens','The two-hander form at its most concentrated','Every version of love in one play'],monos:[{ch:'Marianne',g:'f',t:'Dramatic',d:"Marianne\'s speech about bees and possibility. Science and feeling as the same thing."},{ch:'Roland',g:'m',t:'Dramatic',d:"Roland in any of the scenes where he loses her. Grief multiplied across possibility."}],scenes:[{ch:[{n:'Roland',g:'m'},{n:'Marianne',g:'f'}],t:'Dramatic',d:"Any paired scene. The play repeats and varies -- great for finding how small choices change everything."}]},
  {id:76,key:'OL2900248W',title:'Cock',author:'Mike Bartlett',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:4,gender:'mixed',themes:['sexuality','identity','love','choice','honesty'],color:'#185FA5',cov:null,desc:'John has been with M for years. He meets W. He cannot choose. Bartlett\'s blunt, funny, painful play about desire and identity.',rids:[75,1,6],rwhy:['Both center questions of sexual identity','Love as an impossible arithmetic','The two-hander expanded into a triangle'],monos:[{ch:'John',g:'m',t:'Dramatic',d:"John trying to explain himself. A man genuinely unable to understand what he wants."},{ch:'W',g:'f',t:'Dramatic',d:"W\'s confrontation speech. A woman who knows exactly what she wants and says so."}],scenes:[{ch:[{n:'John',g:'m'},{n:'M',g:'m'}],t:'Dramatic',d:"The relationship scenes. The comfort of the established partnership."},{ch:[{n:'John',g:'m'},{n:'W',g:'f'}],t:'Dramatic',d:"The new attraction. Desire as confusion rather than clarity."}]},
  {id:77,key:'OL2900250W',title:'The Flick',author:'Annie Baker',year:2013,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',themes:['work','loneliness','film','connection','time'],color:'#444441',cov:null,desc:'Three employees work in a nearly empty Massachusetts movie theatre. Baker\'s Pulitzer winner is three hours of the mundane and somehow shattering.',rids:[30,49,15],rwhy:['Both treat ordinary life as the site of everything','Time and silence as dramatic tools','Young people in dead-end work'],monos:[{ch:'Avery',g:'m',t:'Dramatic',d:"Avery on movies and meaning. A cinephile trying to explain why beauty matters."},{ch:'Rose',g:'f',t:'Dramatic',d:"Rose on her past and her choices. Quiet devastation."}],scenes:[{ch:[{n:'Avery',g:'m'},{n:'Sam',g:'m'}],t:'Seriocomic',d:"The movie trivia scenes. Friendship and loneliness -- Baker at her most tender."},{ch:[{n:'Sam',g:'m'},{n:'Rose',g:'f'}],t:'Dramatic',d:"The love and hurt between them. Everything unsaid."}]},
  {id:78,key:'OL2900252W',title:'August: Osage County',author:'Tracy Letts',year:2007,genre:'Drama',era:'2000s',cast:'large',castSize:13,gender:'mixed',themes:['family','addiction','secrets','Oklahoma','cruelty'],color:'#854F0B',cov:null,desc:'The Weston family reunites after the patriarch disappears. Three acts, one house, and enough secrets to detonate everything. A modern American classic.',rids:[51,52,65],rwhy:['The American family as a site of violence','Secrets as structural support and bomb','Large ensemble where everyone matters'],monos:[{ch:'Violet',g:'f',t:'Dramatic',d:"Violet\'s pill speeches and dinner table explosion. Cruelty as a defense mechanism -- one of the great American female roles."},{ch:'Barbara',g:'f',t:'Dramatic',d:"Barbara\'s reckoning. The daughter becoming the mother despite everything."}],scenes:[{ch:[{n:'Barbara',g:'f'},{n:'Violet',g:'f'}],t:'Dramatic',d:"The mother/daughter confrontations. Two equally matched, equally damaged women."},{ch:[{n:'Ivy',g:'f'},{n:'Barbara',g:'f'},{n:'Karen',g:'f'}],t:'Seriocomic',d:"The three sisters together. Processing the same family in completely different registers."}]},
  {id:79,key:'OL2900254W',title:'Sweat',author:'Lynn Nottage',year:2015,genre:'Drama',era:'2010s',cast:'large',castSize:9,gender:'mixed',themes:['deindustrialization','race','class','friendship','America'],color:'#993C1D',cov:null,desc:'Workers at a Reading, Pennsylvania factory navigate job losses, racial tension, and friendships under pressure. Nottage\'s Pulitzer-winning play about what deindustrialization costs.',rids:[54,42,2],rwhy:['The American working class as a dramatic subject','Race and class as entangled forces','Friendship under economic pressure'],monos:[{ch:'Tracey',g:'f',t:'Dramatic',d:"Tracey defending her choices. Pride and prejudice in a register that feels entirely contemporary."},{ch:'Chris',g:'m',t:'Dramatic',d:"Chris on his visions of escape. Young male aspiration in a town that has stopped aspiring."}],scenes:[{ch:[{n:'Cynthia',g:'f'},{n:'Tracey',g:'f'}],t:'Dramatic',d:"The central friendship under pressure. Two women who love each other and what economics does to that love."}]},
  {id:80,key:'OL2900256W',title:'Ruined',author:'Lynn Nottage',year:2008,genre:'Drama',era:'2000s',cast:'large',castSize:10,gender:'mixed',themes:['war','women','survival','Congo','humanity'],color:'#3B6D11',cov:null,desc:'Mama Nadi runs a bar in the Congo during civil war. Women come to her broken. She keeps them safe by making them useful. Nottage\'s most shattering play.',rids:[79,44,25],rwhy:['Both center the survival strategies of women in impossible situations','War as a backdrop that becomes the entire world','The body as the site of political violence'],monos:[{ch:'Mama Nadi',g:'f',t:'Dramatic',d:"Mama\'s speech about what she has given and what she has kept. Survival as moral philosophy."},{ch:'Sophie',g:'f',t:'Dramatic',d:"Sophie singing. Music as the only intact thing."}],scenes:[{ch:[{n:'Mama Nadi',g:'f'},{n:'Christian',g:'m'}],t:'Seriocomic',d:"The relationship between Mama and Christian. Love that can only speak sideways."}]},
  {id:81,key:'OL2900258W',title:'How I Learned to Drive',author:'Paula Vogel',year:1997,genre:'Drama',era:'1990s',cast:'small',castSize:5,gender:'mixed',themes:['abuse','memory','family','survival','complicity'],color:'#533AB7',cov:null,desc:"Li'l Bit remembers learning to drive -- and the lessons she didn\'t ask for. Vogel\'s structurally daring play about survival and the complexity of love.",rids:[37,44,4],rwhy:['Memory as a non-linear structure','Complicity and survival as equally real','Female experience told on its own terms'],monos:[{ch:"Li'l Bit",g:'f',t:'Dramatic',d:"Li\'l Bit\'s narration. The adult looking back at the child she was -- perspective and vulnerability simultaneously."}],scenes:[{ch:[{n:"Li'l Bit",g:'f'},{n:'Peck',g:'m'}],t:'Dramatic',d:"The driving lesson scenes. Manipulation in a domestic register -- affection and danger at once."}]},
  {id:82,key:'OL2900260W',title:'The Normal Heart',author:'Larry Kramer',year:1985,genre:'Drama',era:'1980s',cast:'large',castSize:10,gender:'mixed',themes:['AIDS','activism','love','politics','grief'],color:'#533AB7',cov:null,desc:'New York 1981. Gay men are dying of a mysterious illness. Ned Weeks fights for recognition while his community is erased. One of the most important plays ever written.',rids:[1,41,76],rwhy:['Both center the AIDS crisis and the fight for recognition','Love and political rage inseparable','The community organizing against its own destruction'],monos:[{ch:'Ned Weeks',g:'m',t:'Dramatic',d:"Ned\'s speeches to the mayor, to his community, to Felix. Rage as the only love language available."},{ch:'Dr. Emma Brookner',g:'f',t:'Dramatic',d:"Emma\'s clinical urgency. A woman trying to make the world hear her through science."}],scenes:[{ch:[{n:'Ned',g:'m'},{n:'Felix',g:'m'}],t:'Dramatic',d:"The love story between Ned and Felix. Tenderness in the middle of a political war."}]},
  {id:83,key:'OL2900262W',title:'Angels in America: Perestroika',author:'Tony Kushner',year:1992,genre:'Drama',era:'1990s',cast:'large',castSize:8,gender:'mixed',themes:['AIDS','America','change','angels','hope'],color:'#533AB7',cov:null,desc:'The second part of Kushner\'s epic -- the Angel returns, Prior wrestles with prophecy, and the Reagan era ends. Vast, funny, and genuinely hopeful.',rids:[1,82,41],rwhy:['The completion of the Angels in America epic','Hope as a hard-won dramatic position','The ensemble at full power'],monos:[{ch:'Prior Walter',g:'m',t:'Dramatic',d:"Prior\'s blessing at the end. A man who has refused to die choosing life -- the play\'s culminating speech."},{ch:'Belize',g:'m',t:'Dramatic',d:"Belize on America and Louis. The sharpest political intelligence in the play."}],scenes:[{ch:[{n:'Prior',g:'m'},{n:'The Angel',g:'nb'}],t:'Dramatic',d:"Prior wrestling with the Angel. One of the most physically and emotionally demanding scenes in American theatre."}]},
  {id:84,key:'OL2900264W',title:'The Lehman Trilogy',author:'Stefano Massini',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'male',themes:['capitalism','America','family','history','collapse'],color:'#2C2C2A',cov:null,desc:'Three actors play the entire Lehman family across 163 years, from a cotton shop in Alabama to the 2008 financial collapse. Epic theatre at its most ambitious.',rids:[40,67,53],rwhy:['Both trace capitalism as a force that consumes everything','History compressed into performance','The family as the unit of economic analysis'],monos:[{ch:'Henry Lehman',g:'m',t:'Dramatic',d:"Henry arriving in America. The immigrant\'s first encounter with a country that will make and destroy his family."},{ch:'Philip Lehman',g:'m',t:'Dramatic',d:"Philip on cotton and capital. The moment the family stops touching what it sells."}],scenes:[{ch:[{n:'Henry',g:'m'},{n:'Emanuel',g:'m'}],t:'Dramatic',d:"The brothers building the business. Collaboration as the foundation of everything that follows."}]},
  {id:85,key:'OL2900266W',title:'The Ferryman',author:'Jez Butterworth',year:2017,genre:'Drama',era:'2010s',cast:'large',castSize:16,gender:'mixed',themes:['Ireland','the Troubles','family','harvest','death'],color:'#3B6D11',cov:null,desc:'A harvest day in 1981 Armagh. The Quinn family gathers. A body has been found. The IRA arrives. Butterworth\'s most ambitious play -- a world in a farmhouse.',rids:[72,74,20],rwhy:['Both create an entire Irish world on a single set','The harvest as a ritual that contains violence','The large family ensemble under pressure'],monos:[{ch:'Caitlin',g:'f',t:'Dramatic',d:"Caitlin\'s grief speeches. A woman who has been waiting ten years for her husband\'s body."},{ch:'Quinn',g:'m',t:'Dramatic',d:"Quinn on what he has left behind and what has followed him."}],scenes:[{ch:[{n:'Quinn',g:'m'},{n:'Malone',g:'m'}],t:'Dramatic',d:"The IRA negotiation. Menace beneath rural courtesy -- very Pinteresque."}]},
  {id:86,key:'OL2900268W',title:'Jerusalem',author:'Jez Butterworth',year:2009,genre:'Drama',era:'2000s',cast:'large',castSize:10,gender:'mixed',themes:['England','myth','outsiders','community','freedom'],color:'#3B6D11',cov:null,desc:'Rooster Byron lives in a trailer in the Wiltshire woods. The council wants to evict him. St George\'s Day arrives. One of the great plays of the twenty-first century.',rids:[85,20,57],rwhy:['Both create a mythic outsider figure','England\'s landscape as both real and legendary','The community that needs and destroys its wild man'],monos:[{ch:'Rooster Byron',g:'m',t:'Dramatic',d:"Rooster\'s giant speeches -- the man who met the giants who built Stonehenge. Requires an actor of enormous charisma and physical presence."},{ch:'Rooster',g:'m',t:'Seriocomic',d:"Rooster entertaining the young. The pied piper as drug dealer as myth."}],scenes:[{ch:[{n:'Rooster',g:'m'},{n:'Johnny Byron',g:'m'}],t:'Seriocomic',d:"Rooster with his hangers-on. The court around the king -- the play\'s comic engine."}]},
  {id:87,key:'OL2900270W',title:'Disgraced',author:'Ayad Akhtar',year:2012,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['identity','race','Islam','America','dinner party'],color:'#993556',cov:null,desc:'A dinner party in a Manhattan apartment. Four people. One conversation that unravels. Akhtar\'s Pulitzer winner about identity, assimilation, and what we inherit.',rids:[87,69,52],rwhy:['Both use a single evening to detonate a world','Identity as the explosive material','The dinner party as a theatrical trap'],monos:[{ch:'Amir',g:'m',t:'Dramatic',d:"Amir\'s confession about what he felt watching the towers fall. A speech that costs everything to deliver."},{ch:'Emily',g:'f',t:'Dramatic',d:"Emily on Islamic art and her work. Appropriation examined from the inside."}],scenes:[{ch:[{n:'Amir',g:'m'},{n:'Emily',g:'f'}],t:'Dramatic',d:"The marriage under pressure. Love and identity colliding."},{ch:[{n:'Amir',g:'m'},{n:'Jory',g:'f'}],t:'Dramatic',d:"The confrontation across race and class. The dinner party\'s most volatile moment."}]},
  {id:88,key:'OL2900272W',title:'Cost of Living',author:'Martyna Majok',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['disability','care','class','connection','loneliness'],color:'#185FA5',cov:null,desc:'Two parallel stories of caregivers and those they care for. Majok\'s Pulitzer winner is tender, funny, and completely unsentimental about bodies and need.',rids:[49,77,30],rwhy:['Both examine what people need from each other','Care as a form of power and love simultaneously','Working-class experience without condescension'],monos:[{ch:'Eddie',g:'m',t:'Dramatic',d:"Eddie on what he has lost and what remains. Masculinity and caregiving in the same body."},{ch:'Ani',g:'f',t:'Dramatic',d:"Ani\'s rage at her situation. A woman with cerebral palsy refusing to be defined by it."}],scenes:[{ch:[{n:'Eddie',g:'m'},{n:'Ani',g:'f'}],t:'Dramatic',d:"Eddie bathing Ani. Intimacy and power and history between two people who loved each other."},{ch:[{n:'Jess',g:'f'},{n:'John',g:'m'}],t:'Dramatic',d:"The caregiver and the student. Class and connection across a difference neither understands."}]},
  {id:89,key:'OL2900274W',title:'Pass Over',author:'Antoinette Nwandu',year:2017,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'male',themes:['race','police violence','America','waiting','freedom'],color:'#993C1D',cov:null,desc:'Two young Black men wait on a street corner -- waiting to make it to the Promised Land, waiting not to be killed. Beckett meets the Bible meets the present.',rids:[3,2,82],rwhy:['Waiting as an existential and political condition','Both draw on Beckett while insisting on their own specificity','Blackness and mortality as the same question'],monos:[{ch:'Moses',g:'m',t:'Dramatic',d:"Moses on the Promised Land. A man who refuses to stop believing in something."},{ch:'Kitch',g:'m',t:'Seriocomic',d:"Kitch\'s lists of what the good life looks like. Desire as a survival strategy."}],scenes:[{ch:[{n:'Moses',g:'m'},{n:'Kitch',g:'m'}],t:'Seriocomic',d:"The corner scenes -- the play\'s whole world. Friendship and fear and humor in the same breath."}]},
  {id:90,key:'OL2900276W',title:'Slave Play',author:'Jeremy O. Harris',year:2018,genre:'Drama',era:'2010s',cast:'large',castSize:8,gender:'mixed',themes:['race','sex','therapy','power','America'],color:'#3A3A3A',cov:null,desc:'Three interracial couples in a plantation-themed sex roleplay scenario undergo antebellum therapy. Harris\'s explosive debut challenges every boundary of comfort and form.',rids:[89,87,1],rwhy:['Both confront American racial history as a lived present','Form-breaking as political act','Sex and power as inseparable from race'],monos:[{ch:'Kaneisha',g:'f',t:'Dramatic',d:"Kaneisha\'s confession to Jim. What she needs and what it costs her to need it."},{ch:'Phillip',g:'m',t:'Dramatic',d:"Phillip on his Blackness and his desire. A man trying to articulate what he cannot."}],scenes:[{ch:[{n:'Kaneisha',g:'f'},{n:'Jim',g:'m'}],t:'Dramatic',d:"The plantation roleplay. Requires total commitment and a strong directorial frame."}]},
  {id:91,key:'OL2900278W',title:'Water by the Spoonful',author:'Quiara Alegria Hudes',year:2011,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['addiction','community','war','family','recovery'],color:'#0F6E56',cov:null,desc:'Elliot is a Iraq veteran haunted by a ghost. Online, his cousin Yazmin moderates a chat room for recovering addicts. Two worlds that cannot help each other enough.',rids:[81,88,49],rwhy:['Both examine addiction without sentimentality','The family that forms online as real as blood','War trauma as background radiation'],monos:[{ch:'Elliot',g:'m',t:'Dramatic',d:"Elliot and the ghost. A veteran who cannot leave a doorway in Fallujah."},{ch:'Haikumom',g:'f',t:'Dramatic',d:"Haikumom moderating the chat room. Care expressed as structure."}],scenes:[{ch:[{n:'Elliot',g:'m'},{n:'Yazmin',g:'f'}],t:'Dramatic',d:"The cousins trying to be what the other needs. Family love under pressure."}]},
  {id:92,key:'OL2900280W',title:'Pipeline',author:'Dominique Morisseau',year:2017,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['education','race','motherhood','school to prison','class'],color:'#993C1D',cov:null,desc:'Nya is a public school teacher whose son is in a private school. When he is accused of assault, her two worlds collide. Morisseau on education and who it is for.',rids:[79,54,89],rwhy:['Both examine race and class in American institutions','Motherhood as a political position','The school as a site of systemic failure'],monos:[{ch:'Nya',g:'f',t:'Dramatic',d:"Nya on what she wants for her son. The gap between what a mother can give and what the world will allow."},{ch:'Omari',g:'m',t:'Dramatic',d:"Omari\'s defense of himself. A young Black man in a system that has already decided."}],scenes:[{ch:[{n:'Nya',g:'f'},{n:'Omari',g:'m'}],t:'Dramatic',d:"Mother and son. Love and fear and the thing between them that education cannot fix."}]},
  {id:93,key:'OL2900282W',title:'Skeleton Crew',author:'Dominique Morisseau',year:2016,genre:'Drama',era:'2010s',cast:'small',castSize:4,gender:'mixed',themes:['labor','Detroit','race','loyalty','survival'],color:'#854F0B',cov:null,desc:'Four workers in a Detroit auto stamping plant in 2008 face the plant\'s closure. Morisseau\'s most intimate play -- the factory floor as the whole world.',rids:[79,92,42],rwhy:['Both center working-class Black Americans at a moment of crisis','Loyalty and survival as competing values','The workplace as a community under threat'],monos:[{ch:'Faye',g:'f',t:'Dramatic',d:"Faye on her thirty years in the plant. Work as identity and what happens when it ends."},{ch:'Dez',g:'m',t:'Dramatic',d:"Dez on his plan. A young man who has seen the future and is trying to survive it."}],scenes:[{ch:[{n:'Faye',g:'f'},{n:'Reggie',g:'m'}],t:'Dramatic',d:"The supervisor and the veteran worker. Authority and loyalty in conflict."}]},
  {id:94,key:'OL2900284W',title:'The Mountaintop',author:'Katori Hall',year:2009,genre:'Drama',era:'2000s',cast:'small',castSize:2,gender:'mixed',themes:['Martin Luther King','mortality','legacy','faith','America'],color:'#533AB7',cov:null,desc:'The night before his assassination, Martin Luther King Jr. waits alone in his motel room. A maid arrives. A two-hander that reimagines the last night of a giant.',rids:[54,89,2],rwhy:['Both center a Black man\'s relationship to his legacy','The motel room as the whole world','Mortality as the dramatic engine'],monos:[{ch:'MLK',g:'m',t:'Dramatic',d:"King\'s private speeches -- the man behind the icon. Fear and faith and the knowledge of what is coming."},{ch:'Camae',g:'f',t:'Dramatic',d:"Camae revealing herself. The messenger and the message."}],scenes:[{ch:[{n:'MLK',g:'m'},{n:'Camae',g:'f'}],t:'Dramatic',d:"The two of them through the night. One of contemporary theatre\'s great two-handers."}]},
  {id:95,key:'OL2900286W',title:'What the Constitution Means to Me',author:'Heidi Schreck',year:2018,genre:'Drama',era:'2010s',cast:'small',castSize:3,gender:'mixed',themes:['Constitution','women','history','immigration','America'],color:'#993556',cov:null,desc:'Heidi Schreck performed at American Legion halls as a teenager to pay for college. Now she returns to ask what the Constitution has meant to the women in her family.',rids:[43,29,22],rwhy:['Both use the performer\'s own story as the political argument','Women\'s bodies as the site of constitutional law','Documentary theatre as emotional experience'],monos:[{ch:'Heidi',g:'f',t:'Dramatic',d:"The family history speeches. A woman tracing what the law has done to the women she comes from."},{ch:'Heidi',g:'f',t:'Seriocomic',d:"The teenage Legion hall performance. Self-presentation as both charming and heartbreaking."}],scenes:[]},
  {id:96,key:'OL2900288W',title:'The Humans',author:'Stephen Karam',year:2014,genre:'Drama',era:'2010s',cast:'medium',castSize:6,gender:'mixed',themes:['family','fear','America','class','health'],color:'#2C2C2A',cov:null,desc:'The Blake family gathers in a New York apartment for Thanksgiving. Underneath the warmth, everyone is terrified. Karam\'s Tony-winning play about modern American anxiety.',rids:[78,51,49],rwhy:['The American family as a container for national fear','Economic anxiety made domestic','An ensemble where subtext is the entire text'],monos:[{ch:'Erik',g:'m',t:'Dramatic',d:"Erik\'s speeches about his nightmares. A father who cannot protect his family -- quiet and devastating."},{ch:'Brigid',g:'f',t:'Dramatic',d:"Brigid defending her life choices. The child explaining herself to worried parents."}],scenes:[{ch:[{n:'Erik',g:'m'},{n:'Deirdre',g:'f'}],t:'Dramatic',d:"The parents alone. A marriage\'s quiet desperation -- the most emotionally honest scenes in the play."}]},
  {id:97,key:'OL2900290W',title:'Appropriate',author:'Branden Jacobs-Jenkins',year:2013,genre:'Drama',era:'2010s',cast:'large',castSize:7,gender:'mixed',themes:['race','family','inheritance','the South','ghosts'],color:'#854F0B',cov:null,desc:'A white Southern family clears out the family estate and discovers photographs that reveal their ancestor\'s relationship to racial violence. A ghost play and a family play simultaneously.',rids:[78,51,57],rwhy:['Both unearth the buried history of a family and a country','The house as the site of what was done','Inheritance as a form of haunting'],monos:[{ch:'Toni',g:'f',t:'Dramatic',d:"Toni on what she has kept going and what it has cost her. The family\'s keeper of secrets."},{ch:'Bo',g:'m',t:'Dramatic',d:"Bo\'s attempts to be reasonable. A man whose reasonableness is its own indictment."}],scenes:[{ch:[{n:'Toni',g:'f'},{n:'Frank',g:'m'}],t:'Dramatic',d:"The siblings\' central confrontation. A family\'s history argued as a personal accusation."}]},
  {id:98,key:'OL2900292W',title:'An Octoroon',author:'Branden Jacobs-Jenkins',year:2014,genre:'Drama',era:'2010s',cast:'medium',castSize:8,gender:'mixed',themes:['race','theatre','melodrama','slavery','form'],color:'#3A3A3A',cov:null,desc:'Jacobs-Jenkins adapts a 19th century melodrama about a mixed-race woman on a Louisiana plantation -- using the original\'s form to expose what form conceals about race.',rids:[97,43,89],rwhy:['Both use theatrical form itself as the argument','Race and representation as inseparable','The adaptation that transforms its source'],monos:[{ch:'BJJ (playwright)',g:'m',t:'Dramatic',d:"The playwright\'s opening monologue putting on whiteface. Meta-theatrical and impossible to forget."},{ch:'Zoe',g:'f',t:'Dramatic',d:"Zoe\'s discovery of her status. Melodrama played straight to expose its mechanisms."}],scenes:[{ch:[{n:'Zoe',g:'f'},{n:'George',g:'m'}],t:'Dramatic',d:"The lovers. Melodrama\'s conventions turned inside out."}]},
  {id:99,key:'OL2900294W',title:'Fat Ham',author:'James Ijames',year:2021,genre:'Comedy',era:'2020s',cast:'medium',castSize:7,gender:'mixed',themes:['Hamlet','queerness','race','family','the South'],color:'#3B6D11',cov:null,desc:'Juicy is a queer Black man whose dead father\'s ghost asks him to avenge his murder. A Hamlet retelling set at a backyard barbecue that is funnier and more heartbreaking than it has any right to be.',rids:[7,1,76],rwhy:['Hamlet retold for a body Hamlet never imagined','Queerness and Blackness as the lens that changes everything','Comedy that earns its grief'],monos:[{ch:'Juicy',g:'m',t:'Seriocomic',d:"Juicy\'s Hamlet speeches -- rewritten, questioned, inhabited by a young Black queer man who cannot decide what they mean for him."},{ch:'Opal',g:'f',t:'Comedic',d:"Opal cutting through everyone\'s drama. The comic intelligence of the play."}],scenes:[{ch:[{n:'Juicy',g:'m'},{n:'Tio',g:'m'}],t:'Seriocomic',d:"Juicy and his love interest. Tenderness and comedy -- the play\'s beating heart."}]},
  {id:100,key:'OL2900296W',title:'Primary Trust',author:'Eboni Booth',year:2023,genre:'Drama',era:'2020s',cast:'small',castSize:4,gender:'mixed',themes:['loneliness','work','friendship','change','community'],color:'#185FA5',cov:null,desc:'Kenneth works at a bookstore and drinks at the same bar every night with his imaginary friend Bert. When the bookstore closes, everything he has avoided must be faced. The 2024 Pulitzer winner.',rids:[77,88,49],rwhy:['Both treat loneliness as a condition rather than a flaw','Work and community as what structures a life','Quiet devastation in a small world'],monos:[{ch:'Kenneth',g:'m',t:'Seriocomic',d:"Kenneth explaining himself to anyone who will listen. A man who has built a life around not being seen suddenly visible."},{ch:'Kenneth',g:'m',t:'Dramatic',d:"Kenneth after the bookstore closes. The grief of losing the structure that made you possible."}],scenes:[{ch:[{n:'Kenneth',g:'m'},{n:'Corinna',g:'f'}],t:'Seriocomic',d:"Kenneth and Corinna at the bank. Two people who cannot quite connect finding something anyway."}]}
];

<script>
var API = 'https://mystagevault-production.up.railway.app';
var DEVICE_ID = 'dev_local';
try {
  var stored = localStorage.getItem('msv_id');
  if (stored) { DEVICE_ID = stored; }
  else { DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('msv_id', DEVICE_ID); }
} catch(e) {}

function apiSave(path, method, body) {
  fetch(API + path, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }).catch(function(){});
}

function loadFromBackend() {
  fetch(API + '/api/shelf/' + DEVICE_ID)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ shelf[r.play_key] = r.status; });
      return fetch(API + '/api/ratings/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ ratings[r.play_key] = r.rating; });
      return fetch(API + '/api/notes/' + DEVICE_ID);
    })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){ notes[r.play_key] = r.note; });
      render();
    })
    .catch(function(){ render(); });
}

// State
var shelf={}, ratings={}, notes={}, page='discover', stab='read';
var monoQ='', monoGender='All', monoType='All', monoEra='All', monoLen='All';
var sceneQ='', sceneGender='All', sceneEra='All';
var playQ='', playGenre='All', playEra='All';
var olResults=[], olLoading=false;
var did=null;

// Color helpers
var COLORS=['#533AB7','#0F6E56','#993C1D','#3A3A3A','#185FA5','#854F0B','#993556','#444441','#3C3489','#3B6D11','#5C1E1E','#2C2C2A'];
function hc(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function ini(t){return(t||'').split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}

// Cover image
function cov(p,w,h){
  var c=p.color||hc(p.title||'');
  var url=null;
  if(p.cov) url='https://covers.openlibrary.org/b/id/'+p.cov+'-M.jpg';
  else if(p.key) url='https://covers.openlibrary.org/b/olid/'+p.key+'-M.jpg';
  return '<div class="cov" style="width:'+w+'px;height:'+h+'px;background:'+c+'">'
    +(url?'<img src="'+url+'" onerror="this.style.display=\'none\'">':ini(p.title))
    +'</div>';
}

// Shelf buttons on cards
function sbtns(id){
  id=String(id);
  var s=shelf[id]||null;
  return '<div class="sbtns" onclick="event.stopPropagation()">'
    +'<button class="sab'+(s==='read'?' sr':'')+'" onclick="tog(\''+id+'\',\'read\')">&#10003; Read</button>'
    +'<button class="sab'+(s==='reading'?' sg':'')+'" onclick="tog(\''+id+'\',\'reading\')">Reading</button>'
    +'<button class="sab'+(s==='want'?' sw':'')+'" onclick="tog(\''+id+'\',\'want\')">&#9829; Want</button>'
    +'</div>';
}

// Play card
function card(p){
  var pid=String(p.key||p.id);
  var s=shelf[pid]||null;
  var r=ratings[pid]||0;
  var rl={read:'&#10003; Read',reading:'Reading',want:'&#9829; Want'};
  var rc={read:'rr',reading:'rg',want:'rw'};
  return '<div class="pc" onclick="odp(\''+pid+'\')">'
    +(s?'<div class="rib '+rc[s]+'">'+rl[s]+'</div>':'')
    +cov(p,118,165)
    +'<div class="ctitle">'+p.title+'</div>'
    +'<div class="cauth">'+p.author+'</div>'
    +'<div class="cmeta">'
    +'<span style="font-size:10px;color:'+(r?'#f59e0b':'#e4e1da')+'">&#9733;&#9733;&#9733;&#9733;&#9733;</span>'
    +'<span class="cgenre">'+p.genre+'</span></div>'
    +sbtns(pid)+'</div>';
}

function grid(plays){
  return plays.length
    ?'<div class="cards">'+plays.map(card).join('')+'</div>'
    :'<div class="empty">&#128218; Nothing found.</div>';
}

// Gender dot
function gdot(g){
  var c={f:'#d4537e',m:'#378add',nb:'#639922'};
  return '<span class="gdot g'+g+'" style="background:'+(c[g]||'#999')+'"></span>';
}

// Script links
function scriptLinks(p){
  var bq=encodeURIComponent((p.title||'')+' '+(p.author||''));
  return '<div class="get-script">'
    +'<span style="font-size:10px;color:#a09d97">Get the script:</span>'
    +'<a class="sl" href="https://www.concordtheatricals.com/search#q='+bq+'" target="_blank">Concord</a>'
    +'<a class="sl" href="https://www.dramatists.com" target="_blank">DPS</a>'
    +'<a class="sl" href="https://www.worldcat.org/search?q='+bq+'&fq=dt:bks" target="_blank">Library</a>'
    +'</div>';
}

// Navigation
var NAVS=[
  {id:'discover',icon:'&#127918;',label:'Discover'},
  {id:'shelf',icon:'&#128218;',label:'My shelf'},
  {id:'search',icon:'&#128269;',label:'Play search'},
  {section:'Audition tools'},
  {id:'monologues',icon:'&#127908;',label:'Monologue search'},
  {id:'scenes',icon:'&#128101;',label:'Scene search'}
];

function renderNav(){
  var html='';
  NAVS.forEach(function(n){
    if(n.section){
      html+='<div class="nav-section">'+n.section+'</div>';
    } else {
      html+='<div class="ni'+(page===n.id?' on':'')+'" onclick="go(\''+n.id+'\')">'
        +'<span class="ni-icon">'+n.icon+'</span>'+n.label+'</div>';
    }
  });
  document.getElementById('nav').innerHTML=html;
}

function go(p){page=p;render();}

// THEMES for featured rotation
var THEMES=[
  {name:'Plays by women',desc:'Playwrights who changed what theatre can say',filter:function(p){return ['Lorraine Hansberry','Caryl Churchill','Sarah Kane','Suzan-Lori Parks','Lynn Nottage','Paula Vogel','Sarah DeLappe','Lucy Kirkwood','Lucy Prebble','Anna Deavere Smith','Aphra Behn'].indexOf(p.author)>=0;}},
  {name:'Two-handers',desc:'Plays for exactly two actors',filter:function(p){return p.cast==='small'&&p.castSize===2;}},
  {name:'Solo shows',desc:'One performer carrying the whole stage',filter:function(p){return p.cast==='solo'||p.castSize===1;}},
  {name:'Queer theatre',desc:'Plays centering queer experience and identity',filter:function(p){return (p.themes||[]).some(function(t){return t==='queerness'||t==='sexuality'||t==='gender'||t==='AIDS';});}},
  {name:'American classics',desc:'The plays that defined American drama',filter:function(p){return ['Drama','Tragedy'].indexOf(p.genre)>=0&&['1940s','1950s','1960s','1970s','1980s','1990s','1900s'].indexOf(p.era)>=0&&['Tony Kushner','Lorraine Hansberry','Arthur Miller','Tennessee Williams','Suzan-Lori Parks','Edward Albee','Eugene O\'Neill','Sam Shepard'].indexOf(p.author)>=0;}},
  {name:'British theatre',desc:'From Pinter to Kane -- the British tradition',filter:function(p){return ['Harold Pinter','Caryl Churchill','Sarah Kane','Tom Stoppard','Lucy Kirkwood','Lucy Prebble','Brian Friel','J.M. Synge','Oscar Wilde','George Bernard Shaw'].indexOf(p.author)>=0;}},
  {name:'Classical roots',desc:'Shakespeare, the Greeks, and the canon',filter:function(p){return ['1600s','Ancient','Medieval','1500s'].indexOf(p.era)>=0||['William Shakespeare','Sophocles','Euripides','Aeschylus','Aristophanes','Moliere'].indexOf(p.author)>=0;}},
  {name:'Plays about race',desc:'Theatre that confronts race and identity head-on',filter:function(p){return (p.themes||[]).indexOf('race')>=0;}},
  {name:'Experimental and form-breaking',desc:'Plays that reinvented what theatre can be',filter:function(p){return ['Experimental','Absurdist'].indexOf(p.genre)>=0;}},
  {name:'Great monologue plays',desc:'Essential scripts for actors building their book',filter:function(p){return (p.monos||[]).length>=2;}}
];

function getFeatured(){
  var week=Math.floor(Date.now()/604800000);
  var theme=THEMES[week%THEMES.length];
  var matching=PLAYS.filter(theme.filter);
  // if fewer than 6 matching, pad with others
  if(matching.length<6){
    var others=PLAYS.filter(function(p){return matching.indexOf(p)<0;});
    var seed=week*7;
    while(matching.length<Math.min(12,PLAYS.length)&&others.length>0){
      seed=(seed*1664525+1013904223)&0xffffffff;
      var idx=Math.abs(seed)%others.length;
      matching.push(others[idx]);
      others.splice(idx,1);
    }
  }
  return {theme:theme,plays:matching.slice(0,12)};
}

function getMonoItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.monos||[]).forEach(function(m){
      var matchQ=!monoQ||(m.ch&&m.ch.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||(m.d&&m.d.toLowerCase().indexOf(monoQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(monoQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(monoQ.toLowerCase())>=0||(p.themes||[]).join(' ').toLowerCase().indexOf(monoQ.toLowerCase())>=0;
      var matchG=monoGender==='All'||m.g===monoGender;
      var matchT=monoType==='All'||m.t===monoType;
      var matchE=monoEra==='All'||(monoEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(monoEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(monoEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchT&&matchE) items.push({p:p,m:m});
    });
  });
  return items;
}

function getSceneItems(){
  var items=[];
  PLAYS.forEach(function(p){
    (p.scenes||[]).forEach(function(s){
      var fs=s.ch.filter(function(c){return c.g==='f';}).length;
      var ms=s.ch.filter(function(c){return c.g==='m';}).length;
      var mix='Mixed/3+';
      if(s.ch.length===2){if(fs===2)mix='F/F';else if(ms===2)mix='M/M';else if(fs===1&&ms===1)mix='M/F';}
      var matchQ=!sceneQ||(s.d&&s.d.toLowerCase().indexOf(sceneQ.toLowerCase())>=0)||p.title.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||p.author.toLowerCase().indexOf(sceneQ.toLowerCase())>=0||s.ch.some(function(c){return c.n&&c.n.toLowerCase().indexOf(sceneQ.toLowerCase())>=0;})||(p.themes||[]).join(' ').toLowerCase().indexOf(sceneQ.toLowerCase())>=0;
      var matchG=sceneGender==='All'||sceneGender===mix;
      var matchE=sceneEra==='All'||(sceneEra==='classical'&&['1600s','1700s','1800s','Ancient'].indexOf(p.era)>=0)||(sceneEra==='modern'&&['1900s','1950s','1960s','1970s','1980s'].indexOf(p.era)>=0)||(sceneEra==='contemporary'&&['1990s','2000s','2010s','2020s'].indexOf(p.era)>=0);
      if(matchQ&&matchG&&matchE) items.push({p:p,s:s,mix:mix});
    });
  });
  return items;
}

// Global search bar
var sd;
function onSrch(v){
  playQ=v;monoQ=v;sceneQ=v;
  if(v.length>2){
    if(page==='discover') go('search');
    olLoading=true;render();
    clearTimeout(sd);
    sd=setTimeout(function(){doOLSearch(v);},400);
  } else {
    olResults=[];olLoading=false;
    render();
  }
}

function doOLSearch(q){
  fetch('https://openlibrary.org/search.json?q='+encodeURIComponent(q)+'&subject=drama&fields=key,title,author_name,first_publish_year,cover_i&limit=20')
    .then(function(r){return r.json();})
    .then(function(data){
      olResults=(data.docs||[]).map(function(doc){
        for(var i=0;i<PLAYS.length;i++){if(PLAYS[i].key===doc.key)return PLAYS[i];}
        return {id:doc.key,key:doc.key,title:doc.title||'Unknown',author:(doc.author_name||['Unknown'])[0],year:doc.first_publish_year||null,genre:'Drama',color:hc(doc.title||''),cov:doc.cover_i||null,themes:[],desc:'',rids:[],rwhy:[],monos:[],scenes:[]};
      });
      olLoading=false;render();
    })
    .catch(function(){olLoading=false;render();});
}

  +'<div class="dp-sub">My notes <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0">(private)</span></div>'

  +'<div style="font-size:10px;color:#a09d97;margin-top:3px">&#128274; Only visible to you</div>'
  +'<button class="savebtn" onclick="saveN(\''+id+'\')">Save note</button>';
  h+='<div class="dp-sub">My notes <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0">(private)</span></div>'
    +'<textarea id="nta" placeholder="What struck you?">'+note+'</textarea>'
    +'<div style="font-size:10px;color:#a09d97;margin-top:3px">&#128274; Only visible to you</div>'
    +'<button class="savebtn" onclick="saveN(\''+id+'\')">Save note</button>';
  if(recs.length){
    h+='<div class="dp-sub">If you liked this, try...</div>';
    recs.forEach(function(rc){
      var rc2=rc.p,rcid=String(rc2.key||rc2.id);
      h+='<div class="ri" onclick="odp(\''+rcid+'\')">'+cov(rc2,24,36)
        +'<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+rc2.title+'</div>'
        +'<div style="font-size:10px;color:#a09d97">'+rc.why+'</div></div>'
        +'<span style="color:#a09d97">&#8250;</span></div>';
    });
  }
  if((p.monos||[]).length){
    h+='<div class="dp-sub">Monologues from this play</div>';
    p.monos.forEach(function(m){
      h+='<div class="mini"><div class="mini-top">'+gdot(m.g)+'<strong style="font-size:11px">'+m.ch+'</strong><span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+m.t+'</span></div><p class="mini-desc">'+m.d+'</p></div>';
    });
  }
  if((p.scenes||[]).length){
    h+='<div class="dp-sub">Scenes from this play</div>';
    p.scenes.forEach(function(sc){
      h+='<div class="mini"><div class="mini-top">'+sc.ch.map(function(c){return gdot(c.g)+'<span style="font-size:11px;font-weight:500">'+c.n+'</span>';}).join('<span style="color:#a09d97;margin:0 2px">&middot;</span>')+'<span style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:20px;background:#fff;color:#6b6860;border:1px solid #e4e1da">'+sc.t+'</span></div><p class="mini-desc">'+sc.d+'</p></div>';
    });
  }
  h+='</div>';
  var dp=document.getElementById('dp');
  dp.innerHTML=h;dp.classList.add('open');
  document.getElementById('ov').style.display='block';
}

function cdp(){did=null;document.getElementById('dp').classList.remove('open');document.getElementById('ov').style.display='none';}
function hov(n){document.querySelectorAll('#rr .rst').forEach(function(el,i){el.style.color=i<n?'#f59e0b':'#e4e1da';});}
function uhov(r){document.querySelectorAll('#rr .rst').forEach(function(el,i){el.style.color=i<r?'#f59e0b':'#e4e1da';});}

    +'<div style="font-size:15px;font-weight:500;margin-bottom:3px">Your theatre card</div>'
    +'<div style="font-size:11px;color:#6b6860;margin-bottom:14px">Screenshot to share</div>'
    +'<div class="tc">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #3a3530">'
    +'<span style="font-size:18px">&#127917;</span>'
    +'<div><div style="font-size:13px;font-weight:500">My Stage Vault</div><div style="font-size:10px;color:#6b6860">plays &middot; free &middot; theatre</div></div></div>'

    +'<div style="text-align:center"><div style="font-size:22px;font-weight:500;color:#c9a96e">'+tot.want+'</div><div style="font-size:9px;color:#6b6860;text-transform:uppercase;letter-spacing:.05em">Want</div></div>'
    +'<div style="text-align:center"><div style="font-size:22px;font-weight:500;color:#c9a96e">'+Object.keys(ratings).length+'</div><div style="font-size:9px;color:#6b6860;text-transform:uppercase;letter-spacing:.05em">Rated</div></div>'
    +'</div>';
  if(rp.length){
    h+='<div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#6b6860;margin-bottom:8px">Plays I have read</div>';
    rp.forEach(function(p){h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'+cov(p,22,32)+'<div><div style="font-size:11px;font-weight:500">'+p.title+'</div><div style="font-size:9px;color:#6b6860">'+p.author+'</div></div></div>';});
  } else {
    h+='<div style="font-size:11px;color:#6b6860;text-align:center;padding:10px 0">Add plays to your shelf to see them here</div>';
  }
  h+='<div style="font-size:10px;color:#3a3730;text-align:center;margin-top:12px;padding-top:10px;border-top:1px solid #2a2520">mystagevault.com</div></div>'
    +'<div style="display:flex;gap:8px;justify-content:center;margin-top:14px">'
    +'<button onclick="document.getElementById(\'cm\').classList.remove(\'open\')" style="padding:7px 16px;border:1px solid #e4e1da;border-radius:7px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit">Close</button>'
    +'</div></div>';

var tt;
function showT(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show');},2400);}

// Event delegation for chip buttons
document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-fn]');
  if(!btn) return;
  var fn = btn.getAttribute('data-fn');
  var val = btn.getAttribute('data-val');
  var fns = {
    setMG:setMG, setMT:setMT, setME:setME,
    setSG:setSG, setSE:setSE,
    setPG:setPG, setPE:setPE
  };
  if(fns[fn]) fns[fn](val);
});

// Event delegation for play cards and mono/scene cards
document.addEventListener('click', function(e){
  var card = e.target.closest('[data-play]');
  if(card && !e.target.closest('.sbtns') && !e.target.closest('[data-fn]')) {
    odp(card.getAttribute('data-play'));
  }
  var sab = e.target.closest('[data-shelf]');
  if(sab) {
    e.stopPropagation();
    var parts = sab.getAttribute('data-shelf').split('|');
    tog(parts[0], parts[1]);
  }
});

loadFromBackend();
